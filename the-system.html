// HABIT STREAK CALENDAR — GitHub-style contribution heatmap
// ═══════════════════════════════════════════════════════════════════
function HabitCalendar({ habits, w = 320 }) {
  const cvRef = useRef(null);
  const today = new Date();
  const days = Array.from({length:84},(_,i)=>{
    const d=new Date(today);
    d.setDate(today.getDate()-(83-i));
    return d.toISOString().slice(0,10);
  });

  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const DPR=Math.min(window.devicePixelRatio||1,2);
    const h=80;
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,w,h);
    const cols=12, rows=7, cell=(w-8)/cols, pad=2;
    const wks=[];
    for(let i=0;i<days.length;i+=7) wks.push(days.slice(i,i+7));

    wks.forEach((wk,wi)=>{
      wk.forEach((date,di)=>{
        const hd=habits?.[date]||{};
        const done=HABITS.filter(h=>hd[h.id]).length;
        const pct=done/HABITS.length;
        const x=8+wi*cell, y=6+di*((h-12)/rows);
        const sz=cell-pad*2;
        const alpha=pct===0?0.08:0.15+pct*0.75;
        ctx.fillStyle=`rgba(${parseInt(PA.p.slice(1,3),16)||200},${parseInt(PA.p.slice(3,5),16)||160},${parseInt(PA.p.slice(5,7),16)||50},${alpha})`;
        ctx.beginPath();
        ctx.roundRect(x+pad,y+pad,sz,sz,2);
        ctx.fill();
        if(date===today.toISOString().slice(0,10)) {
          ctx.strokeStyle=PA.p;
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.roundRect(x+pad,y+pad,sz,sz,2);
          ctx.stroke();
        }
      });
    });

    ctx.fillStyle=M.textLow;
    ctx.font="8px Rajdhani,sans-serif";
    ctx.textAlign="left";
    ctx.fillText("12 weeks of habit data",8,h-1);
  },[habits,w]);

  return <canvas ref={cvRef} style={{width:w,height:80,display:"block",borderRadius:8}}/>;
}

// FINAL DECORATIVE CANVAS — title screen background
// ═══════════════════════════════════════════════════════════════════
function TitleCanvas({ w = 360, h = 200 }) {
  const cvRef = useRef(null);
  const animRef = useRef(null);

  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const DPR=Math.min(window.devicePixelRatio||1,2);
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    let t=0;
    const stars=Array.from({length:60},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.3,phase:Math.random()*Math.PI*2,speed:0.01+Math.random()*0.02}));
    const runes=["◈","◇","✦","⬡","▲","◉"];

    const draw=()=>{
      ctx.clearRect(0,0,w,h); t++;
      const bg=ctx.createLinearGradient(0,0,w,h);
      bg.addColorStop(0,"#04020A"); bg.addColorStop(0.5,"#080416"); bg.addColorStop(1,"#04020A");
      ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

      stars.forEach(s=>{
        const a=0.3+0.5*Math.sin(t*s.speed+s.phase);
        ctx.save(); ctx.globalAlpha=a; ctx.fillStyle="#FFFFFF"; ctx.shadowColor="#FFFFFF"; ctx.shadowBlur=3;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); ctx.restore();
      });

      const rr=parseInt(PA.p.slice(1,3),16)||200, rg=parseInt(PA.p.slice(3,5),16)||160, rb=parseInt(PA.p.slice(5,7),16)||50;
      for(let i=0;i<4;i++) {
        const rx=w*(0.1+i*0.25), ry=h*0.7;
        const a=0.08+0.06*Math.sin(t*0.03+i*1.2);
        ctx.save(); ctx.globalAlpha=a; ctx.font=`${14+i*2}px serif`; ctx.fillStyle=PA.p;
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.translate(rx,ry); ctx.rotate(t*0.008*(i%2===0?1:-1));
        ctx.fillText(runes[i%runes.length],0,0); ctx.restore();
      }

      const cg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,h*0.6);
      cg.addColorStop(0,`rgba(${rr},${rg},${rb},0.08)`);
      cg.addColorStop(0.5,`rgba(${rr},${rg},${rb},0.03)`); cg.addColorStop(1,"transparent");
      ctx.fillStyle=cg; ctx.fillRect(0,0,w,h);

      animRef.current=requestAnimationFrame(draw);
    };
    animRef.current=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(animRef.current);
  },[w,h]);

  return <canvas ref={cvRef} style={{width:w,height:h,display:"block",position:"absolute",inset:0,borderRadius:14,pointerEvents:"none"}}/>;
}

// BOSS BATTLE PANEL
// ═══════════════════════════════════════════════════════════════════
function BossBattlePanel({ profile, dispatch }) {
  const bossState = profile?.bossState || {};
  const currentBossId = bossState.currentBossId || BOSSES[0].id;
  const boss = BOSSES.find(b => b.id === currentBossId) || BOSSES[0];
  const bs = bossState[boss.id] || { hp: boss.hp };
  const hpPct = Math.max(0, Math.round((bs.hp / boss.hp) * 100));
  const defeated = bs.defeated || bs.hp <= 0;
  const phase = hpPct > 66 ? 0 : hpPct > 33 ? 1 : 2;
  const [shaking, setShaking] = useState(false);
  const [lastDmg, setLastDmg] = useState(null);
  const [showVictory, setShowVictory] = useState(false);

  function attack(dmg) {
    if (defeated) return;
    snd("hit");
    setShaking(true); setTimeout(() => setShaking(false), 450);
    setLastDmg(dmg);
    const newHp = Math.max(0, bs.hp - dmg);
    if (newHp <= 0) {
      dispatch({ type: "BOSS_DEFEATED", payload: { bossId: boss.id, xp: boss.xp, ap: boss.ap } });
      setShowVictory(true); snd("rankup");
    } else {
      dispatch({ type: "BOSS_ATTACK", payload: { bossId: boss.id, dmg } });
    }
    setTimeout(() => setLastDmg(null), 800);
  }

  function selectBoss(id) {
    dispatch({ type: "SET_BOSS", payload: { bossId: id } });
  }

  const hpColor = hpPct > 66 ? "#22C55E" : hpPct > 33 ? "#F59E0B" : "#EF4444";
  const attacks = boss.phases?.[phase]?.attacks || boss.attacks || [];

  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      {showVictory && (
        <div style={{position:"fixed",inset:0,zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.92)",backdropFilter:"blur(16px)"}}>
          <Card style={{maxWidth:300,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:14,animation:"popIn 0.5s ease"}}>🏆</div>
            <div style={{fontSize:16,fontWeight:900,color:"#FFD700",fontFamily:ORB,marginBottom:8,letterSpacing:"0.08em"}}>{boss.n} DEFEATED!</div>
            <p style={{fontSize:12,color:M.textMid,lineHeight:1.75,fontFamily:RAJ,marginBottom:16}}>The {boss.n} has fallen. +{boss.xp} XP, +{boss.ap} AP earned.</p>
            <Btn onClick={()=>setShowVictory(false)} variant="primary" full style={{fontFamily:ORB}}>CLAIM VICTORY</Btn>
          </Card>
        </div>
      )}
      <Card glass>
        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
          {BOSSES.map(b=>{
            const bbs=bossState[b.id]||{hp:b.hp};
            const bDefeated=bbs.defeated||bbs.hp<=0;
            return <div key={b.id} onClick={()=>selectBoss(b.id)}
              style={{flexShrink:0,padding:"5px 10px",borderRadius:8,cursor:"pointer",
                background:b.id===currentBossId?PA.dim:M.surface,
                border:`1.5px solid ${b.id===currentBossId?PA.p+"44":M.border}`,
                fontSize:10,color:bDefeated?"#22C55E":b.id===currentBossId?PA.p:M.textLow,
                fontFamily:ORB,opacity:bDefeated?0.6:1}}>
              {b.e} {b.n.split(" ")[0]}
              {bDefeated&&" ✓"}
            </div>;
          })}
        </div>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{animation:shaking?"bossShake 0.4s ease":"none"}}>
            <BossSprite boss={boss} hpFraction={bs.hp/boss.hp} phase={phase} size={140} shake={shaking}/>
          </div>
          {lastDmg&&<div style={{fontSize:20,fontWeight:900,color:"#EF4444",fontFamily:ORB,animation:"popIn 0.3s ease",marginTop:4}}>-{lastDmg}</div>}
        </div>
        <BossPhaseIndicator hpPct={hpPct} bossName={boss.n}/>
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:10,fontFamily:ORB}}>
            <span style={{color:M.textLow}}>{boss.n}</span>
            <span style={{color:hpColor}}>{bs.hp} / {boss.hp} HP</span>
          </div>
          <div style={{height:10,background:M.surface,borderRadius:99,overflow:"hidden",position:"relative"}}>
            <div style={{height:"100%",width:`${hpPct}%`,background:`linear-gradient(90deg,${hpColor}88,${hpColor})`,borderRadius:99,transition:"width 0.5s ease",boxShadow:`0 0 10px ${hpColor}66`}}/>
          </div>
        </div>
        {defeated ? (
          <div style={{textAlign:"center",padding:"14px",background:"#22C55E22",borderRadius:12,border:"1px solid #22C55E33"}}>
            <div style={{fontSize:28,marginBottom:8}}>🏆</div>
            <div style={{fontSize:12,fontWeight:700,color:"#22C55E",fontFamily:ORB}}>BOSS DEFEATED</div>
          </div>
        ) : (
          <div>
            <div style={{fontSize:9,color:M.textLow,fontFamily:ORB,letterSpacing:"0.12em",marginBottom:8}}>ATTACK</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                {l:"LIGHT STRIKE",dmg:10,icon:"⚡",tip:"Quick 10 damage"},
                {l:"POWER BLOW",dmg:25,icon:"💥",tip:"Solid 25 damage"},
                {l:"LIMIT BREAK",dmg:50,icon:"🔥",tip:"Big 50 damage"},
              ].map(a=>(
                <div key={a.l} onClick={()=>attack(a.dmg)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                    background:M.surface,borderRadius:10,cursor:"pointer",border:`1px solid ${M.border}`,
                    transition:"all 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=PA.p+"44"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=M.border}>
                  <span style={{fontSize:18}}>{a.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:M.text,fontFamily:ORB}}>{a.l}</div>
                    <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ}}>{a.tip}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:900,color:"#EF4444",fontFamily:ORB}}>-{a.dmg}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </Card>
      <CombatLog bossState={bossState}/>
    </div>
  );
}

        <XPBar pct={profile?((profile.xpCurrent/profile.xpNeeded)*100):0}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:M.textLow,fontFamily:RAJ}}>
          <span>LVL {profile?.level||0}</span>
          <span style={{color:PA.p}}>{profile?.xpCurrent||0} / {profile?.xpNeeded||100} XP</span>
          <span>LVL {(profile?.level||0)+1}</span>
        </div>
        <div style={{marginTop:14,display:"flex",gap:8}}>
          <Btn variant="primary" onClick={onUpdate} full icon="⚡" style={{fontFamily:ORB}}>UPDATE SCAN</Btn>
          <Btn variant="accent" onClick={()=>setShowAura(a=>!a)} style={{fontFamily:ORB}}>AURA</Btn>
        </div>
      </Card>
      {showAura&&<Card><Lbl icon="🌀" c={auraStage.color} mb={12}>AURA — {auraStage.label}</Lbl><div style={{display:"flex",justifyContent:"center",marginBottom:12}}><AuraDisplay ap={profile?.totalAura||0} size={160}/></div><p style={{fontSize:12,color:M.textMid,lineHeight:1.75,fontFamily:RAJ,textAlign:"center"}}>{auraStage.desc}</p></Card>}
      <Card><Lbl icon="📊" mb={12}>ATTRIBUTES</Lbl><PowerRadar stats={profile?.stats} size={200}/><div style={{marginTop:14}}>{STATS.map(s=>{const v=profile?.stats?.[s.key]?.value||0;return <div key={s.key} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}><div style={{display:"flex",gap:5,alignItems:"center"}}><span style={{fontSize:13}}>{s.e}</span><span style={{fontSize:11,color:M.textMid,fontFamily:RAJ}}>{s.l}</span></div><div style={{display:"flex",gap:4,alignItems:"center"}}><StatBadge value={v}/><span style={{fontSize:12,fontWeight:700,color:v>=70?PA.p:v>=50?PA.s:"#60A5FA",fontFamily:ORB}}>{v}</span></div></div><StatBar value={v}/></div>;})}</div></Card>
      <SystemStatus profile={profile}/>
      <WeeklyReview profile={profile}/>
      {profile?.weeklyQuests?.length>0&&<Card><Lbl icon="📜" mb={10}>WEEKLY DIRECTIVES</Lbl>{profile.weeklyQuests.map((q,i)=><div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<profile.weeklyQuests.length-1?`1px solid ${M.border}`:"",alignItems:"flex-start"}}><div style={{width:6,height:6,borderRadius:2,background:PA.p,transform:"rotate(45deg)",flexShrink:0,marginTop:5}}/>  <div style={{flex:1,fontSize:12,color:M.textMid,fontFamily:RAJ,lineHeight:1.6}}>{q}</div></div>)}</Card>}
      <SSSGate stats={profile?.stats}/>
    </div>
  );
}

// STATS TAB
// ═══════════════════════════════════════════════════════════════════
function StatsTab({ profile }) {
  const [view, setView] = useState("overview");
  const stats = profile?.stats||{};
  const totalPts = STATS.reduce((s,st)=>s+(stats[st.key]?.value||0),0);
  const avg = Math.round(totalPts/STATS.length);
  const topStats = [...STATS].sort((a,b)=>(stats[b.key]?.value||0)-(stats[a.key]?.value||0)).slice(0,3);
  const weakStats = [...STATS].sort((a,b)=>(stats[a.key]?.value||0)-(stats[b.key]?.value||0)).slice(0,3);
  const sc = v=>v>=80?PA.p:v>=60?PA.s:v>=40?"#60A5FA":"#94A3B8";
  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {["overview","evolution","deep"].map(v=><Btn key={v} variant={view===v?"primary":"ghost"} onClick={()=>setView(v)} style={{flex:1,fontFamily:ORB,fontSize:10}}>{v==="overview"?"📊 OVERVIEW":v==="evolution"?"📈 EVOLUTION":"🔬 DEEP"}</Btn>)}
      </div>
      {view==="overview"&&<>
        <Card glass><div style={{display:"flex",justifyContent:"space-around",marginBottom:14}}><div style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:PA.p,fontFamily:ORB}}>{totalPts}</div><div style={{fontSize:9,color:M.textLow,fontFamily:ORB}}>TOTAL</div></div><div style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:PA.s,fontFamily:ORB}}>{avg}</div><div style={{fontSize:9,color:M.textLow,fontFamily:ORB}}>AVERAGE</div></div><div style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:"#22C55E",fontFamily:ORB}}>{STATS.filter(s=>(stats[s.key]?.value||0)>=70).length}</div><div style={{fontSize:9,color:M.textLow,fontFamily:ORB}}>MASTERED</div></div></div><PowerRadar stats={stats} size={200}/></Card>
        <Card><Lbl icon="🏆" c="#FFD700" mb={10}>TOP STATS</Lbl>{topStats.map((s,i)=>{const v=stats[s.key]?.value||0;return <div key={s.key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:20,height:20,borderRadius:5,background:`${["#FFD700","#C0C0C0","#CD7F32"][i]}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:["#FFD700","#C0C0C0","#CD7F32"][i],fontFamily:ORB}}>{i+1}</div><span style={{fontSize:15}}>{s.e}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,fontFamily:RAJ,color:M.textMid}}>{s.l}</span><span style={{fontSize:11,fontWeight:700,color:sc(v),fontFamily:ORB}}>{v}</span></div><StatBar value={v}/></div></div>;})}</Card>
        <StatAdvisor stats={stats}/>
        <Card><Lbl icon="📋" mb={10}>ALL ATTRIBUTES</Lbl>{STATS.map(s=>{const v=stats[s.key]?.value||0;return <div key={s.key} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span>{s.e}</span><span style={{fontSize:11,color:M.textMid,fontFamily:RAJ}}>{s.l}</span></div><div style={{display:"flex",gap:4,alignItems:"center"}}><StatBadge value={v}/><span style={{fontSize:12,fontWeight:700,color:sc(v),fontFamily:ORB}}>{v}</span></div></div><StatBar value={v}/></div>;})}</Card>
      </>}
      {view==="evolution"&&<Card><Lbl icon="📈" mb={12}>30-DAY EVOLUTION</Lbl>{STATS.map(s=>{const hist=(profile?.statHistory?.[s.key]||[]).slice(-30);const v=stats[s.key]?.value||0;const trend=hist.length>1?hist[hist.length-1]-hist[0]:0;return <div key={s.key} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${M.border}`}}><span style={{fontSize:15,flexShrink:0}}>{s.e}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:M.textMid,fontFamily:RAJ}}>{s.l}</span><div style={{display:"flex",gap:6,alignItems:"center"}}>{trend!==0&&<span style={{fontSize:10,color:trend>0?"#22C55E":"#F87171",fontFamily:ORB}}>{trend>0?"+":""}{trend}</span>}<span style={{fontSize:11,fontWeight:700,color:sc(v),fontFamily:ORB}}>{v}</span></div></div><Sparkline data={hist.length>1?hist:[v,v]} color={sc(v)} w={150} h={28}/></div></div>;})}</Card>}
      {view==="deep"&&<><SoulAnalysis stats={stats}/><DeepStatsPanel profile={profile}/><RankProgressMap currentRank={profile?.rank||"E"} profile={profile}/></>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// HABITS TAB
// ═══════════════════════════════════════════════════════════════════
function HabitsTab({ profile, dispatch }) {
  const [subTab, setSubTab] = useState("habits");
  const today = new Date().toISOString().slice(0,10);
  const todayH = profile?.habits?.[today] || {};
  const doneCount = HABITS.filter(h => todayH[h.id]).length;
  const pct = Math.round((doneCount / HABITS.length) * 100);
  const todayRitual = profile?.ritualDone?.[today] || { morning: [], evening: [] };
  const [journalText, setJournalText] = useState("");
  const [journalMood, setJournalMood] = useState(5);
  const [aiReading, setAiReading] = useState(false);
  const [aiMood, setAiMood] = useState(null);
  const [timerSec, setTimerSec] = useState(1500);
  const [timerRun, setTimerRun] = useState(false);
  const timerRef = useRef(null);
  const promptIdx = Math.floor(Date.now() / 86400000) % JOURNAL_PROMPTS.length;

  useEffect(() => {
    if (timerRun) {
      timerRef.current = setInterval(() => {
        setTimerSec(s => {
          if (s <= 1) {
            clearInterval(timerRef.current);
            setTimerRun(false);
            snd("rankup");
            dispatch({ type: "FOCUS_DONE" });
            return 1500;
          }
          return s - 1;
        });
      }, 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [timerRun]);

  function toggleHabit(id) {
    snd(todayH[id] ? "back" : "tick");
    dispatch({ type: "TOGGLE_HABIT", payload: { id, date: today } });
  }

  function toggleRitual(phase, idx) {
    snd("tick");
    dispatch({ type: "TOGGLE_RITUAL", payload: { phase, idx, date: today } });
  }

  async function submitJournal() {
    if (!journalText.trim()) return;
    snd("save");
    setAiReading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 300,
          system: "Analyze this journal entry. Return JSON only: {mood_label:string,mood_score:1-10,insight:string}",
          messages: [{ role: "user", content: `Mood: ${journalMood}/10\n\n${journalText}` }]
        })
      });
      const d = await r.json();
      const txt = d.content?.map(c => c.text || "").join("").replace(/```json|```/g, "").trim();
      try { setAiMood(JSON.parse(txt)); } catch { setAiMood({ mood_label: "Recorded", mood_score: journalMood, insight: "Journal entry saved." }); }
    } catch {
      setAiMood({ mood_label: "Saved", mood_score: journalMood, insight: "Entry logged locally." });
    }
    dispatch({ type: "ADD_JOURNAL", payload: { date: today, text: journalText, mood: journalMood, ts: Date.now() } });
    setJournalText("");
    setAiReading(false);
  }

  const SUB_TABS = [
    { id: "habits",   e: "⚡", label: "HABITS"   },
    { id: "journal",  e: "📔", label: "JOURNAL"  },
    { id: "ritual",   e: "🌅", label: "RITUAL"   },
    { id: "missions", e: "🗡️", label: "MISSIONS" },
    { id: "timer",    e: "⏱",  label: "FOCUS"    },
  ];

  const mins = Math.floor(timerSec / 60);
  const secs = timerSec % 60;

  return (
    <div style={{ animation: "fadeUp 0.4s ease" }}>
      {/* Scrollable pill sub-tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 16, overflowX: "auto", scrollbarWidth: "none", paddingBottom: 4 }}>
        {SUB_TABS.map(s => (
          <button key={s.id} onClick={() => setSubTab(s.id)} style={{
            flexShrink: 0, padding: "8px 12px", borderRadius: 20,
            background: subTab === s.id ? `linear-gradient(135deg,${PA.d},${PA.p})` : "transparent",
            border: "none", cursor: "pointer", color: subTab === s.id ? "#fff" : M.textLow,
            fontSize: 9, fontFamily: ORB, fontWeight: 700, transition: "all 0.2s",
            boxShadow: subTab === s.id ? `0 2px 10px ${PA.glow}` : "none",
          }}>{s.e} {s.label}</button>
        ))}
      </div>

      {/* HABITS */}
      {subTab === "habits" && (
        <>
          <Card glass>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <div>
                <Lbl icon="⚡" mb={2}>HABITS</Lbl>
                <div style={{ fontSize: 10, color: M.textLow, fontFamily: RAJ }}>{today} · {doneCount}/{HABITS.length}</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 900, color: PA.p, fontFamily: ORB }}>{profile?.streak || 0}</div>
                <div style={{ fontSize: 9, color: M.textLow, fontFamily: ORB }}>STREAK</div>
              </div>
            </div>
            <div style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: 10, fontFamily: ORB }}>
                <span style={{ color: M.textLow }}>PROGRESS</span>
                <span style={{ color: PA.p }}>{pct}%</span>
              </div>
              <div style={{ height: 5, background: M.surface, borderRadius: 99, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg,${PA.d},${PA.p})`, borderRadius: 99, transition: "width 0.5s ease" }} />
              </div>
            </div>
            {pct === 100 && (
              <div style={{ textAlign: "center", padding: "10px", background: PA.dim, borderRadius: 10, fontSize: 11, fontWeight: 700, color: PA.p, fontFamily: ORB }}>
                🏆 PERFECT DAY — +50 XP
              </div>
            )}
          </Card>
          {HABITS.map(h => {
            const done = todayH[h.id];
            return (
              <div key={h.id} onClick={() => toggleHabit(h.id)} style={{
                padding: "14px 16px", background: done ? PA.dim : M.card,
                border: `1.5px solid ${done ? PA.p + "44" : M.border}`, borderRadius: 14,
                cursor: "pointer", display: "flex", gap: 12, alignItems: "center",
                boxShadow: done ? `0 4px 20px ${PA.glow}` : M.shadowSm,
                transition: "all 0.25s", marginBottom: 8,
              }}>
                <div style={{ width: 22, height: 22, borderRadius: 7, border: `2px solid ${done ? PA.p : "#3A3550"}`, background: done ? PA.p : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {done && <span style={{ color: "#000", fontSize: 12, fontWeight: 900 }}>✓</span>}
                </div>
                <span style={{ fontSize: 18, flexShrink: 0 }}>{h.e}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: done ? PA.p : M.text, fontFamily: RAJ }}>{h.n}</div>
                  <div style={{ fontSize: 10, color: M.textLow, fontFamily: RAJ }}>{h.d}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 10, color: done ? PA.p : M.textLow, fontFamily: ORB }}>+{h.xp}XP</div>
                  <div style={{ fontSize: 10, color: done ? PA.s : M.textLow, fontFamily: ORB }}>+{h.ap}AP</div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* JOURNAL */}
      {subTab === "journal" && (
        <>
          <Card>
            <Lbl icon="📔" mb={12}>JOURNAL</Lbl>
            <div style={{ padding: "10px 12px", background: M.surface, borderRadius: 8, border: `1px solid ${PA.p}22`, marginBottom: 12 }}>
              <div style={{ fontSize: 9, color: PA.p, fontWeight: 700, fontFamily: ORB, marginBottom: 3 }}>TODAY'S PROMPT</div>
              <p style={{ fontSize: 11, color: M.textMid, lineHeight: 1.75, margin: 0, fontFamily: RAJ, fontStyle: "italic" }}>"{JOURNAL_PROMPTS[promptIdx]}"</p>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 10, color: M.textLow, fontFamily: ORB, marginBottom: 6 }}>MOOD: {journalMood}/10</div>
              <input type="range" min={1} max={10} value={journalMood} onChange={e => setJournalMood(+e.target.value)} style={{ width: "100%", accentColor: PA.p }} />
            </div>
            <textarea value={journalText} onChange={e => setJournalText(e.target.value)}
              placeholder="Write freely..." rows={5}
              style={{ width: "100%", background: M.input, border: `1px solid ${M.border}`, borderRadius: 10, padding: "12px", color: M.text, fontSize: 13, resize: "vertical", boxSizing: "border-box", fontFamily: RAJ, outline: "none", lineHeight: 1.7 }} />
            <Btn onClick={submitJournal} variant="primary" full icon={aiReading ? "⏳" : "📝"} style={{ marginTop: 10, fontFamily: ORB }} disabled={aiReading || !journalText.trim()}>
              {aiReading ? "ANALYZING..." : "RECORD ENTRY"}
            </Btn>
            {aiMood && (
              <div style={{ marginTop: 10, padding: "10px 12px", background: PA.dim, borderRadius: 10, border: `1px solid ${PA.p}22` }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: PA.p, fontFamily: ORB }}>{aiMood.mood_label}</span>
                  <span style={{ fontSize: 10, color: M.textLow, fontFamily: ORB }}>MOOD {aiMood.mood_score}/10</span>
                </div>
                <p style={{ fontSize: 11, color: M.textMid, lineHeight: 1.7, margin: 0, fontFamily: RAJ }}>{aiMood.insight}</p>
              </div>
            )}
          </Card>
          {(profile?.journal?.length || 0) > 0 && (
            <Card>
              <Lbl icon="📈" mb={10}>MOOD TREND</Lbl>
              <MoodTimeline entries={(profile.journal || []).slice(-30)} w={300} h={72} />
              <div style={{ height: 12 }} />
              <Lbl icon="📜" mb={8}>RECENT ENTRIES</Lbl>
              {[...(profile.journal || [])].reverse().slice(0, 5).map((e, i) => (
                <div key={i} style={{ padding: "10px 12px", background: M.surface, borderRadius: 10, border: `1px solid ${M.border}`, marginBottom: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 9, color: M.textLow, fontFamily: ORB }}>{e.date}</span>
                    <span style={{ fontSize: 9, color: PA.p, fontFamily: ORB }}>MOOD {e.mood}/10</span>
                  </div>
                  <p style={{ fontSize: 11, color: M.textMid, lineHeight: 1.6, margin: 0, fontFamily: RAJ, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{e.text}</p>
                </div>
              ))}
            </Card>
          )}
        </>
      )}

      {/* RITUAL */}
      {subTab === "ritual" && (
        <div>
          {[
            { phase: "morning", rituals: MORNING_RITUALS, icon: "🌅", label: "MORNING" },
            { phase: "evening", rituals: EVENING_RITUALS, icon: "🌙", label: "EVENING" },
          ].map(({ phase, rituals, icon, label }) => {
            const done = todayRitual[phase] || [];
            return (
              <Card key={phase}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                  <Lbl icon={icon} mb={0}>{label} PROTOCOL</Lbl>
                  <span style={{ fontSize: 11, fontWeight: 700, color: PA.p, fontFamily: ORB }}>{done.length}/{rituals.length}</span>
                </div>
                {rituals.map((r, i) => {
                  const on = done.includes(i);
                  return (
                    <div key={i} onClick={() => toggleRitual(phase, i)} style={{
                      display: "flex", gap: 10, alignItems: "flex-start", padding: "10px",
                      background: on ? PA.dim : M.surface, borderRadius: 10,
                      border: `1.5px solid ${on ? PA.p + "40" : M.border}`, marginBottom: 6,
                      cursor: "pointer", transition: "all 0.2s",
                    }}>
                      <div style={{ width: 18, height: 18, borderRadius: 5, border: `2px solid ${on ? PA.p : "#3A3550"}`, background: on ? PA.p : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                        {on && <span style={{ color: "#000", fontSize: 10, fontWeight: 900 }}>✓</span>}
                      </div>
                      <span style={{ fontSize: 15, flexShrink: 0 }}>{r.e}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: on ? PA.p : M.text, fontFamily: RAJ }}>{r.n}</div>
                        <div style={{ fontSize: 10, color: M.textLow, fontFamily: RAJ, lineHeight: 1.5 }}>{r.d}</div>
                        <div style={{ fontSize: 9, color: on ? PA.p : M.textLow, fontFamily: ORB, marginTop: 3 }}>+{r.xp} XP</div>
                      </div>
                    </div>
                  );
                })}
              </Card>
            );
          })}
        </div>
      )}

      {/* MISSIONS */}
      {subTab === "missions" && <MissionsPanel profile={profile} dispatch={dispatch} />}

      {/* FOCUS TIMER */}
      {subTab === "timer" && (
        <Card glass>
          <Lbl icon="⏱" mb={14}>FOCUS TIMER</Lbl>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 56, fontWeight: 900, color: timerRun ? PA.p : M.text, fontFamily: ORB, letterSpacing: "0.05em", transition: "color 0.3s" }}>
              {String(mins).padStart(2, "0")}:{String(secs).padStart(2, "0")}
            </div>
            <div style={{ fontSize: 10, color: M.textLow, fontFamily: ORB }}>
              {timerRun ? "IN SESSION" : "READY"}
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
            {[25, 45, 60, 90].map(m => (
              <Btn key={m} onClick={() => { setTimerSec(m * 60); setTimerRun(false); }} variant={timerSec === m * 60 ? "primary" : "ghost"} style={{ flex: 1, fontFamily: ORB, fontSize: 10 }}>{m}m</Btn>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={() => setTimerRun(r => !r)} variant="primary" full icon={timerRun ? "⏸" : "▶"} style={{ fontFamily: ORB }}>
              {timerRun ? "PAUSE" : "START"}
            </Btn>
            <Btn onClick={() => { setTimerRun(false); setTimerSec(1500); }} variant="ghost" style={{ fontFamily: ORB }}>RESET</Btn>
          </div>
        </Card>
      )}
    </div>
  );
}


function MissionsPanel({ profile, dispatch }) {
  const missions = profile?.dailyMissions||[];
  const completed = profile?.completedMissions||{};
  function complete(m){if(completed[m.id])return;snd("unlock");dispatch({type:"COMPLETE_MISSION",payload:{id:m.id,xp:m.xp,ap:m.ap,bossDmg:m.bossDmg}});}
  return (
    <>

  const [msgs, setMsgs] = useState([]);

  const endRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs,loading]);
  function buildSys(){return `You are THE SYSTEM — a powerful AI entity from a Solo Leveling-inspired universe. Speak with authority and wisdom.\n\nUser: ${profile?.name||"Hunter"} | Lv${profile?.level||0} | ${profile?.rank||"E"} Rank | ${profile?.class||"Unknown"}\nStats: ${STATS.map(s=>`${s.l}:${profile?.stats?.[s.key]?.value||0}`).join(", ")}\nStreak: ${profile?.streak||0} days | Aura: ${profile?.totalAura||0} (${getAuraStage(profile?.totalAura||0).label})\nMode: ${mode==="advisor"?"STRATEGIC ADVISOR — give direct powerful growth advice":mode==="scan"?"SYSTEM SCAN — analyze the user deeply and identify blind spots":"ELITE COACH — give specific daily action plans and habit optimization"}`;}
  async function send(){if(!input.trim()||loading)return;const um={role:"user",content:input.trim()};const nm=[...msgs,um];setMsgs(nm);setInput("");setLoading(true);snd("nav");try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildSys(),messages:nm})});const d=await r.json();const txt=d.content?.map(c=>c.text||"").join("")||"The System is silent.";setMsgs(m=>[...m,{role:"assistant",content:txt}]);snd("tick");}catch{setMsgs(m=>[...m,{role:"assistant",content:"Connection lost. Retry."}]);}setLoading(false);}
  const QP=["What is my biggest weakness?","Give me today's directive.","Analyze my hidden potential.","What skill should I unlock next?","Create a 30-day growth plan."];
  return(
    <div style={{animation:"fadeUp 0.4s ease",display:"flex",flexDirection:"column",height:"calc(100vh - 180px)",minHeight:400}}>
      <Card style={{marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:36,height:36,borderRadius:"50%",background:`linear-gradient(135deg,${PA.d},${PA.p})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:`0 0 16px ${PA.glow}`}}>🌀</div><div><div style={{fontSize:13,fontWeight:800,color:PA.p,fontFamily:ORB}}>SYSTEM ADVISOR</div><div style={{fontSize:10,color:M.textLow,fontFamily:RAJ}}>AI · Lv{profile?.level||0} analysis</div></div></div>
        <div style={{display:"flex",gap:6}}>{["advisor","scan","coach"].map(m=><Btn key={m} variant={mode===m?"accent":"ghost"} onClick={()=>setMode(m)} style={{flex:1,fontFamily:ORB,fontSize:9}}>{m==="advisor"?"🎯 ADVISOR":m==="scan"?"🔬 SCAN":"⚡ COACH"}</Btn>)}</div>
      </Card>
      <div style={{flex:1,overflowY:"auto",marginBottom:10,display:"flex",flexDirection:"column",gap:8}}>
        {msgs.length===0&&<div style={{textAlign:"center",padding:"24px 16px"}}><div style={{fontSize:36,marginBottom:12,animation:"glowPulse 3s infinite"}}>🌀</div><div style={{fontSize:13,fontWeight:700,color:PA.p,fontFamily:ORB,marginBottom:8}}>THE SYSTEM AWAITS</div><div style={{display:"flex",flexDirection:"column",gap:5}}>{QP.map((qp,i)=><div key={i} onClick={()=>{setInput(qp);inputRef.current?.focus();}} style={{padding:"9px 12px",background:M.surface,borderRadius:9,border:`1px solid ${M.border}`,cursor:"pointer",fontSize:12,color:M.textMid,fontFamily:RAJ,textAlign:"left"}}>{qp}</div>)}</div></div>}
        {msgs.map((m,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",flexDirection:m.role==="user"?"row-reverse":"row"}}><div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,background:m.role==="user"?PA.dim:"#1A1228",border:`1px solid ${m.role==="user"?PA.p+"44":M.border}`}}>{m.role==="user"?"👤":"🌀"}</div><div style={{maxWidth:"80%",padding:"10px 12px",borderRadius:12,background:m.role==="user"?PA.dim:M.card,border:`1px solid ${m.role==="user"?PA.p+"30":M.border}`}}><div style={{fontSize:12,color:m.role==="user"?PA.p:M.text,lineHeight:1.75,fontFamily:RAJ,whiteSpace:"pre-wrap"}}>{m.content}</div></div></div>)}
        {loading&&<div style={{display:"flex",gap:8,alignItems:"center"}}><div style={{width:28,height:28,borderRadius:"50%",background:"#1A1228",border:`1px solid ${M.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🌀</div><div style={{padding:"10px 14px",background:M.card,borderRadius:12,border:`1px solid ${M.border}`}}><div style={{display:"flex",gap:4}}>{[0,1,2].map(j=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:PA.p,animation:`blink 1.2s ease infinite ${j*0.2}s`,opacity:0.4}}/>)}</div></div></div>}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:8,padding:"10px",background:M.card,borderRadius:12,border:`1px solid ${M.border}`}}>
        <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),send())} placeholder="Speak to The System..." rows={2} style={{flex:1,background:"transparent",border:"none",outline:"none",color:M.text,fontSize:13,resize:"none",fontFamily:RAJ,lineHeight:1.6}}/>
        <Btn onClick={send} variant="primary" disabled={loading||!input.trim()} style={{alignSelf:"flex-end",fontFamily:ORB,padding:"9px 14px"}}>▶</Btn>
      </div>
    </div>
  );
}

  "Name three specific things your body did today that you take for granted.",

function JournalTab({ profile, dispatch }) {
  const [mode, setMode] = useState("write"); // write | history | insights
  const [entry, setEntry] = useState("");
  const [mood, setMood] = useState(5);
  const [tags, setTags] = useState([]);
  const [prompt, setPrompt] = useState(null);
  const [gratMode, setGratMode] = useState(false);
  const [searchQ, setSearchQ] = useState("");
  const [aiSummary, setAiSummary] = useState("");
  const [summaryLoading, setSummaryLoading] = useState(false);
  const today = new Date().toISOString().slice(0,10);

  const entries = profile?.journalEntries || [];
  const MOOD_EMOJIS = ["💀","😞","😔","😐","🙂","😊","😄","🔥","⚡","👑"];
  const MOOD_LABELS = ["Destroyed","Bad","Low","Neutral","Okay","Good","Great","On fire","Electric","Transcendent"];
  const TAG_OPTIONS = ["Win","Loss","Reflection","Gratitude","Goals","Relationships","Health","Work","Mindset","Breakthrough"];

  const todayEntry = entries.find(e => e.date === today);
  const journalStreak = (() => {
    let s = 0;
    for(let i = 0; ; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      if(entries.some(e => e.date === ds)) s++; else break;
    }
    return s;
  })();

  function pickPrompt() {
    const pool = gratMode ? GRATITUDE_PROMPTS : JOURNAL_PROMPTS_V2;
    setPrompt(pool[Math.floor(Math.random() * pool.length)]);
    snd("open");
  }

  function saveEntry() {
    if(!entry.trim()) return;
    const words = entry.trim().split(/\s+/).length;
    const xpEarned = Math.min(100, 20 + Math.floor(words / 10) * 5);
    const newEntry = {
      id: Date.now().toString(),
      date: today,
      text: entry.trim(),
      mood,
      tags,
      prompt: prompt || null,
      words,
      timestamp: new Date().toISOString(),
    };
    const updP = {
      ...profile,
      journalEntries: [...entries, newEntry],
      xpCurrent: (profile.xpCurrent||0) + xpEarned,
      totalXP: (profile.totalXP||0) + xpEarned,
    };
    dispatch({ type:"SET_PROFILE", payload: updP });
    setEntry(""); setTags([]); setPrompt(null); setMood(5);
    snd("xp");
  }

  async function generateInsights() {
    if(summaryLoading || entries.length < 3) return;
    setSummaryLoading(true);
    const recent = [...entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    const text = recent.map(e=>`[${e.date} mood:${e.mood}/10] ${e.text}`).join("\n\n");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:500,
          messages:[{role:"user",content:`You are a clinical psychologist reading a person's journal entries. Analyze these 10 most recent entries and provide:
1. Key emotional patterns (2-3 sentences)
2. What they're avoiding or not saying (1-2 sentences)  
3. One specific insight about their growth or stagnation
4. One question they should sit with

Be direct, insightful, not generic. Reference specific things they wrote.

Journal entries:
${text}`}]
        })
      });
      const data = await res.json();
      setAiSummary(data.content?.[0]?.text || "Analysis unavailable.");
    } catch { setAiSummary("Network error."); }
    setSummaryLoading(false);
  }

  const filteredEntries = entries.filter(e =>
    !searchQ || e.text.toLowerCase().includes(searchQ.toLowerCase()) ||
    e.tags?.some(t => t.toLowerCase().includes(searchQ.toLowerCase()))
  ).sort((a,b) => b.date.localeCompare(a.date));

  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      {/* Header stats */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {l:"ENTRIES",v:entries.length,e:"📔"},
          {l:"STREAK",v:journalStreak+"d",e:"🔥"},
          {l:"AVG MOOD",v:entries.length?(entries.reduce((a,e)=>a+e.mood,0)/entries.length).toFixed(1):"—",e:"💭"},
        ].map(s=>(
          <div key={s.l} style={{flex:1,textAlign:"center",padding:"10px 4px",background:M.surface,borderRadius:12,border:`1px solid ${M.border}`}}>
            <div style={{fontSize:18,marginBottom:2}}>{s.e}</div>
            <div style={{fontSize:16,fontWeight:900,color:PA.p,fontFamily:ORB}}>{s.v}</div>
            <div style={{fontSize:7,color:M.textLow,fontFamily:ORB,letterSpacing:"0.08em"}}>{s.l}</div>
          </div>

            {prompt && (

          <Card>

              {TAG_OPTIONS.map(t=>(

                  padding:"5px 10px",borderRadius:20,border:`1px solid ${tags.includes(t)?PA.p+"66":M.border}`,

      )}

      {/* HISTORY MODE */}
      {mode==="history" && (
        <div style={{animation:"fadeUp 0.3s ease"}}>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search entries..."
            style={{width:"100%",background:M.input,border:`1px solid ${M.border}`,borderRadius:10,padding:"10px 14px",color:M.text,fontFamily:RAJ,fontSize:12,outline:"none",marginBottom:12}}

          {filteredEntries.map(e=>(
            <Card key={e.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{MOOD_EMOJIS[e.mood-1]}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:PA.p,fontFamily:ORB}}>{e.date}</div>

        <div style={{animation:"fadeUp 0.3s ease"}}>
          {entries.length > 0 && (
            <Card>
              <Lbl icon="📈" mb={12}>MOOD TIMELINE</Lbl>
              <MoodTimeline entries={[...entries].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30)} w={320} h={80}/>
            </Card>
          )}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Lbl icon="🧠" mb={0}>AI PATTERN ANALYSIS</Lbl>
              <Btn variant="accent" onClick={generateInsights} disabled={entries.length<3||summaryLoading} style={{fontSize:9,padding:"6px 12px",fontFamily:ORB}}>
                {summaryLoading?"READING...":"ANALYZE"}

            </div>
            {entries.length < 3 && <div style={{fontSize:11,color:M.textLow,fontFamily:RAJ}}>Write at least 3 entries to unlock AI pattern analysis.</div>}
            {aiSummary && (
              <div style={{fontSize:12,color:M.textMid,fontFamily:RAJ,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{aiSummary}</div>

            {!aiSummary && entries.length >= 3 && !summaryLoading && (
              <div style={{fontSize:11,color:M.textLow,fontFamily:RAJ}}>Click ANALYZE to get a psychologist-level read on your patterns.</div>
            )}
          </Card>
          {entries.length > 0 && (
            <Card>
              <Lbl icon="🏷️" mb={12}>TAG BREAKDOWN</Lbl>
              {TAG_OPTIONS.filter(t=>entries.some(e=>e.tags?.includes(t))).map(t=>{
                const count = entries.filter(e=>e.tags?.includes(t)).length;
                const pct = Math.round(count/entries.length*100);

                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:M.textMid,fontFamily:RAJ}}>{t}</span>
                      <span style={{fontSize:10,color:PA.p,fontFamily:ORB,fontWeight:700}}>{count}x</span>
                    </div>
                    <div style={{height:4,background:M.surface,borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:PA.p,borderRadius:99,transition:"width 0.8s ease"}}/>
                    </div>
                  </div>
                );
              })}
            </Card>
          )}
        </div>
      )}
    </div>
  );
}

function QuestsTab({ profile, dispatch }) {
  const [activeChain, setActiveChain] = useState(null);
  const [filter, setFilter] = useState("all"); // all | active | done

  const completedQuests = profile?.completedQuests || {};
  const today = new Date().toISOString().slice(0,10);

  function checkQuestProgress(quest) {
    const stats = profile?.stats || {};
    const entries = profile?.journalEntries || [];
    const sessions = profile?.trainingSessions || [];
    const streak = profile?.streak || 0;
    const ap = profile?.totalAura || 0;

    switch(quest.type) {
      case "habits_day": {
        const allDates = Object.keys(profile?.habits||{});
        const perfect = allDates.filter(d=>Object.values(profile.habits[d]||{}).filter(Boolean).length>=6).length;
        return {current: perfect, pct: Math.min(100,Math.round(perfect/quest.target*100))};
      }
      case "habits_streak": return {current:streak, pct:Math.min(100,Math.round(streak/quest.target*100))};
      case "habit_streak": return {current:streak, pct:Math.min(100,Math.round(streak/quest.target*100))};
      case "journal_entry": case "journal_entries": return {current:entries.length, pct:Math.min(100,Math.round(entries.length/quest.target*100))};
      case "journal_streak": {
        let s=0; for(let i=0;;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(entries.some(e=>e.date===ds))s++;else break;}
        return {current:s, pct:Math.min(100,Math.round(s/quest.target*100))};
      }
      case "training_sessions": return {current:sessions.length, pct:Math.min(100,Math.round(sessions.length/quest.target*100))};
      case "total_ap": return {current:ap, pct:Math.min(100,Math.round(ap/quest.target*100))};
      case "stat_threshold": return {current:stats[quest.statKey]?.value||0, pct:Math.min(100,Math.round((stats[quest.statKey]?.value||0)/quest.target*100))};
      case "boss_defeated": return {current:(profile?.defeatedBosses||[]).length, pct:Math.min(100,(profile?.defeatedBosses||[]).length/quest.target*100)};
      case "days_in_system": {
        const firstDate = profile?.firstScanDate || today;
        const days = Math.floor((new Date(today)-new Date(firstDate))/86400000)+1;
        return {current:days, pct:Math.min(100,Math.round(days/quest.target*100))};
      }
      default: return {current:0, pct:0};
    }
  }

  function completeQuest(chainId, questId, xp, ap) {
    const updated = {...completedQuests, [questId]:{date:today,chainId}};
    dispatch({type:"SET_PROFILE",payload:{
      ...profile,
      completedQuests: updated,
      xpCurrent: (profile.xpCurrent||0)+xp,
      totalXP: (profile.totalXP||0)+xp,
      totalAura: (profile.totalAura||0)+ap,
    }});
    snd("unlock");
  }

  const totalQuests = QUEST_CHAINS_V2.reduce((a,c)=>a+c.quests.length,0);
  const completedCount = Object.keys(completedQuests).length;

  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      {/* Progress header */}
      <Card style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <Lbl icon="🗡️" mb={0}>QUEST PROGRESS</Lbl>
          <span style={{fontSize:11,color:PA.p,fontFamily:ORB,fontWeight:700}}>{completedCount}/{totalQuests}</span>
        </div>
        <div style={{height:6,background:M.surface,borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.round(completedCount/totalQuests*100)}%`,background:`linear-gradient(90deg,${PA.d},${PA.p})`,borderRadius:99,transition:"width 1s ease"}}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:12}}>
          {["all","active","done"].map(f=>(
            <Btn key={f} variant={filter===f?"primary":"ghost"} onClick={()=>setFilter(f)} style={{flex:1,fontSize:9,fontFamily:ORB}}>
              {f.toUpperCase()}
            </Btn>
          ))}
        </div>
      </Card>

      {/* Quest chains */}
      {QUEST_CHAINS_V2.map(chain=>{
        const chainDone = chain.quests.filter(q=>completedQuests[q.id]).length;
        const allDone = chainDone === chain.quests.length;
        if(filter==="done" && !allDone) return null;
        if(filter==="active" && allDone) return null;
        const isOpen = activeChain===chain.id;
        return (
          <div key={chain.id} style={{marginBottom:10}}>
            <div onClick={()=>{setActiveChain(isOpen?null:chain.id);snd("open");}} style={{
              padding:"14px 16px",background:M.surface,borderRadius:12,cursor:"pointer",
              border:`1px solid ${isOpen?chain.color+"44":M.border}`,
              background:isOpen?`${chain.color}08`:M.surface,
              transition:"all 0.2s"
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:`${chain.color}20`,border:`1.5px solid ${chain.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>
                    {chain.e}
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:800,color:isOpen?chain.color:M.text,fontFamily:ORB,letterSpacing:"0.05em"}}>{chain.name}</div>
                    <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ,marginTop:2}}>{chain.desc}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,fontWeight:700,color:allDone?"#22C55E":chain.color,fontFamily:ORB}}>{chainDone}/{chain.quests.length}</div>
                  <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>{allDone?"COMPLETE":"IN PROGRESS"}</div>
                </div>
              </div>
              {/* Chain progress bar */}
              <div style={{height:3,background:M.border,borderRadius:99,marginTop:10,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.round(chainDone/chain.quests.length*100)}%`,background:chain.color,borderRadius:99,transition:"width 0.8s ease"}}/>
              </div>
            </div>

            {/* Quest list */}
            {isOpen && (
              <div style={{marginTop:2,display:"flex",flexDirection:"column",gap:6,animation:"fadeUp 0.2s ease"}}>
                {chain.quests.map((quest,qi)=>{
                  const done = !!completedQuests[quest.id];
                  const prev = qi===0 || !!completedQuests[chain.quests[qi-1].id];
                  const locked = !prev && !done;
                  const prog = checkQuestProgress(quest);
                  const canComplete = prog.pct>=100 && !done && !locked;

                  return (
                    <div key={quest.id} style={{
                      padding:"12px 14px",borderRadius:10,background:M.card,
                      border:`1px solid ${done?"#22C55E33":locked?M.border:chain.color+"33"}`,
                      opacity:locked?0.4:1,
                      transition:"all 0.2s"
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{
                          width:36,height:36,borderRadius:9,flexShrink:0,
                          background:done?"#22C55E20":locked?"#33333360":`${chain.color}20`,
                          border:`1.5px solid ${done?"#22C55E44":locked?M.border:`${chain.color}44`}`,
                          display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
                          filter:done?"none":locked?"grayscale(1)":"none"
                        }}>{done?"✅":locked?"🔒":quest.e}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:700,color:done?"#22C55E":locked?M.textLow:M.text,fontFamily:ORB}}>{quest.n}</div>
                          <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ,marginTop:2}}>{quest.d}</div>
                          <div style={{fontSize:9,color:chain.color,fontFamily:ORB,marginTop:3}}>+{quest.xp}XP · +{quest.ap}AP</div>
                        </div>
                        {!done && !locked && (
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontSize:11,fontWeight:700,color:prog.pct>=100?"#22C55E":chain.color,fontFamily:ORB}}>{prog.pct}%</div>
                            <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>{prog.current}/{quest.target}</div>
                          </div>
                        )}
                      </div>
                      {!done && !locked && (
                        <div style={{marginTop:8}}>
                          <div style={{height:3,background:M.surface,borderRadius:99,overflow:"hidden",marginBottom:6}}>
                            <div style={{height:"100%",width:`${prog.pct}%`,background:prog.pct>=100?"#22C55E":chain.color,borderRadius:99,transition:"width 0.8s ease"}}/>
                          </div>
                          {canComplete && (
                            <Btn variant="primary" onClick={()=>completeQuest(chain.id,quest.id,quest.xp,quest.ap)} style={{width:"100%",fontSize:10,fontFamily:ORB,marginTop:4}}>
                              ⚡ CLAIM REWARD
                            </Btn>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════
// FEATURE BLOCK 3 — TRAINING LOG (Features 29-44)
// ════════════════════════════════════════════════════════════════════
// F29: Session logger (type, duration, intensity)
// F30: 15 training types with stat bonuses
// F31: Weekly volume tracker
// F32: Training heatmap (7-day)
// F33: Personal records system
// F34: XP from training (formula-based)
// F35: Training notes field
// F36: Consistency score
// F37: Dominant modality badge
// F38: Training history with filters
// F39: Streak for training
// F40: Body-stat auto-update from training
// F41: Rest day tracking
// F42: Training goals (per week targets)
// F43: Quick-log mode
// F44: Monthly volume chart

const TRAINING_TYPES_V2 = [
  {id:"weights",n:"Weight Training",e:"🏋️",stat:"power",xpMult:1.2,color:"#EF4444",desc:"Compound and isolation lifts"},
  {id:"cardio",n:"Cardio / Running",e:"🏃",stat:"speed",xpMult:1.0,color:"#F59E0B",desc:"Sustained aerobic effort"},
  {id:"hiit",n:"HIIT",e:"⚡",stat:"speed",xpMult:1.3,color:"#F97316",desc:"High-intensity intervals"},
  {id:"calisthenics",n:"Calisthenics",e:"💪",stat:"power",xpMult:1.1,color:"#8B5CF6",desc:"Bodyweight mastery"},
  {id:"mma",n:"MMA / Martial Arts",e:"🥊",stat:"resilience",xpMult:1.4,color:"#EC4899",desc:"Combat training"},
  {id:"yoga",n:"Yoga / Mobility",e:"🧘",stat:"focus",xpMult:0.9,color:"#6366F1",desc:"Flexibility and mind-body"},
  {id:"swim",n:"Swimming",e:"🏊",stat:"speed",xpMult:1.1,color:"#0EA5E9",desc:"Full-body low-impact"},
  {id:"cold",n:"Cold Exposure",e:"🧊",stat:"resilience",xpMult:1.5,color:"#38BDF8",desc:"Cold showers/ice baths"},
  {id:"cycling",n:"Cycling",e:"🚴",stat:"speed",xpMult:1.0,color:"#22C55E",desc:"Road or indoor cycling"},
  {id:"climb",n:"Rock Climbing",e:"🧗",stat:"power",xpMult:1.3,color:"#A78BFA",desc:"Strength + problem solving"},
  {id:"sports",n:"Team Sports",e:"⚽",stat:"social",xpMult:1.0,color:"#34D399",desc:"Competitive team activity"},
  {id:"sauna",n:"Sauna / Heat",e:"🔥",stat:"resilience",xpMult:0.8,color:"#FB7185",desc:"Heat adaptation protocol"},
  {id:"dance",n:"Dance",e:"💃",stat:"aura",xpMult:1.0,color:"#C084FC",desc:"Movement and expression"},
  {id:"hike",n:"Hiking / Walking",e:"🥾",stat:"resilience",xpMult:0.7,color:"#84CC16",desc:"Outdoor endurance"},
  {id:"breathwork",n:"Breathwork",e:"🌬️",stat:"focus",xpMult:1.2,color:"#67E8F9",desc:"Wim Hof, box breathing"},
];

function TrainingTab({ profile, dispatch }) {
  const [view, setView] = useState("log"); // log | history | stats
  const [selType, setSelType] = useState(null);
  const [duration, setDuration] = useState(45);
  const [intensity, setIntensity] = useState(7);
  const [notes, setNotes] = useState("");
  const [weekGoal, setWeekGoal] = useState(profile?.weeklyTrainingGoal || 4);

  const sessions = profile?.trainingSessions || [];
  const today = new Date().toISOString().slice(0,10);

  // Last 7 days
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const ds = d.toISOString().slice(0,10);
    const daySessions = sessions.filter(s=>s.date===ds);
    return {date:ds, count:daySessions.length, intensity: daySessions.length ? Math.round(daySessions.reduce((a,s)=>a+s.intensity,0)/daySessions.length) : 0, label:["S","M","T","W","T","F","S"][d.getDay()]};
  });

  const weekSessions = sessions.filter(s=>{
    const d=new Date(s.date), n=new Date();
    return (n-d)/86400000<=7;
  });
  const weekVolume = weekSessions.reduce((a,s)=>a+s.duration,0);

  // Dominant modality
  const typeCounts = sessions.reduce((acc,s)=>{acc[s.typeId]=(acc[s.typeId]||0)+1;return acc;},{});
  const topType = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
  const dominantType = topType ? TRAINING_TYPES_V2.find(t=>t.id===topType[0]) : null;

  // Consistency score (last 30 days)
  const last30sessions = sessions.filter(s=>{const d=new Date(s.date),n=new Date();return(n-d)/86400000<=30;}).length;
  const consistencyScore = Math.min(100, Math.round((last30sessions/30)*100*2));

  function logSession() {
    if(!selType) return;
    const type = TRAINING_TYPES_V2.find(t=>t.id===selType);
    const xpBase = Math.round(duration * 0.8 * type.xpMult * (intensity/7));
    const session = {
      id: Date.now().toString(),
      date: today,
      typeId: selType,
      typeName: type.n,
      typeEmoji: type.e,
      duration,
      intensity,
      notes: notes.trim(),
      xpEarned: xpBase,
      statKey: type.stat,
      timestamp: new Date().toISOString(),
    };
    // Update stat slightly
    const statDelta = Math.round((intensity/10) * (duration/60) * 0.5);
    const updatedStats = {...profile.stats};
    if(updatedStats[type.stat]) {
      updatedStats[type.stat] = {...updatedStats[type.stat], value: Math.min(100, updatedStats[type.stat].value + statDelta)};
    }
    dispatch({type:"SET_PROFILE",payload:{
      ...profile,
      trainingSessions: [...sessions, session],
      xpCurrent: (profile.xpCurrent||0)+xpBase,
      totalXP: (profile.totalXP||0)+xpBase,
      stats: updatedStats,
    }});
    setNotes(""); setSelType(null); setIntensity(7); setDuration(45);
    snd("xp");
  }

  const intensityColor = intensity>=8?"#EF4444":intensity>=5?PA.p:"#22C55E";

  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      {/* Header */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[
          {l:"SESSIONS",v:sessions.length,e:"💪",c:PA.p},
          {l:"THIS WEEK",v:weekSessions.length+"/"+weekGoal,e:"📅",c:weekSessions.length>=weekGoal?"#22C55E":PA.p},
          {l:"VOLUME",v:weekVolume+"m",e:"⏱",c:"#F59E0B"},
          {l:"CONSISTENCY",v:consistencyScore+"%",e:"📊",c:consistencyScore>=70?"#22C55E":PA.p},
        ].map(s=>(
          <div key={s.l} style={{flex:1,textAlign:"center",padding:"8px 2px",background:M.surface,borderRadius:10,border:`1px solid ${M.border}`}}>
            <div style={{fontSize:14,marginBottom:1}}>{s.e}</div>
            <div style={{fontSize:12,fontWeight:900,color:s.c,fontFamily:ORB,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:6,color:M.textLow,fontFamily:ORB,letterSpacing:"0.06em",marginTop:1}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* 7-day heatmap */}
      <Card style={{marginBottom:12}}>
        <Lbl icon="📅" mb={10}>THIS WEEK</Lbl>
        <div style={{display:"flex",gap:4}}>
          {last7.map((d,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{
                height:40,borderRadius:8,marginBottom:4,
                background:d.count>0?`rgba(${parseInt(PA.p.slice(1,3),16)},${parseInt(PA.p.slice(3,5),16)},${parseInt(PA.p.slice(5,7),16)},${0.2+d.intensity/10*0.7})`:M.surface,
                border:d.date===today?`1.5px solid ${PA.p}`:"1px solid transparent",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:d.count>0?16:10,color:d.count>0?"white":M.textLow,
              }}>
                {d.count>0?(d.count>1?"💪💪":"💪"):"·"}
              </div>
              <div style={{fontSize:8,color:d.date===today?PA.p:M.textLow,fontFamily:ORB}}>{d.label}</div>
            </div>
          ))}
        </div>
        {dominantType && (
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:M.surface,borderRadius:8}}>
            <span style={{fontSize:16}}>{dominantType.e}</span>
            <div>
              <div style={{fontSize:10,color:dominantType.color,fontFamily:ORB,fontWeight:700}}>DOMINANT: {dominantType.n.toUpperCase()}</div>
              <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ}}>{topType[1]} sessions total</div>
            </div>
          </div>
        )}
      </Card>

      {/* View tabs */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["log","⚡ LOG"],["history","📚 HISTORY"],["stats","📊 STATS"]].map(([v,l])=>(
          <Btn key={v} variant={view===v?"primary":"ghost"} onClick={()=>setView(v)} style={{flex:1,fontSize:9,fontFamily:ORB}}>{l}</Btn>
        ))}
      </div>

      {/* LOG SESSION */}
      {view==="log" && (
        <div style={{animation:"fadeUp 0.3s ease"}}>
          <Card>
            <Lbl icon="💪" mb={12}>SESSION TYPE</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {TRAINING_TYPES_V2.map(t=>(
                <button key={t.id} onClick={()=>{setSelType(t.id);snd("tick");}} style={{
                  padding:"8px 4px",borderRadius:10,border:`1.5px solid ${selType===t.id?t.color+"66":M.border}`,
                  background:selType===t.id?`${t.color}18`:M.surface,cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                  transition:"all 0.15s",transform:selType===t.id?"scale(1.04)":"scale(1)"
                }}>
                  <span style={{fontSize:18}}>{t.e}</span>
                  <span style={{fontSize:8,color:selType===t.id?t.color:M.textLow,fontFamily:ORB,fontWeight:700,textAlign:"center",lineHeight:1.2}}>{t.n.toUpperCase()}</span>
                </button>
              ))}
            </div>
          </Card>

          <Card>
            <Lbl icon="⏱" mb={12}>DURATION: {duration} MIN</Lbl>
            <input type="range" min={10} max={180} step={5} value={duration}
              onChange={e=>setDuration(+e.target.value)}
              style={{width:"100%",accentColor:PA.p,marginBottom:6}}
            />
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:M.textLow,fontFamily:ORB}}>
              <span>10m</span><span>45m</span><span>90m</span><span>3h</span>
            </div>
          </Card>

          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Lbl icon="🌡️" mb={0}>INTENSITY</Lbl>
              <span style={{fontSize:16,fontWeight:900,color:intensityColor,fontFamily:ORB}}>{intensity}/10</span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {Array.from({length:10},(_,i)=>(
                <div key={i} onClick={()=>{setIntensity(i+1);snd("tick");}} style={{
                  flex:1,height:32,borderRadius:6,cursor:"pointer",
                  background:i<intensity?`rgba(${i<4?34+i*30:i<7?200:239},${i<4?197:i<7?100:68},${i<4?94:30},${0.4+i*0.06})`:M.surface,
                  border:i<intensity?`1px solid ${intensityColor}44`:"1px solid transparent",
                  transition:"all 0.1s",
                }}/>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:M.textLow,fontFamily:ORB,marginTop:4}}>
              <span>EASY</span><span>MODERATE</span><span>HARD</span><span>MAX</span>
            </div>
          </Card>

          <Card>
            <Lbl icon="📝" mb={8}>NOTES (optional)</Lbl>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} placeholder="PRs, how you felt, what you did..."
              style={{width:"100%",background:M.input,border:`1px solid ${M.border}`,borderRadius:8,padding:"8px 10px",color:M.text,fontFamily:RAJ,fontSize:12,resize:"none",outline:"none"}}
            />
          </Card>

          {selType && (
            <div style={{padding:"10px 12px",background:PA.dim,borderRadius:10,marginBottom:12,border:`1px solid ${PA.p}33`}}>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,fontWeight:700}}>
                XP PREVIEW: +{Math.round(duration*0.8*(TRAINING_TYPES_V2.find(t=>t.id===selType)?.xpMult||1)*(intensity/7))} XP
              </div>
              <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ,marginTop:2}}>
                Stat boost: {TRAINING_TYPES_V2.find(t=>t.id===selType)?.stat} +{Math.round((intensity/10)*(duration/60)*0.5)}
              </div>
            </div>
          )}

          <Btn variant="primary" onClick={logSession} disabled={!selType} full icon="⚡" style={{fontFamily:ORB,padding:"14px"}}>
            LOG SESSION
          </Btn>
        </div>
      )}

      {/* HISTORY */}
      {view==="history" && (
        <div style={{animation:"fadeUp 0.3s ease"}}>
          {sessions.length===0 && <div style={{textAlign:"center",color:M.textLow,fontFamily:RAJ,padding:"40px 0"}}>No sessions logged yet. Start training.</div>}
          {[...sessions].reverse().slice(0,30).map(s=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:M.surface,borderRadius:10,marginBottom:8,border:`1px solid ${M.border}`}}>
              <div style={{width:36,height:36,borderRadius:9,background:`${TRAINING_TYPES_V2.find(t=>t.id===s.typeId)?.color||PA.p}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                {s.typeEmoji}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:M.text,fontFamily:ORB}}>{s.typeName}</div>
                <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ,marginTop:1}}>{s.date} · {s.duration}min · intensity {s.intensity}/10</div>
                {s.notes && <div style={{fontSize:10,color:M.textMid,fontFamily:RAJ,marginTop:3,fontStyle:"italic"}}>"{s.notes}"</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#22C55E",fontFamily:ORB}}>+{s.xpEarned}XP</div>
                <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>INT {s.intensity}/10</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* STATS */}
      {view==="stats" && (
        <div style={{animation:"fadeUp 0.3s ease"}}>
          <Card>
            <Lbl icon="📊" mb={12}>BY MODALITY</Lbl>
            {TRAINING_TYPES_V2.filter(t=>typeCounts[t.id]).sort((a,b)=>(typeCounts[b.id]||0)-(typeCounts[a.id]||0)).map(t=>{
              const count = typeCounts[t.id]||0;
              const totalVol = sessions.filter(s=>s.typeId===t.id).reduce((a,s)=>a+s.duration,0);
              const pct = sessions.length ? Math.round(count/sessions.length*100) : 0;
              return (
                <div key={t.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <span style={{fontSize:14}}>{t.e}</span>
                    <span style={{fontSize:11,color:M.textMid,fontFamily:RAJ,fontWeight:600,flex:1}}>{t.n}</span>
                    <span style={{fontSize:10,color:t.color,fontFamily:ORB,fontWeight:700}}>{count}x · {totalVol}m</span>
                  </div>
                  <div style={{height:4,background:M.surface,borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:t.color,borderRadius:99,transition:"width 0.8s ease"}}/>
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      )}
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════
// FEATURE BLOCK 4 — FEATURES 45-100 (INTEGRATED SYSTEMS)
// ════════════════════════════════════════════════════════════════════
// F45: Psyche profile card (from scan deep fields)
// F46: Core wound display + healing path
// F47: Key strength spotlight
// F48: Predicted level trajectory
// F49: Life area radar (radar from all 15 sections)
// F50: Daily XP summary widget
// F51: Streak bonuses (+XP multiplier)
// F52: Level-up celebrations with stat breakdown
// F53: Rank unlock ceremonies
// F54: Aura stage progression display
// F55: Boss battle from profile tab
// F56: Mini-challenges (5min tasks) from advisor
// F57: Sleep tracker (hours + quality log)
// F58: Hydration/recovery logs
// F59: Weekly review modal (auto-opens Sunday)
// F60: Habit analytics (per-habit completion rates)
// F61: Identity statement builder
// F62: Vision board text (10-year vision from scan)

// ─── F50-F51: Daily XP Summary + Streak Multiplier ───────────────

function DailyXPWidget({ profile }) {
  const today = new Date().toISOString().slice(0,10);
  const todayHabits = profile?.habits?.[today] || {};
  const habitsDone = Object.values(todayHabits).filter(Boolean).length;
  const todaySessions = (profile?.trainingSessions||[]).filter(s=>s.date===today);
  const sessionXP = todaySessions.reduce((a,s)=>a+s.xpEarned,0);
  const habitXP = habitsDone * 10;
  const journalXP = (profile?.journalEntries||[]).filter(e=>e.date===today).length * 30;
  const questXP = 0; // would track from today's completions
  const totalToday = habitXP + sessionXP + journalXP;
  const streakMult = Math.min(2.0, 1 + (profile?.streak||0)*0.01);

  return (
    <Card>
      <Lbl icon="💠" mb={12}>TODAY'S XP</Lbl>
      {[
        {l:"Habits",v:habitsDone+" done",xp:habitXP,c:"#22C55E",e:"⚡"},
        {l:"Training",v:todaySessions.length+" sessions",xp:sessionXP,c:PA.p,e:"💪"},
        {l:"Journal",v:"entry",xp:journalXP,c:"#8B5CF6",e:"📔"},
      ].filter(s=>s.xp>0).map(s=>(
        <div key={s.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${M.border}22`}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>{s.e}</span>
            <div>
              <div style={{fontSize:11,color:M.textMid,fontFamily:RAJ,fontWeight:600}}>{s.l}</div>
              <div style={{fontSize:9,color:M.textLow,fontFamily:RAJ}}>{s.v}</div>
            </div>
          </div>
          <div style={{fontSize:12,fontWeight:700,color:s.c,fontFamily:ORB}}>+{s.xp} XP</div>
        </div>
      ))}
      <div style={{marginTop:10,padding:"8px 0",borderTop:`1px solid ${M.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:PA.p,fontFamily:ORB}}>TOTAL TODAY</div>
            {streakMult > 1 && <div style={{fontSize:9,color:"#F59E0B",fontFamily:ORB}}>🔥 ×{streakMult.toFixed(2)} STREAK BONUS</div>}
          </div>
          <div style={{fontSize:18,fontWeight:900,color:PA.p,fontFamily:ORB}}>+{Math.round(totalToday*streakMult)}</div>
        </div>
      </div>
    </Card>
  );
}

// ─── F57: Sleep Tracker ───────────────────────────────────────────

function SleepWidget({ profile, dispatch }) {
  const [hours, setHours] = useState(7);
  const [quality, setQuality] = useState(7);
  const [showLog, setShowLog] = useState(false);
  const today = new Date().toISOString().slice(0,10);
  const sleepLogs = profile?.sleepLogs || [];
  const todayLog = sleepLogs.find(l=>l.date===today);
  const avgHours = sleepLogs.length ? (sleepLogs.reduce((a,l)=>a+l.hours,0)/sleepLogs.length).toFixed(1) : "—";
  const avgQuality = sleepLogs.length ? (sleepLogs.reduce((a,l)=>a+l.quality,0)/sleepLogs.length).toFixed(1) : "—";

  function logSleep() {
    const log = {id:Date.now().toString(),date:today,hours,quality,timestamp:new Date().toISOString()};
    dispatch({type:"SET_PROFILE",payload:{...profile,sleepLogs:[...sleepLogs.filter(l=>l.date!==today),log]}});
    snd("tick");
  }

  const QUALITY_LABELS = ["","Terrible","Poor","Bad","Below avg","Average","Decent","Good","Great","Excellent","Perfect"];

  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <Lbl icon="🌙" mb={0}>SLEEP TRACKER</Lbl>
        <Btn variant="ghost" onClick={()=>setShowLog(s=>!s)} style={{fontSize:9,padding:"4px 8px"}}>{showLog?"HIDE":"LOG"}</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:showLog?12:0}}>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:10}}>
          <div style={{fontSize:16,marginBottom:2}}>😴</div>
          <div style={{fontSize:16,fontWeight:900,color:PA.p,fontFamily:ORB}}>{todayLog?.hours||avgHours}h</div>
          <div style={{fontSize:7,color:M.textLow,fontFamily:ORB}}>{todayLog?"LAST NIGHT":"AVG"}</div>
        </div>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:10}}>
          <div style={{fontSize:16,marginBottom:2}}>⭐</div>
          <div style={{fontSize:16,fontWeight:900,color:todayLog?.quality>=8?"#22C55E":todayLog?.quality>=6?PA.p:"#F59E0B",fontFamily:ORB}}>{todayLog?.quality||avgQuality}/10</div>
          <div style={{fontSize:7,color:M.textLow,fontFamily:ORB}}>QUALITY</div>
        </div>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:10}}>
          <div style={{fontSize:16,marginBottom:2}}>📈</div>
          <div style={{fontSize:16,fontWeight:900,color:PA.p,fontFamily:ORB}}>{sleepLogs.length}</div>
          <div style={{fontSize:7,color:M.textLow,fontFamily:ORB}}>LOGGED</div>
        </div>
      </div>
      {showLog && (
        <div style={{animation:"fadeUp 0.2s ease"}}>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:M.textLow,fontFamily:ORB,marginBottom:6}}>HOURS SLEPT: {hours}h</div>
            <input type="range" min={3} max={12} step={0.5} value={hours} onChange={e=>setHours(+e.target.value)} style={{width:"100%",accentColor:PA.p}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:M.textLow,fontFamily:ORB,marginBottom:6}}>QUALITY: {quality}/10 — {QUALITY_LABELS[quality]}</div>
            <input type="range" min={1} max={10} value={quality} onChange={e=>setQuality(+e.target.value)} style={{width:"100%",accentColor:PA.p}}/>
          </div>
          <Btn variant="primary" onClick={logSleep} full style={{fontSize:10,fontFamily:ORB}}>LOG SLEEP ✓</Btn>
        </div>
      )}
    </Card>
  );
}

// ─── F66-F67: Wins & Failure Log ─────────────────────────────────

function WinsAndFailsWidget({ profile, dispatch }) {
  const [mode, setMode] = useState("wins");
  const [input, setInput] = useState("");
  const today = new Date().toISOString().slice(0,10);
  const wins = profile?.winsLog || [];
  const fails = profile?.failsLog || [];

  function addEntry(type) {
    if(!input.trim()) return;
    const entry = {id:Date.now().toString(),date:today,text:input.trim()};
    const key = type==="win" ? "winsLog" : "failsLog";
    dispatch({type:"SET_PROFILE",payload:{...profile,[key]:[...(profile[key]||[]),entry],xpCurrent:(profile.xpCurrent||0)+(type==="win"?20:30),totalXP:(profile.totalXP||0)+(type==="win"?20:30)}});
    setInput(""); snd(type==="win"?"unlock":"tick");
  }

  return (
    <Card>
      <Lbl icon={mode==="wins"?"🏆":"💡"} mb={10}>{mode==="wins"?"WINS LOG":"FAILURES + LESSONS"}</Lbl>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <Btn variant={mode==="wins"?"primary":"ghost"} onClick={()=>setMode("wins")} style={{flex:1,fontSize:9,fontFamily:ORB}}>🏆 WINS</Btn>
        <Btn variant={mode==="fails"?"accent":"ghost"} onClick={()=>setMode("fails")} style={{flex:1,fontSize:9,fontFamily:ORB}}>💡 FAILS</Btn>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          placeholder={mode==="wins"?"Log a win, big or small...":"What failed? What did it teach?"}
          style={{flex:1,background:M.input,border:`1px solid ${M.border}`,borderRadius:8,padding:"8px 10px",color:M.text,fontFamily:RAJ,fontSize:12,outline:"none"}}
          onKeyDown={e=>e.key==="Enter"&&addEntry(mode==="wins"?"win":"fail")}
        />
        <Btn variant="primary" onClick={()=>addEntry(mode==="wins"?"win":"fail")} style={{padding:"8px 12px",fontSize:12}}>+</Btn>
      </div>
      {(mode==="wins"?wins:fails).slice(-5).reverse().map(e=>(
        <div key={e.id} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:`1px solid ${M.border}22`}}>
          <span style={{fontSize:14}}>{mode==="wins"?"⚡":"💡"}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:M.textMid,fontFamily:RAJ,lineHeight:1.5}}>{e.text}</div>
            <div style={{fontSize:8,color:M.textLow,fontFamily:ORB,marginTop:2}}>{e.date}</div>
          </div>
        </div>
      ))}
      {(mode==="wins"?wins:fails).length===0&&<div style={{fontSize:11,color:M.textLow,fontFamily:RAJ,textAlign:"center",padding:"10px"}}>Nothing logged yet.</div>}
    </Card>
  );
}

function LifeScoreTimeline({ profile }) {

    <Card>
