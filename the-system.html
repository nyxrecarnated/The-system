// CUSTOM PALETTE SETTER — for color wheel
// ═══════════════════════════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function buildCustomPalette(hex) {
  const { r, g, b } = hexToRgb(hex);
  const bright = `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},1)`;
  const dark = `rgba(${Math.round(r*0.4)},${Math.round(g*0.4)},${Math.round(b*0.4)},1)`;
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return {
    name: "CUSTOM",
    p: hex,
    s: bright,
    d: dark,
    glow: `rgba(${r},${g},${b},0.30)`,
    dim: `rgba(${r},${g},${b},0.09)`,
    txt: lum > 0.5 ? "#000000" : "#FFFFFF",
  };
}

const RANK_ORDER = ["E","D","C","B","A","S","SS","SSS"];
const getRank = (ap, stats) => {
  if (ap >= 1100 && stats && Object.keys(stats).length >= 15 && Object.values(stats).every(s => (s.value || 0) >= 90)) return "SSS";
  for (let i = RANK_ORDER.length - 2; i >= 0; i--) if (ap >= RANKS[RANK_ORDER[i]].min) return RANK_ORDER[i];
  return "E";
};
const qualifiesSSS = stats => stats && Object.keys(stats).length === 15 && Object.values(stats).every(s => (s.value || 0) >= 90);

const calcLifeScore = stats => {
  if (!stats) return 0;
  const v = Object.values(stats).map(s => s.value || 0);
  return Math.round(v.reduce((a, b) => a + b, 0) / v.length);
};
const calcSoul = stats => {
  if (!stats) return null;
  const avg = ["faith","character","identity","resilience","growthRate"].reduce((s,k) => s + (stats[k]?.value||0), 0) / 5;
  if (avg >= 85) return { rank:"S", label:"Enlightened Soul",  color:"#C084FC" };
  if (avg >= 70) return { rank:"A", label:"Purified Soul",     color:"#FFD700" };
  if (avg >= 55) return { rank:"B", label:"Striving Soul",     color:"#34D399" };
  if (avg >= 40) return { rank:"C", label:"Tested Soul",       color:"#60A5FA" };
  return { rank:"D", label:"Dormant Soul", color:"#64748B" };
};

const hStreak = (habits, id) => {
  let s = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.toISOString().split("T")[0];
    if (!habits[k]?.items?.[id]) break;
    s++;
  }
  return s;
};
const totalH = habits => Object.values(habits).reduce((s, d) => s + HABITS.filter(h => d.items?.[h.id]).length, 0);

      src.buffer = buf; src.connect(fi); fi.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, at); g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
      src.start(at); src.stop(at + dur + 0.02);
    };
    // A minor arpeggio helper
    const arpeggio = (notes, at, spacing, dur, w = "sine", vol = 0.04 * v) =>
      notes.forEach((n, i) => tone(A_MINOR[n % A_MINOR.length], w, at + i * spacing, dur, vol));

    switch (type) {
      case "tick":     tone(1100, "sine", t0, 0.04, 0.025 * v); break;
      case "nav":      tone(A_MINOR[4], "sine", t0, 0.05, 0.03 * v); tone(A_MINOR[7], "sine", t0 + 0.05, 0.07, 0.022 * v); break;
      case "back":     tone(A_MINOR[7], "sine", t0, 0.05, 0.028 * v); tone(A_MINOR[4], "sine", t0 + 0.05, 0.07, 0.02 * v); break;
      case "open":     arpeggio([0, 2, 4, 7], t0, 0.05, 0.1); break;
      case "close":    arpeggio([7, 4, 2, 0], t0, 0.04, 0.08); break;
      case "toggle":   tone(A_MINOR[2], "square", t0, 0.03, 0.015 * v); break;
      case "save":     arpeggio([0, 4, 7], t0, 0.06, 0.09); break;
      case "copy":     tone(A_MINOR[9], "sine", t0, 0.04, 0.03 * v); break;
      case "error":    tone(196, "sawtooth", t0, 0.08, 0.045 * v); tone(150, "sawtooth", t0 + 0.07, 0.11, 0.035 * v); break;
      case "scan":     [220,294,330,392,440,494,523].forEach((f,i)=>tone(f,"sine",t0+i*0.055,0.11,0.038*v)); ns(t0, 0.07, 600); break;
      case "scanEnd":  arpeggio([0,2,4,7,9,11,12], t0, 0.07, 0.16, "sine", 0.044*v); ns(t0+0.2,0.06,800); break;
      case "ach":      arpeggio([4,7,9,12], t0, 0.07, 0.15, "sine", 0.044*v); break;
      case "unlock":   arpeggio([0,4,7,9,12], t0, 0.06, 0.12, "triangle", 0.042*v); break;
      case "perfect":  arpeggio([0,2,4,5,7,9,11,12], t0, 0.05, 0.09, "sine", 0.036*v); ns(t0+0.1,0.1,900,0.015*v); break;
      case "ritual":   arpeggio([7,9,11,12], t0, 0.08, 0.18, "sine", 0.038*v); break;
      case "msg":      tone(A_MINOR[7], "sine", t0, 0.06, 0.018 * v); break;
      case "msgSend":  tone(A_MINOR[4], "sine", t0, 0.05, 0.018 * v); tone(A_MINOR[7], "sine", t0 + 0.04, 0.07, 0.014 * v); break;
      case "levelup":  [A_MINOR[0],A_MINOR[2],A_MINOR[4],A_MINOR[7],A_MINOR[9],A_MINOR[11],A_MINOR[12]].forEach((f,i)=>tone(f,"triangle",t0+i*0.09,0.22,0.044*v)); ns(t0+0.12,0.1,500,0.016*v); break;
      case "rankup":   A_MINOR.forEach((f,i)=>tone(f,"triangle",t0+i*0.09,0.26,0.044*v)); ns(t0,0.14,400,0.02*v); break;
      case "bossHit":  tone(130,"sawtooth",t0,0.05,0.05*v); tone(98,"sawtooth",t0+0.04,0.08,0.04*v); break;
      case "bossDefeat": arpeggio([0,2,4,7,9,11,12,14], t0, 0.08, 0.22, "sine", 0.048*v); ns(t0,0.2,300,0.018*v); break;
      case "dungeonEnter": tone(110,"triangle",t0,0.4,0.04*v); tone(82,"sine",t0,0.6,0.03*v); arpeggio([0,2,4], t0+0.3, 0.1, 0.25, "triangle", 0.03*v); break;
      case "equipSwap": arpeggio([2,4,7], t0, 0.07, 0.12, "sine", 0.032*v); break;
      case "forge":    tone(82,"sawtooth",t0,0.08,0.06*v); ns(t0+0.05,0.15,300,0.025*v); arpeggio([0,4,7,12], t0+0.2, 0.06, 0.14, "sine", 0.04*v); break;
    }
  } catch (e) { /* silent fail */ }
}

// ═══════════════════════════════════════════════════════════════════
// CUSTOM HOOKS
// ═══════════════════════════════════════════════════════════════════
function usePrevious(val) {
  const r = useRef(val);
  useEffect(() => { r.current = val; });
  return r.current;
}

function useAnimatedNumber(target, duration = 1200) {
  const [display, setDisplay] = useState(target);
  const prev = usePrevious(target);
  useEffect(() => {
    if (prev === target) return;
    const start = prev || 0, diff = target - start, startTime = performance.now();
    const raf = t => {
      const el = Math.min((t - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - el, 3);
      setDisplay(Math.round(start + diff * ease));
      if (el < 1) requestAnimationFrame(raf);
    };
    requestAnimationFrame(raf);
  }, [target]);
  return display;
}

function useFreshUnlocks(stats) {
  const prev = usePrevious(stats);
  return useMemo(() => {
    if (!prev || !stats) return [];
    const prevU = new Set(getUnlockedSkills(prev).map(s => s.id));
    return getUnlockedSkills(stats).filter(s => !prevU.has(s.id));
  }, [stats]);
}

// ═══════════════════════════════════════════════════════════════════
// PARTICLE NETWORK BACKGROUND — nodes + connections + fade
// ═══════════════════════════════════════════════════════════════════
function AnimatedBackground({ paletteColor }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  const nodesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const resize = () => {
      canvas.width  = window.innerWidth  * DPR;
      canvas.height = window.innerHeight * DPR;
      ctx.scale(DPR, DPR);
      initNodes();
    };

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    const NODE_COUNT = 55;
    const MAX_DIST = 160;
    const SPEED = 0.35;

    function initNodes() {
      nodesRef.current = Array.from({ length: NODE_COUNT }, () => ({
        x: Math.random() * W(),
        y: Math.random() * H(),
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
        r: 1.5 + Math.random() * 2,
        life: Math.random(),        // 0-1 fade phase
        lifeSpeed: 0.003 + Math.random() * 0.004,
        born: performance.now(),
      }));
    }

    const color = paletteColor || "#8B5CF6";
    // Parse hex to rgb
    const hexToRgb = h => {
      const r = parseInt(h.slice(1,3),16);
      const g = parseInt(h.slice(3,5),16);
      const b = parseInt(h.slice(5,7),16);
      return [r,g,b];
    };
    const [R,G,B] = hexToRgb(color.length===7 ? color : "#8B5CF6");

    function draw(ts) {
      ctx.clearRect(0, 0, W(), H());
      const nodes = nodesRef.current;

      // Update & draw nodes
      nodes.forEach((n, i) => {
        // Move
        n.x += n.vx;
        n.y += n.vy;
        // Wrap edges
        if (n.x < -10) n.x = W() + 10;
        if (n.x > W() + 10) n.x = -10;
        if (n.y < -10) n.y = H() + 10;
        if (n.y > H() + 10) n.y = -10;

        // Life pulse (fade in/out)
        n.life += n.lifeSpeed;
        const opacity = Math.abs(Math.sin(n.life * Math.PI));

        // Draw node dot
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${R},${G},${B},${opacity * 0.85})`;
        ctx.fill();

        // Draw connections to nearby nodes
        for (let j = i + 1; j < nodes.length; j++) {
          const m = nodes[j];
          const dx = m.x - n.x;
          const dy = m.y - n.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < MAX_DIST) {
            const mOpacity = Math.abs(Math.sin(m.life * Math.PI));
            const connOpacity = (1 - dist / MAX_DIST) * opacity * mOpacity * 0.45;
            ctx.beginPath();
            ctx.moveTo(n.x, n.y);
            ctx.lineTo(m.x, m.y);
            ctx.strokeStyle = `rgba(${R},${G},${B},${connOpacity})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      });

      rafRef.current = requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener("resize", resize);
    rafRef.current = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener("resize", resize);
    };
  }, [paletteColor]);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "fixed", inset: 0,
        width: "100vw", height: "100vh",
        zIndex: 0, pointerEvents: "none",
        opacity: 0.55,
      }}
    />
  );
}

// MAGNETIC BUTTON — ALL FEATURES: RIPPLE, SPRING, CHROMATIC, GLOW
// ═══════════════════════════════════════════════════════════════════
function Btn({ children, onClick, variant = "ghost", size = "md", icon, full = false, disabled = false, style = {} }) {
  const [hov, setHov] = useState(false);
  const [pressed, setPressed] = useState(false);
  const [ripples, setRipples] = useState([]);
  const [chromatic, setChromatic] = useState(false);
  const [magOffset, setMagOffset] = useState({ x: 0, y: 0 });
  const btnRef = useRef(null);
  const springRef = useRef(null);

  const sizes = { sm: "8px 14px", md: "11px 20px", lg: "14px 30px" };
  const fontSizes = { sm: 10, md: 11, lg: 12 };

  const handleMouseMove = useCallback(e => {
    if (disabled) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) * 0.18;
    const dy = (e.clientY - cy) * 0.18;
    setMagOffset({ x: dx, y: dy });
  }, [disabled]);

  const handleMouseLeave = useCallback(() => {
    setHov(false);
    // Spring back with overshoot
    clearTimeout(springRef.current);
    setMagOffset({ x: 0, y: 0 });
  }, []);

  const handleClick = useCallback(e => {
    if (disabled) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const id = Date.now();
    setRipples(p => [...p, { id, x: e.clientX - rect.left, y: e.clientY - rect.top }]);
    setTimeout(() => setRipples(p => p.filter(r => r.id !== id)), 800);
    setChromatic(true);
    setTimeout(() => setChromatic(false), 120);
    snd(variant === "primary" ? "tick" : variant === "danger" ? "error" : "tick");
    onClick && onClick(e);
  }, [disabled, onClick, variant]);

  // Compute distance-based glow
  const glowIntensity = hov ? 1.0 : 0;

  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 7,
    padding: sizes[size], borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer",
    fontSize: fontSizes[size], fontWeight: 700, letterSpacing: "0.05em", fontFamily: ORB,
    border: "none", outline: "none", width: full ? "100%" : "auto",
    opacity: disabled ? 0.4 : 1,
    transition: "background 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s cubic-bezier(0.22,1,0.36,1), border-color 0.2s",
    transform: `translate(${magOffset.x}px, ${magOffset.y}px)`,
    animation: chromatic ? "chromaticAb 0.12s ease" : "none",
    userSelect: "none",
    position: "relative", overflow: "hidden",
  };

  const variants = {
    primary: {
      background: hov
        ? `linear-gradient(135deg,${PA.s},${PA.p})`
        : `linear-gradient(135deg,${PA.d},${PA.p})`,
      color: PA.txt,
      boxShadow: hov
        ? `0 6px 24px ${PA.glow}, 0 0 0 1px ${PA.p}40, inset 0 1px 0 rgba(255,255,255,0.1)`
        : `0 3px 12px ${PA.glow}`,
    },
    ghost: {
      background: hov ? M.surface : "transparent",
      border: `1px solid ${hov ? M.borderHi : M.border}`,
      color: hov ? M.text : M.textMid,
      boxShadow: hov ? `0 4px 16px rgba(0,0,0,0.5), 0 0 12px ${PA.glow}22` : "none",
    },
    danger: {
      background: hov ? "#dc262614" : "transparent",
      border: `1px solid ${hov ? "#dc2626" : "#dc262630"}`,
      color: "#f87171",
      boxShadow: hov ? "0 4px 16px rgba(239,68,68,0.2)" : "none",
    },
    accent: {
      background: hov ? PA.dim + "CC" : PA.dim,
      border: `1px solid ${PA.p}${hov ? "55" : "28"}`,
      color: PA.p,
      boxShadow: hov ? `0 4px 18px ${PA.glow}, 0 0 0 1px ${PA.p}20` : "none",
    },
  };

  return (
    <button
      ref={btnRef}
      onClick={handleClick}
      onMouseEnter={() => !disabled && setHov(true)}
      onMouseLeave={handleMouseLeave}
      onMouseMove={handleMouseMove}
      onMouseDown={() => !disabled && setPressed(true)}
      onMouseUp={() => setPressed(false)}
      style={{ ...base, ...(variants[variant] || variants.ghost), ...style }}
    >
      {/* Multi-ring ripples */}
      {ripples.map(r => (
        <span key={r.id} style={{ position: "absolute", left: r.x, top: r.y, pointerEvents: "none" }}>
          <span style={{
            position: "absolute", width: 8, height: 8, borderRadius: "50%",
            background: variant === "primary" ? "rgba(255,255,255,0.4)" : PA.p + "60",
            animation: "rippleOut 0.75s cubic-bezier(0.22,1,0.36,1) forwards",
          }} />
          <span style={{
            position: "absolute", width: 8, height: 8, borderRadius: "50%",
            border: `1.5px solid ${variant === "primary" ? "rgba(255,255,255,0.3)" : PA.p + "50"}`,
            animation: "rippleMid 0.6s cubic-bezier(0.22,1,0.36,1) 0.05s forwards",
          }} />
          <span style={{
            position: "absolute", width: 8, height: 8, borderRadius: "50%",
            border: `1px solid ${variant === "primary" ? "rgba(255,255,255,0.15)" : PA.p + "30"}`,
            animation: "rippleFar 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards",
          }} />
        </span>
      ))}
      {icon && <span style={{ fontSize: fontSizes[size] + 2, lineHeight: 1 }}>{icon}</span>}
      {children}
    </button>
  );
}

// ═══════════════════════════════════════════════════════════════════
const BADGE_CFG = {
  E:   { sides:6,  color:"#374151", glow:"#4B5563", bg:"#0A0B0E", flameCount:0,  flameColor:null,       innerStyle:"none" },
  D:   { sides:8,  color:"#3B82F6", glow:"#60A5FA", bg:"#0A0E18", flameCount:10, flameColor:"#3B82F6",  innerStyle:"ring" },
  C:   { sides:8,  color:"#06B6D4", glow:"#22D3EE", bg:"#020C10", flameCount:14, flameColor:"#06B6D4",  innerStyle:"ring" },
  B:   { sides:10, color:"#DC2626", glow:"#F87171", bg:"#120202", flameCount:18, flameColor:"#DC2626",  innerStyle:"pulse" },
  A:   { sides:10, color:"#F97316", glow:"#FB923C", bg:"#120600", flameCount:22, flameColor:"#F97316",  innerStyle:"burst" },
  S:   { sides:12, color:"#EAB308", glow:"#FDE047", bg:"#100C00", flameCount:28, flameColor:"#EAB308",  innerStyle:"sunburst" },
  SS:  { sides:14, color:"#A855F7", glow:"#E879F9", bg:"#0C0210", flameCount:35, flameColor:"#A855F7",  innerStyle:"vortex" },
  SSS: { sides:16, color:"#FFFFFF", glow:"#E0C0FF", bg:"#000000", flameCount:50, flameColor:"#C084FC",  innerStyle:"monarch" },
};

function RankBadge({ rank = "E", level = 0, size = 220, lifeScore = 0 }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const cfg = BADGE_CFG[rank] || BADGE_CFG.E;
  const stateRef = useRef({ t:0, particles:[], outerRot:0, innerRot:0, pulse:0 });

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = size * DPR;
    canvas.height = size * DPR;
    ctx.scale(DPR, DPR);
    const cx = size / 2, cy = size / 2, R = size * 0.37;
    const st = stateRef.current;

    const polyPts = (r, offset = 0) =>
      Array.from({ length: cfg.sides }, (_, i) => {
        const a = (i / cfg.sides) * Math.PI * 2 - Math.PI / 2 + offset;
        return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
      });

    const mkParticle = () => {
      const vIdx = Math.floor(Math.random() * cfg.sides);
      const a = (vIdx / cfg.sides) * Math.PI * 2 - Math.PI / 2;
      const jitter = (Math.random() - 0.5) * 0.4;
      const r2 = R * (0.9 + Math.random() * 0.15);
      const dx = Math.cos(a + jitter), dy = Math.sin(a + jitter);
      return {
        x: cx + r2 * Math.cos(a), y: cy + r2 * Math.sin(a),
        vx: dx * (0.4 + Math.random() * 0.6), vy: dy * (0.4 + Math.random() * 0.6) - 0.3,
        life: 1.0, decay: 0.008 + Math.random() * 0.016,
        sz: 1.5 + Math.random() * 3,
        color: rank === "SSS" ? (Math.random() > 0.5 ? "#FFFFFF" : "#C084FC") : cfg.flameColor,
      };
    };
    for (let i = 0; i < (cfg.flameCount || 0) * 2; i++) {
      const p = mkParticle(); p.life = Math.random(); st.particles.push(p);
    }

    const draw = () => {
      ctx.clearRect(0, 0, size, size);
      st.t++; st.outerRot += 0.003; st.innerRot -= 0.005;
      st.pulse = Math.sin(st.t * 0.04) * 0.5 + 0.5;
      const outerPts = polyPts(R, st.outerRot);
      const innerPts = polyPts(R * 0.82, st.innerRot);

      if (rank !== "E") {
        const aura = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, R * 1.6);
        aura.addColorStop(0, cfg.glow + "22");
        aura.addColorStop(0.5, cfg.glow + "0A");
        aura.addColorStop(1, "transparent");
        ctx.fillStyle = aura; ctx.fillRect(0, 0, size, size);
      }

      st.particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy -= 0.01; p.life -= p.decay;
        if (p.life <= 0) Object.assign(p, mkParticle());
        const q = p.life * p.life;
        ctx.save(); ctx.globalAlpha = q * 0.85;
        ctx.shadowColor = p.color; ctx.shadowBlur = 10 * q;
        const rg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz * 2);
        rg.addColorStop(0, "#FFFFFF"); rg.addColorStop(0.35, p.color); rg.addColorStop(1, "transparent");
        ctx.fillStyle = rg; ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.sz, p.sz * 1.6, -Math.PI / 6, 0, Math.PI * 2);
        ctx.fill(); ctx.restore();
      });

      ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 18 + st.pulse * 12;
      const bgGrad = ctx.createRadialGradient(cx, cy - R * 0.2, 0, cx, cy, R);
      bgGrad.addColorStop(0, cfg.color + "30"); bgGrad.addColorStop(0.55, cfg.bg + "EE"); bgGrad.addColorStop(1, "#000000FF");
      ctx.beginPath(); outerPts.forEach(([px, py], i) => i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py));
      ctx.closePath(); ctx.fillStyle = bgGrad; ctx.fill(); ctx.restore();

      ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 14 + st.pulse * 8;
      ctx.strokeStyle = cfg.color; ctx.lineWidth = rank === "SSS" ? 2.5 : 1.8;
      ctx.beginPath(); outerPts.forEach(([px, py], i) => i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py));
      ctx.closePath(); ctx.stroke(); ctx.restore();

      ctx.save(); ctx.strokeStyle = cfg.color + "30"; ctx.lineWidth = 0.7;
      ctx.beginPath(); innerPts.forEach(([px, py], i) => i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py));
      ctx.closePath(); ctx.stroke(); ctx.restore();

      outerPts.filter((_, i) => i % 2 === 0).forEach(([px, py]) => {
        ctx.save(); ctx.strokeStyle = cfg.color + "12"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke(); ctx.restore();
      });

      if (cfg.innerStyle === "vortex" || cfg.innerStyle === "monarch") {
        const spiralR = R * 0.48;
        ctx.save(); ctx.globalAlpha = 0.4 + st.pulse * 0.25;
        ctx.shadowColor = cfg.glow; ctx.shadowBlur = 20;
        [1, 0.75, 0.55, 0.38, 0.24].forEach((rr, i) => {
          const rot2 = st.outerRot * (i % 2 === 0 ? 2 : -3) + i;
          ctx.strokeStyle = i === 0 ? cfg.color : cfg.glow + "55"; ctx.lineWidth = 0.8 - i * 0.12;
          ctx.beginPath(); ctx.arc(cx, cy, spiralR * rr, rot2, rot2 + Math.PI * 1.7); ctx.stroke();
        });
        ctx.restore();
        if (cfg.innerStyle === "monarch") {
          for (let k = 0; k < 8; k++) {
            const ra = (k/8)*Math.PI*2 + st.outerRot*2;
            ctx.save(); ctx.globalAlpha = 0.3 + st.pulse * 0.2;
            ctx.strokeStyle = cfg.glow; ctx.lineWidth = 0.6; ctx.shadowBlur = 8; ctx.shadowColor = cfg.glow;
            ctx.beginPath();
            ctx.moveTo(cx + spiralR*0.15*Math.cos(ra), cy + spiralR*0.15*Math.sin(ra));
            ctx.lineTo(cx + spiralR*0.55*Math.cos(ra), cy + spiralR*0.55*Math.sin(ra));
            ctx.stroke(); ctx.restore();
          }
        }
      }
      if (cfg.innerStyle === "sunburst") {
        ctx.save(); ctx.globalAlpha = 0.15 + st.pulse * 0.1; ctx.shadowColor = cfg.glow; ctx.shadowBlur = 12;
        for (let i = 0; i < 12; i++) {
          const ra = (i/12)*Math.PI*2 + st.outerRot*0.5;
          ctx.strokeStyle = cfg.color; ctx.lineWidth = 0.7;
          ctx.beginPath(); ctx.moveTo(cx + 8*Math.cos(ra), cy + 8*Math.sin(ra));
          ctx.lineTo(cx + R*0.5*Math.cos(ra), cy + R*0.5*Math.sin(ra)); ctx.stroke();
        }
        ctx.restore();
      }
      if (cfg.innerStyle === "burst") {
        ctx.save(); ctx.globalAlpha = 0.2 + st.pulse * 0.15; ctx.strokeStyle = cfg.color; ctx.lineWidth = 1;
        ctx.shadowColor = cfg.glow; ctx.shadowBlur = 10;
        for (let i = 0; i < 5; i++) {
          const ra = (i/5)*Math.PI*2 + st.innerRot;
          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R*0.45*Math.cos(ra), cy + R*0.45*Math.sin(ra)); ctx.stroke();
        }
        ctx.restore();
      }

      if (lifeScore > 0) {
        const arcR = R * 0.49;
        ctx.save(); ctx.strokeStyle = cfg.color + "20"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, arcR, 0, Math.PI*2); ctx.stroke();
        ctx.shadowColor = cfg.glow; ctx.shadowBlur = 8; ctx.strokeStyle = cfg.color; ctx.lineWidth = 2.5; ctx.lineCap = "round";
        ctx.beginPath(); const startA = -Math.PI/2;
        ctx.arc(cx, cy, arcR, startA, startA + (lifeScore/100)*Math.PI*2); ctx.stroke(); ctx.restore();
      }

      if (rank === "SSS") {
        outerPts.filter((_, i) => i % 2 === 0).forEach(([px, py]) => {
          const nx = (px-cx)/R, ny = (py-cy)/R;
          const sx = cx + nx*R*1.15, sy = cy + ny*R*1.15;
          const perp = [-ny, nx];
          ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 14;
          ctx.fillStyle = cfg.color; ctx.globalAlpha = 0.55 + st.pulse * 0.3;
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx+perp[0]*5,sy+perp[1]*5); ctx.lineTo(sx-perp[0]*5,sy-perp[1]*5);
          ctx.closePath(); ctx.fill(); ctx.restore();
        });
      }

      const tickPts = polyPts(R * 1.08, st.outerRot * 0.7);
      tickPts.filter((_, i) => i % 2 === 0).forEach(([px, py]) => {
        ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 6; ctx.fillStyle = cfg.color;
        ctx.globalAlpha = 0.3 + st.pulse * 0.2; ctx.beginPath(); ctx.arc(px, py, 1.5, 0, Math.PI*2); ctx.fill(); ctx.restore();
      });

      ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 22 + st.pulse * 10;
      const fontSize = level >= 100 ? size * 0.14 : level >= 10 ? size * 0.18 : size * 0.22;
      ctx.font = `900 ${fontSize}px Orbitron, sans-serif`;
      ctx.fillStyle = cfg.color; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(String(level), cx, cy - 4); ctx.restore();

      ctx.save(); ctx.shadowColor = cfg.glow; ctx.shadowBlur = 12;
      ctx.font = `700 ${size * 0.088}px Orbitron, sans-serif`;
      ctx.fillStyle = cfg.color + "CC"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(rank, cx, cy + size * 0.115); ctx.restore();

      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [rank, level, size, lifeScore]);

  return <canvas ref={canvasRef} style={{ width:size, height:size, display:"block" }} />;
}

// ═══════════════════════════════════════════════════════════════════
// POWER RADAR — SPIDER CHART CANVAS
// ═══════════════════════════════════════════════════════════════════
function PowerRadar({ stats, size = 240 }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);

  useEffect(() => {
    if (!stats) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * DPR; canvas.height = size * DPR;
    ctx.scale(DPR, DPR);
    const cx = size / 2, cy = size / 2, R = size * 0.38;

    const keys = ["intelligence","power","grind","aura","focus","resilience","faith","identity","social","creativity"];
    const labels = ["INT","PWR","GRD","AUR","FOC","RES","FTH","IDN","SOC","CRE"];
    const N = keys.length;
    const vals = keys.map(k => (stats[k]?.value || 0) / 100);

    let sweep = 0;
    const draw = () => {
      ctx.clearRect(0, 0, size, size);
      sweep = Math.min(sweep + 0.04, 1);

      // Background webs
      [0.2, 0.4, 0.6, 0.8, 1].forEach(level => {
        ctx.save(); ctx.strokeStyle = M.border; ctx.lineWidth = 0.7; ctx.globalAlpha = 0.6;
        ctx.beginPath();
        for (let i = 0; i < N; i++) {
          const a = (i / N) * Math.PI * 2 - Math.PI / 2;
          const px = cx + R * level * Math.cos(a), py = cy + R * level * Math.sin(a);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke(); ctx.restore();
      });

      // Axis lines
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 - Math.PI / 2;
        ctx.save(); ctx.strokeStyle = M.border; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.4;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a));
        ctx.stroke(); ctx.restore();
      }

      // Filled polygon
      ctx.save();
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
      grad.addColorStop(0, PA.p + "55"); grad.addColorStop(1, PA.p + "18");
      ctx.fillStyle = grad; ctx.strokeStyle = PA.p; ctx.lineWidth = 1.8;
      ctx.shadowColor = PA.p; ctx.shadowBlur = 12;
      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 - Math.PI / 2;
        const v = vals[i] * sweep;
        const px = cx + R * v * Math.cos(a), py = cy + R * v * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();

      // Vertex dots
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 - Math.PI / 2;
        const v = vals[i] * sweep;
        const px = cx + R * v * Math.cos(a), py = cy + R * v * Math.sin(a);
        ctx.save(); ctx.fillStyle = PA.p; ctx.shadowColor = PA.glow; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }

      // Labels
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 - Math.PI / 2;
        const lx = cx + (R + 18) * Math.cos(a), ly = cy + (R + 18) * Math.sin(a);
        ctx.save(); ctx.font = `700 ${size * 0.054}px Orbitron, sans-serif`;
        ctx.fillStyle = M.textLow; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(labels[i], lx, ly); ctx.restore();
      }

      if (sweep < 1) animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [stats, size]);

  return <canvas ref={canvasRef} style={{ width:size, height:size, display:"block", margin:"0 auto" }} />;
}

// ═══════════════════════════════════════════════════════════════════
// AURA DISPLAY CANVAS — 6 STAGES
// ═══════════════════════════════════════════════════════════════════
function AuraDisplay({ ap = 0, size = 200 }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const stage = getAuraStage(ap);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * DPR; canvas.height = size * DPR;
    ctx.scale(DPR, DPR);
    const cx = size / 2, cy = size / 2;
    let t = 0;

    const stageIdx = AURA_STAGES.findIndex(s => s === stage);
    const color = stage.color;
    const hexC = { r:parseInt(color.slice(1,3),16), g:parseInt(color.slice(3,5),16), b:parseInt(color.slice(5,7),16) };

    const draw = () => {
      ctx.clearRect(0, 0, size, size);
      t++;

      const isMonarch = stageIdx === 5;
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.04);
      const pulse2 = 0.5 + 0.5 * Math.sin(t * 0.03 + Math.PI);

      // Concentric rings
      const numRings = Math.min(stageIdx + 2, 6);
      for (let k = 0; k < numRings; k++) {
        const r = size * (0.12 + k * 0.075);
        const alpha = (0.15 + 0.1 * pulse) * (1 - k * 0.1);
        const rotOffset = k % 2 === 0 ? t * 0.008 * (k + 1) : -t * 0.006 * (k + 1);
        const dashLen = isMonarch ? 0 : Math.PI * 2 / (8 + k * 4);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rotOffset);
        ctx.strokeStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${alpha})`;
        ctx.lineWidth = isMonarch ? 2 - k * 0.2 : 1 + (numRings - k) * 0.15;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8 + pulse * 6;

        if (!isMonarch && k > 0) {
          ctx.setLineDash([dashLen, dashLen * 0.5]);
        }
        ctx.beginPath();
        ctx.arc(0, 0, r - size * 0.02, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // Energy streams (flowing particles around center)
      if (stageIdx >= 2) {
        const streamCount = 3 + stageIdx * 2;
        for (let s = 0; s < streamCount; s++) {
          const baseAngle = (s / streamCount) * Math.PI * 2 + t * 0.025;
          const streamR = size * (0.15 + 0.05 * Math.sin(t * 0.05 + s));
          const sx = cx + streamR * Math.cos(baseAngle);
          const sy = cy + streamR * Math.sin(baseAngle);
          const alpha = 0.4 + 0.3 * Math.sin(t * 0.05 + s * 1.2);
          ctx.save();
          ctx.fillStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${alpha})`;
          ctx.shadowColor = color; ctx.shadowBlur = 6;
          ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }

      // Rune symbols (rotating)
      if (stageIdx >= 3) {
        const runeCount = stageIdx;
        for (let r = 0; r < runeCount; r++) {
          const ra = (r / runeCount) * Math.PI * 2 + t * 0.015;
          const rx = cx + size * 0.32 * Math.cos(ra);
          const ry = cy + size * 0.32 * Math.sin(ra);
          ctx.save();
          ctx.translate(rx, ry);
          ctx.rotate(t * 0.02 + r);
          ctx.font = `${size * 0.07}px serif`;
          ctx.fillStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${0.3 + 0.2 * pulse})`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(["◆","▲","●","⬡","★","✦"][r % 6], 0, 0);
          ctx.restore();
        }
      }

      // Center glow
      const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.18);
      const centerAlpha = isMonarch ? 0.6 + 0.3 * pulse : 0.2 + 0.15 * pulse;
      centerGrad.addColorStop(0, `rgba(${hexC.r},${hexC.g},${hexC.b},${centerAlpha})`);
      centerGrad.addColorStop(0.5, `rgba(${hexC.r},${hexC.g},${hexC.b},${centerAlpha * 0.3})`);
      centerGrad.addColorStop(1, "transparent");
      ctx.fillStyle = centerGrad;
      ctx.beginPath(); ctx.arc(cx, cy, size * 0.18, 0, Math.PI * 2); ctx.fill();

      // Monarch chromatic blast
      if (isMonarch) {
        const hueShift = (t * 2) % 360;
        ctx.save();
        ctx.globalAlpha = 0.12 + 0.06 * pulse;
        const blastGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.48);
        blastGrad.addColorStop(0, `hsl(${hueShift},100%,80%)`);
        blastGrad.addColorStop(0.5, `hsl(${hueShift + 120},100%,60%)`);
        blastGrad.addColorStop(1, "transparent");
        ctx.fillStyle = blastGrad;
        ctx.beginPath(); ctx.arc(cx, cy, size * 0.48, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [ap, stage, size]);

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      <canvas ref={canvasRef} style={{ width:size, height:size, display:"block" }} />
      <div style={{
        position:"absolute", bottom:4, left:0, right:0, textAlign:"center",
        fontSize:8, fontWeight:800, letterSpacing:"0.12em", color:stage.color,
        fontFamily:ORB, textShadow:`0 0 10px ${stage.color}`,
      }}>{stage.label}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// BOSS SPRITE CANVAS — ABSTRACT GEOMETRIC CREATURE
// ═══════════════════════════════════════════════════════════════════
function BossSprite({ boss, hpFraction = 1, phase = 0, size = 120, shake = false }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * DPR; canvas.height = size * DPR;
    ctx.scale(DPR, DPR);
    const cx = size / 2, cy = size / 2;
    let t = 0;

    const color = boss.color;
    const hexC = { r:parseInt(color.slice(1,3),16)||200, g:parseInt(color.slice(3,5),16)||200, b:parseInt(color.slice(5,7),16)||200 };

    const draw = () => {
      ctx.clearRect(0, 0, size, size);
      t++;
      const pulse = 0.5 + 0.5 * Math.sin(t * 0.06);
      const rage = 1 - hpFraction; // more rage as HP drops
      const baseR = size * 0.28;

      // Core body glow
      const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 1.4);
      coreGrad.addColorStop(0, `rgba(${hexC.r},${hexC.g},${hexC.b},${0.3 + rage * 0.4})`);
      coreGrad.addColorStop(1, "transparent");
      ctx.fillStyle = coreGrad;
      ctx.beginPath(); ctx.arc(cx, cy, baseR * 1.4, 0, Math.PI * 2); ctx.fill();

      // Main body polygon
      const sides = 5 + phase;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(t * (0.008 + rage * 0.015));
      ctx.shadowColor = color; ctx.shadowBlur = 15 + pulse * 10 + rage * 20;
      ctx.strokeStyle = color; ctx.lineWidth = 1.5 + rage;
      ctx.fillStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${0.15 + rage * 0.2})`;
      ctx.beginPath();
      for (let i = 0; i < sides; i++) {
        const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const r = baseR * (0.9 + 0.1 * Math.sin(t * 0.08 + i));
        i === 0 ? ctx.moveTo(r*Math.cos(a),r*Math.sin(a)) : ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
      }
      ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();

      // Inner spinning triangle
      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(-t * 0.02);
      ctx.strokeStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${0.5 + rage * 0.4})`;
      ctx.lineWidth = 1; ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const r = baseR * 0.45;
        i === 0 ? ctx.moveTo(r*Math.cos(a),r*Math.sin(a)) : ctx.lineTo(r*Math.cos(a),r*Math.sin(a));
      }
      ctx.closePath(); ctx.stroke(); ctx.restore();

      // Eye (center orb)
      ctx.save();
      ctx.shadowColor = color; ctx.shadowBlur = 16 + pulse * 12;
      const eyeGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 0.2);
      eyeGrad.addColorStop(0, "#FFFFFF"); eyeGrad.addColorStop(0.4, color); eyeGrad.addColorStop(1, "transparent");
      ctx.fillStyle = eyeGrad;
      ctx.beginPath(); ctx.arc(cx, cy, baseR * 0.2 * (0.8 + 0.2 * pulse), 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Rage spikes
      if (rage > 0.3) {
        const spikeCount = Math.floor(rage * 8);
        for (let i = 0; i < spikeCount; i++) {
          const a = (i / spikeCount) * Math.PI * 2 + t * 0.04;
          const inner = baseR * 1.0, outer = baseR * (1.3 + 0.15 * Math.sin(t * 0.1 + i));
          ctx.save(); ctx.strokeStyle = `rgba(${hexC.r},${hexC.g},${hexC.b},${rage * 0.7})`;
          ctx.lineWidth = 1; ctx.shadowColor = color; ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.moveTo(cx + inner*Math.cos(a), cy + inner*Math.sin(a));
          ctx.lineTo(cx + outer*Math.cos(a), cy + outer*Math.sin(a));
          ctx.stroke(); ctx.restore();
        }
      }

      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animRef.current);
  }, [boss, hpFraction, phase, size, shake]);

  return <canvas ref={canvasRef} style={{ width:size, height:size, display:"block", animation: shake ? "bossShake 0.5s ease" : "none" }} />;
}


// ═══════════════════════════════════════════════════════════════════
// SKILL TREE CANVAS
// ═══════════════════════════════════════════════════════════════════
function SkillTreeCanvas({ stats, w = 360, h = 480 }) {
  const canvasRef = useRef(null);
  const animRef   = useRef(null);
  const panRef    = useRef({ x: 0, y: 0, zoom: 1, drag: false, last: null, hovered: null });
  const [tooltip, setTooltip] = useState(null);
  const unlocked = useMemo(() => new Set(getUnlockedSkills(stats || {}).map(s => s.id)), [stats]);

  const TIER_ORDER = ["common","uncommon","rare","epic","legendary","mythic"];
  const layout = useMemo(() => {
    const map = {};
    TIER_ORDER.forEach((tier, ti) => {
      const ts = SKILLS.filter(s => s.tier === tier);
      ts.forEach((sk, si) => {
        map[sk.id] = { x: 36 + (si / Math.max(ts.length - 1, 1)) * (w - 72), y: 36 + ti * 72, sk };
      });
    });
    return map;
  }, [w]);

  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = w * DPR; cv.height = h * DPR;
    ctx.scale(DPR, DPR);
    const pr = panRef.current;
    let t = 0;

    const onWheel = e => { e.preventDefault(); pr.zoom = Math.max(0.4, Math.min(2.2, pr.zoom - e.deltaY * 0.001)); };
    const onDown  = e => { pr.drag = true; const rc = cv.getBoundingClientRect(); pr.last = { x: e.clientX - rc.left, y: e.clientY - rc.top }; };
    const onMove  = e => {
      const rc = cv.getBoundingClientRect();
      const mx = e.clientX - rc.left, my = e.clientY - rc.top;
      if (pr.drag && pr.last) { pr.x += mx - pr.last.x; pr.y += my - pr.last.y; pr.last = { x: mx, y: my }; }
      let found = null;
      Object.values(layout).forEach(({ x, y, sk }) => {
        const tx = x * pr.zoom + pr.x, ty = y * pr.zoom + pr.y;
        if (Math.hypot(mx - tx, my - ty) < 14 * pr.zoom) found = sk;
      });
      if (found?.id !== pr.hovered?.id) {
        pr.hovered = found;
        setTooltip(found ? { sk: found, mx: e.clientX - rc.left, my: e.clientY - rc.top } : null);
      }
    };
    const onUp = () => { pr.drag = false; pr.last = null; };

    cv.addEventListener("wheel", onWheel, { passive: false });
    cv.addEventListener("mousedown", onDown);
    cv.addEventListener("mousemove", onMove);
    cv.addEventListener("mouseup", onUp);
    cv.addEventListener("mouseleave", onUp);

    const TCOL = { common:"#94A3B8", uncommon:"#34D399", rare:"#60A5FA", epic:"#C084FC", legendary:"#FFD700", mythic:"#FFFFFF" };

    const draw = () => {
      ctx.clearRect(0, 0, w, h); t++;
      ctx.save(); ctx.translate(pr.x, pr.y); ctx.scale(pr.zoom, pr.zoom);

      // Connection lines
      TIER_ORDER.forEach((tier, ti) => {
        if (!ti) return;
        const prev = TIER_ORDER[ti - 1];
        SKILLS.filter(s => s.tier === tier).forEach(curr => {
          const cn = layout[curr.id]; if (!cn) return;
          SKILLS.filter(s => s.tier === prev).slice(0, 3).forEach(p => {
            const pn = layout[p.id]; if (!pn) return;
            const bothOn = unlocked.has(curr.id) && unlocked.has(p.id);
            const pulse = 0.5 + 0.5 * Math.sin(t * 0.04 + cn.x * 0.01);
            ctx.save();
            ctx.strokeStyle = bothOn ? PA.p + Math.floor(60 + pulse * 80).toString(16).padStart(2,"0") : M.border;
            ctx.lineWidth = bothOn ? 1.2 : 0.4; ctx.globalAlpha = bothOn ? 0.55 + 0.3 * pulse : 0.18;
            if (bothOn) { ctx.shadowColor = PA.p; ctx.shadowBlur = 5; }
            ctx.setLineDash(bothOn ? [] : [3, 6]);
            ctx.beginPath(); ctx.moveTo(pn.x, pn.y); ctx.lineTo(cn.x, cn.y); ctx.stroke(); ctx.restore();
          });
        });
      });

      // Nodes
      Object.values(layout).forEach(({ x, y, sk }) => {
        const on = unlocked.has(sk.id), hov = pr.hovered?.id === sk.id;
        const c = TCOL[sk.tier] || "#94A3B8";
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.05 + x * 0.02);
        const nr = hov ? 14 : 11;
        ctx.save();
        if (on) { ctx.shadowColor = c; ctx.shadowBlur = hov ? 22 : 10 + pulse * 6; }
        ctx.fillStyle = on ? c + "22" : M.surface;
        ctx.strokeStyle = on ? c : M.border;
        ctx.lineWidth = on ? 1.5 : 0.8; ctx.globalAlpha = on ? 1 : 0.3;
        ctx.beginPath(); ctx.arc(x, y, nr, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.globalAlpha = on ? 1 : 0.2;
        ctx.font = `${nr * 1.1}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(sk.e, x, y); ctx.restore();
        if (on && hov) {
          ctx.save(); ctx.strokeStyle = c; ctx.lineWidth = 1; ctx.globalAlpha = pulse * 0.5;
          ctx.shadowColor = c; ctx.shadowBlur = 8;
          ctx.beginPath(); ctx.arc(x, y, nr + 6 + pulse * 4, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
        }
      });

      ctx.restore();
      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(animRef.current);
      cv.removeEventListener("wheel", onWheel); cv.removeEventListener("mousedown", onDown);
      cv.removeEventListener("mousemove", onMove); cv.removeEventListener("mouseup", onUp);
      cv.removeEventListener("mouseleave", onUp);
    };
  }, [stats, unlocked, layout, w, h]);

  return (
    <div style={{ position:"relative" }}>
      <canvas ref={canvasRef} style={{ width:w, height:h, display:"block", cursor:"grab", borderRadius:14, background:M.card }} />
      {tooltip && (
        <div style={{ position:"absolute", left:tooltip.mx+12, top:tooltip.my-10, background:M.card, border:`1px solid ${M.border}`, borderRadius:10, padding:"10px 14px", maxWidth:200, zIndex:100, animation:"tooltipFadeIn 0.15s ease", boxShadow:M.shadowMd }}>
          <div style={{ fontSize:11, fontWeight:700, color:PA.p, marginBottom:4, fontFamily:ORB }}>{tooltip.sk.e} {tooltip.sk.n}</div>
          <div style={{ fontSize:10, color:M.textMid, marginBottom:3, fontFamily:RAJ }}>{tooltip.sk.desc}</div>
          <div style={{ fontSize:9, color:M.textLow, fontFamily:RAJ, lineHeight:1.5, marginBottom:6 }}>{tooltip.sk.lore.slice(0,90)}...</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
            {Object.entries(tooltip.sk.req).map(([k,v]) => (
              <span key={k} style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background:(stats?.[k]?.value||0)>=v?PA.dim:M.surface, color:(stats?.[k]?.value||0)>=v?PA.p:M.textLow, border:`1px solid ${(stats?.[k]?.value||0)>=v?PA.p+"40":M.border}`, fontFamily:RAJ }}>{k.slice(0,3).toUpperCase()}:{v}</span>
            ))}
          </div>
        </div>
      )}
      <div style={{ fontSize:9, color:M.textLow, textAlign:"center", marginTop:6, fontFamily:RAJ }}>Scroll to zoom · Drag to pan · Hover for info</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// WORLD MAP CANVAS
// ═══════════════════════════════════════════════════════════════════
function WorldMapCanvas({ completedDungeons = new Set(), onSelectDungeon, mapW = 360, mapH = 260 }) {
  const cvRef = useRef(null);
  const animRef = useRef(null);
  const [sel, setSel] = useState(null);

  useEffect(() => {
    const cv = cvRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = mapW * DPR; cv.height = mapH * DPR;
    ctx.scale(DPR, DPR);
    let t = 0;
    const BC = { crystal_cave:"#38BDF8",ruins:"#FB923C",swamp:"#34D399",fortress:"#FBBF24",labyrinth:"#A78BFA",mountain:"#F87171",mirror_realm:"#67E8F9",abyss:"#C084FC",void:"#FFFFFF",throne:"#FFD700" };

    const onClick = e => {
      const rc = cv.getBoundingClientRect();
      const mx = (e.clientX - rc.left) * (mapW / rc.width);
      const my = (e.clientY - rc.top) * (mapH / rc.height);
      DUNGEONS.forEach(d => {
        const x = (d.mapX / 100) * mapW, y = (d.mapY / 100) * mapH;
        if (Math.hypot(mx - x, my - y) < 18) { setSel(d); onSelectDungeon && onSelectDungeon(d); }
      });
    };
    cv.addEventListener("click", onClick);

    const draw = () => {
      ctx.clearRect(0, 0, mapW, mapH); t++;
      const bg = ctx.createLinearGradient(0, 0, mapW, mapH);
      bg.addColorStop(0, "#040208"); bg.addColorStop(1, "#080412");
      ctx.fillStyle = bg; ctx.fillRect(0, 0, mapW, mapH);

      // Terrain squiggles
      for (let i = 0; i < 6; i++) {
        ctx.save(); ctx.strokeStyle = `rgba(${20+i*4},${14+i*3},${40+i*6},0.35)`; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(0, (i / 6) * mapH + 8 * Math.sin(t * 0.003 + i));
        ctx.bezierCurveTo(mapW*0.33, (i/6)*mapH+10*Math.cos(t*0.004+i), mapW*0.66, (i/6)*mapH+9*Math.sin(t*0.005+i), mapW, (i/6)*mapH+7*Math.cos(t*0.003+i));
        ctx.stroke(); ctx.restore();
      }

      // Paths
      for (let i = 0; i < DUNGEONS.length - 1; i++) {
        const d1 = DUNGEONS[i], d2 = DUNGEONS[i+1];
        const x1=(d1.mapX/100)*mapW, y1=(d1.mapY/100)*mapH, x2=(d2.mapX/100)*mapW, y2=(d2.mapY/100)*mapH;
        const both = completedDungeons.has(d1.id) && completedDungeons.has(d2.id);
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.05 + i);
        ctx.save(); ctx.strokeStyle = both ? PA.p+"99" : "#221D30"; ctx.lineWidth = both ? 1.5 : 0.7;
        if (both) { ctx.shadowColor = PA.p; ctx.shadowBlur = 4 + pulse * 4; }
        ctx.setLineDash([4, 6]);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); ctx.restore();
      }

      // Nodes
      DUNGEONS.forEach((d, i) => {
        const x = (d.mapX/100)*mapW, y = (d.mapY/100)*mapH;
        const done = completedDungeons.has(d.id);
        const locked = i > 0 && !completedDungeons.has(DUNGEONS[Math.max(0,i-1)].id);
        const c = BC[d.biome] || "#60A5FA";
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.05 + i * 0.9);

        if (done) {
          ctx.save(); ctx.globalAlpha = 0.25 + 0.15 * pulse; ctx.shadowColor = c; ctx.shadowBlur = 14;
          ctx.strokeStyle = c; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(x, y, 18 + pulse * 3, 0, Math.PI*2); ctx.stroke(); ctx.restore();
        }
        ctx.save(); ctx.globalAlpha = locked ? 0.25 : 1;
        ctx.shadowColor = done ? c : "#0A0814"; ctx.shadowBlur = done ? 10 + pulse*6 : 3;
        ctx.fillStyle = done ? c+"28" : "#0D0A18"; ctx.strokeStyle = done ? c : (locked ? "#1A1628" : "#252030");
        ctx.lineWidth = done ? 2 : 1;
        ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();

        ctx.save(); ctx.globalAlpha = locked ? 0.25 : 1;
        ctx.font = `${mapW*0.032}px Orbitron,sans-serif`;
        ctx.fillStyle = done ? c : (locked ? "#333" : M.textLow);
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(d.rank, x, y); ctx.restore();

        if (!locked) {
          ctx.save(); ctx.font = `${mapW*0.025}px Rajdhani,sans-serif`;
          ctx.fillStyle = done ? c : M.textLow; ctx.globalAlpha = 0.75;
          ctx.textAlign = "center"; ctx.textBaseline = "top";
          ctx.fillText(d.n.slice(0,11), x, y+15); ctx.restore();
        }
      });

      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(animRef.current); cv.removeEventListener("click", onClick); };
  }, [completedDungeons, mapW, mapH]);

  return (
    <div>
      <canvas ref={cvRef} style={{ width:mapW, height:mapH, display:"block", borderRadius:14, cursor:"pointer" }}/>
      {sel && (
        <div style={{ marginTop:10, padding:"14px 16px", background:M.surface, borderRadius:12, border:`1px solid ${PA.p}28`, animation:"fadeUp 0.3s ease" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <span style={{ fontSize:14, fontWeight:800, color:PA.p, fontFamily:ORB }}>{sel.e} {sel.n}</span>
            <span style={{ fontSize:9, padding:"3px 8px", borderRadius:20, background:PA.dim, color:PA.p, fontFamily:ORB }}>{sel.rank} RANK</span>
          </div>
          <p style={{ fontSize:11, color:M.textMid, lineHeight:1.7, margin:"0 0 8px", fontFamily:RAJ }}>{sel.lore}</p>
          <div style={{ fontSize:10, color:M.textLow, fontFamily:RAJ }}>⚡ +{sel.xp} XP &nbsp; 🔮 +{sel.ap} AP</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// COLOR WHEEL PICKER
// ═══════════════════════════════════════════════════════════════════
function ColorWheel({ onSelect }) {
  const wheelRef = useRef(null);
  const stripRef = useRef(null);
  const [hue, setHue] = useState(45);
  const [sat, setSat] = useState(85);
  const [lit, setLit] = useState(58);
  const [dragW, setDragW] = useState(false);
  const [dragS, setDragS] = useState(false);
  const WS = 180, SH = 22, WR = WS / 2;

  const hslToHex = (h, s, l) => {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; const col = l - a * Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*col).toString(16).padStart(2,"0"); };
    return `#${f(0)}${f(8)}${f(4)}`;
  };
  const hex = hslToHex(hue, sat, lit);

  useEffect(() => {
    const cv = wheelRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width = WS*DPR; cv.height = WS*DPR; ctx.scale(DPR,DPR);
    const cx = WR, cy = WR;
    for (let angle = 0; angle < 360; angle++) {
      const a1 = (angle - 1) * Math.PI / 180, a2 = (angle + 1) * Math.PI / 180;
      for (let s = 0; s <= 100; s += 2) {
        const r = (s / 100) * (WR - 10);
        ctx.save(); ctx.strokeStyle = `hsl(${angle},${s}%,${lit}%)`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, r, a1, a2); ctx.stroke(); ctx.restore();
      }
    }
    const sa = hue * Math.PI / 180;
    const sr = (sat / 100) * (WR - 10);
    const sx = cx + sr * Math.cos(sa), sy = cy + sr * Math.sin(sa);
    ctx.save(); ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 2.5; ctx.shadowColor="#fff"; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(sx, sy, 7, 0, Math.PI*2); ctx.stroke(); ctx.restore();
    ctx.save(); ctx.strokeStyle = "#0A0810"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(cx, cy, WR - 3, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  }, [hue, sat, lit, WR, WS]);

  useEffect(() => {
    const cv = stripRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width = WS*DPR; cv.height = SH*DPR; ctx.scale(DPR,DPR);
    const g = ctx.createLinearGradient(0,0,WS,0);
    for (let l = 0; l <= 100; l += 5) g.addColorStop(l/100,`hsl(${hue},${sat}%,${l}%)`);
    ctx.fillStyle=g; ctx.fillRect(0,0,WS,SH);
    const lx = (lit/100)*WS;
    ctx.save(); ctx.fillStyle="#FFF"; ctx.shadowColor="#FFF"; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(lx,SH/2,6,0,Math.PI*2); ctx.fill(); ctx.restore();
  }, [hue, sat, lit, WS, SH]);

  const pickWheel = e => {
    const rc = wheelRef.current.getBoundingClientRect();
    const mx = e.clientX-rc.left-WR, my = e.clientY-rc.top-WR;
    const newH = ((Math.atan2(my,mx)*180/Math.PI)+360)%360;
    const newS = Math.min(100,(Math.hypot(mx,my)/(WR-10))*100);
    setHue(Math.round(newH)); setSat(Math.round(newS));
  };
  const pickStrip = e => {
    const rc = stripRef.current.getBoundingClientRect();
    setLit(Math.round(((e.clientX-rc.left)/WS)*100));
  };

  useEffect(() => { onSelect && onSelect(hex); }, [hex]);

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>
      <canvas ref={wheelRef} style={{ width:WS, height:WS, borderRadius:"50%", cursor:"crosshair", border:`3px solid ${M.border}` }}
        onClick={pickWheel} onMouseMove={e=>dragW&&pickWheel(e)}
        onMouseDown={()=>setDragW(true)} onMouseUp={()=>setDragW(false)} />
      <canvas ref={stripRef} style={{ width:WS, height:SH, borderRadius:10, cursor:"ew-resize", border:`1px solid ${M.border}` }}
        onClick={pickStrip} onMouseMove={e=>dragS&&pickStrip(e)}
        onMouseDown={()=>setDragS(true)} onMouseUp={()=>setDragS(false)} />
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ width:34, height:34, borderRadius:9, background:hex, border:`2px solid ${M.borderHi}`, boxShadow:`0 0 14px ${hex}99` }}/>
        <span style={{ fontSize:11, fontFamily:ORB, color:M.textMid }}>{hex.toUpperCase()}</span>
        <Btn variant="accent" size="sm" onClick={()=>{ onSelect && onSelect(hex); snd("save"); }}>APPLY</Btn>
      </div>
      <div style={{ width:"100%" }}>
        <div style={{ fontSize:9, color:M.textLow, fontFamily:ORB, marginBottom:5, letterSpacing:"0.08em" }}>50 NAMED COLORS</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
          {NAMED_COLORS.map(nc => (
            <div key={nc.hex} title={nc.name} onClick={()=>{ onSelect&&onSelect(nc.hex); snd("tick"); }}
              style={{ width:18, height:18, borderRadius:5, background:nc.hex, cursor:"pointer", border:`1.5px solid ${M.border}`, transition:"transform 0.15s", boxShadow:`0 0 6px ${nc.hex}55` }}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.3)"}
              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// AURA DISPLAY — alias (see full implementation above)
// ═══════════════════════════════════════════════════════════════════
function AuraDisplayAlt({ ap = 0, size = 180 }) {
  const cvRef = useRef(null);
  const animRef = useRef(null);
  const stage = getAuraStage(ap);
  const stageIdx = AURA_STAGES.findIndex(s => s === stage);

  useEffect(() => {
    const cv = cvRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width=size*DPR; cv.height=size*DPR; ctx.scale(DPR,DPR);
    const cx=size/2, cy=size/2;
    let t = 0;
    const c = stage.color;
    const rr = parseInt(c.slice(1,3),16)||200, gg = parseInt(c.slice(3,5),16)||200, bb = parseInt(c.slice(5,7),16)||200;

    const draw = () => {
      ctx.clearRect(0,0,size,size); t++;
      const pulse = 0.5+0.5*Math.sin(t*0.04);
      const isMonarch = stageIdx===5;
      const numRings = Math.min(stageIdx+2,6);

      for (let k=0; k<numRings; k++) {
        const r = size*(0.11+k*0.073);
        const alpha = (0.15+0.1*pulse)*(1-k*0.1);
        const rot = k%2===0 ? t*0.008*(k+1) : -t*0.006*(k+1);
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
        ctx.strokeStyle=`rgba(${rr},${gg},${bb},${alpha})`;
        ctx.lineWidth=isMonarch?2-k*0.2:1+(numRings-k)*0.15;
        ctx.shadowColor=c; ctx.shadowBlur=8+pulse*6;
        if (!isMonarch&&k>0) ctx.setLineDash([Math.PI*2/(8+k*4),Math.PI*r/(16+k*8)]);
        ctx.beginPath(); ctx.arc(0,0,r-size*0.015,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
      if (stageIdx>=2) {
        const sc = 3+stageIdx*2;
        for (let s=0;s<sc;s++) {
          const ba = (s/sc)*Math.PI*2+t*0.025;
          const sr = size*(0.14+0.04*Math.sin(t*0.05+s));
          const sx=cx+sr*Math.cos(ba), sy=cy+sr*Math.sin(ba);
          const al=0.4+0.3*Math.sin(t*0.05+s*1.2);
          ctx.save(); ctx.fillStyle=`rgba(${rr},${gg},${bb},${al})`; ctx.shadowColor=c; ctx.shadowBlur=6;
          ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill(); ctx.restore();
        }
      }
      if (stageIdx>=3) {
        const rc2 = stageIdx;
        for (let r=0;r<rc2;r++) {
          const ra=(r/rc2)*Math.PI*2+t*0.015;
          const rx=cx+size*0.3*Math.cos(ra), ry=cy+size*0.3*Math.sin(ra);
          ctx.save(); ctx.translate(rx,ry); ctx.rotate(t*0.02+r);
          ctx.font=`${size*0.07}px serif`; ctx.fillStyle=`rgba(${rr},${gg},${bb},${0.3+0.2*pulse})`;
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText(["◆","▲","●","⬡","★","✦"][r%6],0,0); ctx.restore();
        }
      }
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,size*0.17);
      const ca=isMonarch?0.6+0.3*pulse:0.2+0.15*pulse;
      cg.addColorStop(0,`rgba(${rr},${gg},${bb},${ca})`);
      cg.addColorStop(0.5,`rgba(${rr},${gg},${bb},${ca*0.3})`); cg.addColorStop(1,"transparent");
      ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,size*0.17,0,Math.PI*2); ctx.fill();
      if (isMonarch) {
        ctx.save(); ctx.globalAlpha=0.12+0.06*pulse;
        const bg2=ctx.createRadialGradient(cx,cy,0,cx,cy,size*0.45);
        const hs=(t*2)%360;
        bg2.addColorStop(0,`hsl(${hs},100%,80%)`); bg2.addColorStop(0.5,`hsl(${hs+120},100%,60%)`); bg2.addColorStop(1,"transparent");
        ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(cx,cy,size*0.45,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      animRef.current=requestAnimationFrame(draw);
    };
    animRef.current=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(animRef.current);
  },[ap,stage,stageIdx,size]);

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      <canvas ref={cvRef} style={{ width:size, height:size, display:"block" }}/>
      <div style={{ position:"absolute", bottom:2, left:0, right:0, textAlign:"center", fontSize:8, fontWeight:800, letterSpacing:"0.12em", color:stage.color, fontFamily:ORB, textShadow:`0 0 10px ${stage.color}` }}>{stage.label}</div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SPARKLINE CANVAS — 30-day stat history
// ═══════════════════════════════════════════════════════════════════
function Sparkline({ data = [], color = "#F5C842", w = 120, h = 36 }) {
  const cvRef = useRef(null);
  useEffect(() => {
    const cv = cvRef.current; if (!cv || data.length < 2) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    const mx = Math.max(...data,1), mn = Math.min(...data,0);
    const pad = 4;
    const xScale = (w-pad*2)/(data.length-1);
    const yScale = (h-pad*2)/(mx-mn||1);
    const pts = data.map((v,i)=>({ x:pad+i*xScale, y:h-pad-(v-mn)*yScale }));

    const rr=parseInt(color.slice(1,3),16)||200, gg=parseInt(color.slice(3,5),16)||200, bb=parseInt(color.slice(5,7),16)||200;
    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,`rgba(${rr},${gg},${bb},0.3)`); grad.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,h); ctx.lineTo(pts[0].x,h); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();

    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.shadowColor=color; ctx.shadowBlur=4;
    ctx.stroke();

    // Peak marker
    const peakIdx=data.indexOf(mx);
    ctx.save(); ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.arc(pts[peakIdx].x,pts[peakIdx].y,2.5,0,Math.PI*2); ctx.fill(); ctx.restore();
  },[data,color,w,h]);
  return <canvas ref={cvRef} style={{ width:w, height:h, display:"block" }}/>;
}

// ═══════════════════════════════════════════════════════════════════
// MOOD TIMELINE CANVAS
// ═══════════════════════════════════════════════════════════════════
function MoodTimeline({ entries = [], w = 320, h = 80 }) {
  const cvRef = useRef(null);
  useEffect(() => {
    const cv = cvRef.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,w,h);
    if (entries.length < 2) { ctx.fillStyle=M.textLow; ctx.font=`11px Rajdhani,sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("Add journal entries to see mood trend",w/2,h/2); return; }
    const pad=8, xScale=(w-pad*2)/(entries.length-1), yScale=(h-pad*2)/9;
    const pts=entries.map((e,i)=>({ x:pad+i*xScale, y:h-pad-(e.mood-1)*yScale }));
    const moodGrad=ctx.createLinearGradient(0,0,0,h);
    moodGrad.addColorStop(0,"rgba(34,197,94,0.25)"); moodGrad.addColorStop(0.5,"rgba(245,200,66,0.15)"); moodGrad.addColorStop(1,"rgba(239,68,68,0.08)");
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,h); ctx.lineTo(pts[0].x,h); ctx.closePath(); ctx.fillStyle=moodGrad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=PA.p; ctx.lineWidth=1.8; ctx.shadowColor=PA.p; ctx.shadowBlur=5; ctx.stroke();
    pts.forEach(p=>{ ctx.save(); ctx.fillStyle=PA.p; ctx.shadowColor=PA.p; ctx.shadowBlur=6; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); ctx.restore(); });
  },[entries,w,h]);
  return <canvas ref={cvRef} style={{ width:w, height:h, display:"block", borderRadius:8 }}/>;
}

// ═══════════════════════════════════════════════════════════════════
// QUESTIONNAIRE
// ═══════════════════════════════════════════════════════════════════
function Questionnaire({ onSubmit, savedAnswers }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState(savedAnswers || {});
  const [dir, setDir] = useState(1);
  const [warn, setWarn] = useState(false);
  const sec = SECTIONS[step], isLast = step === SECTIONS.length - 1;

  function go(n) {
    if (n < 0) { setWarn(true); return; }
    snd(n > step ? "nav" : "back"); setDir(n > step ? 1 : -1); setStep(n);
    try { sessionStorage.setItem("sys_qa", JSON.stringify({ step:n, ans })); } catch {}
  }
  function pick(id, val) {
    setAns(a => { const u = {...a,[id]:val}; try { sessionStorage.setItem("sys_qa",JSON.stringify({step,ans:u})); } catch {} return u; });
    snd("tick");
  }

  return (
    <div style={{ animation:"fadeUp 0.4s ease" }}>
      {warn && (
        <div style={{ position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.8)",backdropFilter:"blur(12px)" }}>
          <Card style={{ maxWidth:300,textAlign:"center",margin:"0 20px" }} glass>
            <div style={{ fontSize:36,color:PA.p,marginBottom:16 }}>◆</div>
            <p style={{ fontSize:13,color:M.textMid,lineHeight:1.75,marginBottom:20,fontFamily:RAJ }}>Going back will discard your answers.</p>
            <div style={{ display:"flex",gap:8 }}>
              <Btn full variant="ghost" onClick={()=>setWarn(false)}>Stay</Btn>
              <Btn full variant="danger" onClick={()=>{snd("back");try{sessionStorage.removeItem("sys_qa");}catch{}window.location.reload();}}>Leave</Btn>
            </div>
          </Card>
        </div>
      )}
      <div style={{ marginBottom:20 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
          <span style={{ fontSize:11,fontWeight:600,color:M.textLow,letterSpacing:"0.08em",fontFamily:ORB }}>SECTION {step+1} / {SECTIONS.length}</span>
          <span style={{ fontSize:12,fontWeight:700,color:PA.p,fontFamily:ORB }}>{Math.round((step/(SECTIONS.length-1))*100)}%</span>
        </div>
        <div style={{ height:3,background:M.surface,borderRadius:99,overflow:"hidden" }}>
          <div style={{ height:"100%",width:`${(step/(SECTIONS.length-1))*100}%`,background:`linear-gradient(90deg,${PA.d},${PA.p})`,borderRadius:99,transition:"width 0.4s cubic-bezier(0.22,1,0.36,1)" }}/>
        </div>
        <div style={{ display:"flex",gap:3,marginTop:8 }}>
          {SECTIONS.map((s,i)=>(
            <div key={s.id} onClick={()=>i<step&&go(i)} style={{ flex:1,height:3,borderRadius:99,background:i<step?PA.p:i===step?PA.p+"88":M.surface,cursor:i<step?"pointer":"default",transition:"background 0.3s",boxShadow:i===step?`0 0 6px ${PA.glow}`:""}}/>
          ))}
        </div>
      </div>

      <Card style={{ animation:`${dir>0?"slideRight":"slideLeft"} 0.22s ease` }}>
        <div style={{ marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${M.border}` }}>
          <div style={{ display:"flex",alignItems:"center",gap:14 }}>
            <div style={{ width:44,height:44,borderRadius:12,background:PA.dim,border:`1px solid ${PA.p}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0 }}>{sec.e}</div>
            <div>
              <h2 style={{ fontSize:16,fontWeight:700,letterSpacing:"0.04em",color:PA.p,margin:"0 0 3px",fontFamily:ORB }}>{sec.l}</h2>
              <p style={{ fontSize:12,color:M.textLow,margin:0,fontFamily:RAJ }}>{sec.d}</p>

function SSSGate({ stats }) {
  const vals = STATS.map(s => ({ ...s, v: stats?.[s.key]?.value || 0 }));
  const below = vals.filter(s => s.v < 90);
  const pct = Math.round(((15-below.length)/15)*100);
  const achieved = below.length === 0;
  return (
    <Card accent="#FFD700" glow={achieved?"#FFD700":undefined}>
      <Lbl c="#FFD700" icon="🌌" mb={8}>SSS RANK GATE — WORLD BOSS PROTOCOL</Lbl>

function calcXpNeeded(level) { return Math.round(100 * Math.pow(level + 1, 1.45)); }

async function generateProfile(answers) {
  // Build structured answer summary by section
  const sectionSummaries = SECTIONS.map(sec => {
    const secAnswers = sec.qs.map(q => {
      const val = answers[q.id];
      if(!val) return null;
      return `  ${q.t}\n  → ${val}`;
    }).filter(Boolean);
    if(!secAnswers.length) return null;
    return `[${sec.l}]\n${secAnswers.join("\n")}`;
  }).filter(Boolean).join("\n\n");

  const ansText = sectionSummaries || Object.entries(answers).map(([k,v])=>`${k}: ${v}`).join("\n");
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:SCAN_PROMPT(null,null),messages:[{role:"user",content:ansText}]})});
    const d = await r.json();
    const txt = d.content?.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    return JSON.parse(txt);
  } catch {
    return {
      name: answers.name || "Hunter",
      origin: "Unknown Province",
      class: "Wanderer",
      systemRead: "The System detects vast untapped potential within you.",
      weeklyQuests: ["Train your weakest stat daily","Complete all habits for 7 days","Defeat the first boss"],
      microGoals: ["Wake up before 7am","Read 20 pages daily","Exercise 30 minutes"],
      chips: ["Hidden Potential","Unranked"],
      stats: STATS.reduce((acc,s)=>({...acc,[s.key]:{value:25+Math.floor(Math.random()*35),delta:0}}),{}),
    };
  }
}

function reducer(state, action) {
  const s = {...state};
  switch(action.type) {
    case "SET_PROFILE": return {...s, profile:action.payload};
    case "SET_SETTINGS": return {...s, settings:action.payload};
    case "RESET": return {profile:null, settings:{paletteKey:"gold",soundEnabled:true,ambientEnabled:true,autoSave:true,showLevelUp:true,bossNotify:true,streakReminder:true,difficulty:1}};
    case "TOGGLE_HABIT": {
      const {id,date}=action.payload;
      const h={...(s.profile?.habits||{})};
      const d={...(h[date]||{})};
      d[id]=!d[id]; h[date]=d;
      const allDone=HABITS.every(hb=>d[hb.id]);
      const updP={...s.profile,habits:h};
      if(d[id]){const hab=HABITS.find(hb=>hb.id===id);if(hab){updP.xpCurrent=(updP.xpCurrent||0)+hab.xp;updP.totalXP=(updP.totalXP||0)+hab.xp;updP.totalAura=(updP.totalAura||0)+hab.ap;}}
      if(allDone){updP.xpCurrent=(updP.xpCurrent||0)+50;updP.totalXP=(updP.totalXP||0)+50;}
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      return {...s,profile:updP};
    }
    case "TOGGLE_RITUAL": {
      const {phase,idx,date}=action.payload;
      const rd={...(s.profile?.ritualDone||{})};
      const today={...(rd[date]||{morning:[],evening:[]})};
      const arr=[...(today[phase]||[])];
      const ix=arr.indexOf(idx);
      if(ix>=0)arr.splice(ix,1);else arr.push(idx);
      today[phase]=arr;rd[date]=today;
      const r=phase==="morning"?MORNING_RITUALS[idx]:EVENING_RITUALS[idx];
      const updP={...s.profile,ritualDone:rd};
      if(ix<0&&r){updP.xpCurrent=(updP.xpCurrent||0)+r.xp;updP.totalXP=(updP.totalXP||0)+r.xp;}
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      return {...s,profile:updP};
    }
    case "COMPLETE_MISSION": {
      const {id,xp,ap,bossDmg}=action.payload;
      const cm={...(s.profile?.completedMissions||{}),[id]:true};
      const updP={...s.profile,completedMissions:cm};
      updP.xpCurrent=(updP.xpCurrent||0)+xp;
      updP.totalXP=(updP.totalXP||0)+xp;
      updP.totalAura=(updP.totalAura||0)+ap;
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      if(bossDmg&&updP.bossState){const bid=updP.bossState.currentBossId||"procrastination_demon";const bs={...(updP.bossState[bid]||{hp:BOSSES.find(b=>b.id===bid)?.hp||1000})};bs.hp=Math.max(0,bs.hp-bossDmg);if(bs.hp===0)bs.defeated=true;updP.bossState={...updP.bossState,[bid]:bs};}
      return {...s,profile:updP};
    }
    case "BOSS_ATTACK": {
      const {bossId,dmg}=action.payload;
      const bs={...(s.profile?.bossState||{})};
      const bd={...(bs[bossId]||{hp:BOSSES.find(b=>b.id===bossId)?.hp||1000})};
      bd.hp=Math.max(0,bd.hp-dmg);bs[bossId]=bd;
      return {...s,profile:{...s.profile,bossState:bs}};
    }
    case "BOSS_DEFEATED": {
      const {bossId,xp,ap}=action.payload;
      const bs={...(s.profile?.bossState||{})};
      bs[bossId]={...bs[bossId],defeated:true,hp:0};
      const updP={...s.profile,bossState:bs};
      updP.xpCurrent=(updP.xpCurrent||0)+xp;updP.totalXP=(updP.totalXP||0)+xp;updP.totalAura=(updP.totalAura||0)+ap;
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      return {...s,profile:updP};
    }
    case "SET_BOSS": return {...s,profile:{...s.profile,bossState:{...(s.profile?.bossState||{}),currentBossId:action.payload.bossId}}};
    case "NEXT_BOSS": return {...s,profile:{...s.profile,bossState:{...(s.profile?.bossState||{}),currentBossId:action.payload.bossId}}};
    case "COMPLETE_DUNGEON": {
      const {dungeonId,xp,ap}=action.payload;
      const cd=[...(s.profile?.completedDungeons||[])];
      if(!cd.includes(dungeonId))cd.push(dungeonId);
      const updP={...s.profile,completedDungeons:cd};
      updP.xpCurrent=(updP.xpCurrent||0)+xp;updP.totalXP=(updP.totalXP||0)+xp;updP.totalAura=(updP.totalAura||0)+ap;
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      return {...s,profile:updP};
    }
    case "ADD_JOURNAL": {
      const entries=[...(s.profile?.journal||[]),action.payload];
      return {...s,profile:{...s.profile,journal:entries}};
    }
    case "FOCUS_DONE": {
      const updP={...s.profile};
      updP.xpCurrent=(updP.xpCurrent||0)+30;updP.totalXP=(updP.totalXP||0)+30;
      const xpN=calcXpNeeded(updP.level||1);
      while(updP.xpCurrent>=xpN){updP.xpCurrent-=xpN;updP.level=(updP.level||0)+1;}
      updP.xpNeeded=calcXpNeeded(updP.level||1);
      return {...s,profile:updP};
    }
    default: return s;
  }
}

function computeResonancePatterns(profile) {
