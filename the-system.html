  if(fajrMoodCount>2 && noFajrMoodCount>2) {
    const fajrAvg = fajrMoodTotal/fajrMoodCount;
    const noFajrAvg = noFajrMoodTotal/noFajrMoodCount;
    const diff = Math.round((fajrAvg-noFajrAvg)*10)/10;
    if(Math.abs(diff)>0.5) {
      patterns.push({
        id:"fajr_mood", type:"amplifier",
        title:"Fajr Prayer → Mood",
        insight:`On days you pray Fajr, your journal mood averages ${diff>0?"+":""}${diff} points`,
        confidence: Math.min(99, 50 + fajrMoodCount*3),
        actionable: diff>0 ? "Protect your Fajr. It is statistically your most impactful act." : "Review your post-Fajr routine.",
        data: {fajrAvg: Math.round(fajrAvg*10)/10, noFajrAvg: Math.round(noFajrAvg*10)/10}
      });
    }
  }

  // Pattern 2: Streak vs journal mood
  const streak = profile.streak||0;
  const recentMoods = journal.slice(-14).map(j=>j.mood||5);
  const avgMood = recentMoods.length ? recentMoods.reduce((a,b)=>a+b,0)/recentMoods.length : 5;
  if(streak>7 && avgMood>6) {
    patterns.push({
      id:"streak_mood", type:"amplifier",
      title:"Consistency → Emotional Stability",
      insight:`Your ${streak}-day streak correlates with above-average mood (${Math.round(avgMood*10)/10}/10)`,
      confidence:82,
      actionable:"Your emotional baseline rises when you maintain systems. The streak is the medicine.",
      data:{ streak, avgMood: Math.round(avgMood*10)/10 }
    });
  }

  // Pattern 3: Sleep → performance
  if(sleep.length>5) {
    const goodSleepDays = sleep.filter(s=>s.hours>=7);
    const badSleepDays = sleep.filter(s=>s.hours<6);
    if(goodSleepDays.length>2 && badSleepDays.length>1) {
      patterns.push({
        id:"sleep_perf", type:"amplifier",
        title:"Sleep Quality → Daily Output",
        insight:`On 7h+ sleep nights (${goodSleepDays.length} days), your habit completion rate is statistically higher`,
        confidence:74,
        actionable:"Sleep is your highest-leverage performance variable. Protect it before optimizing anything else.",
        data:{ goodSleepDays: goodSleepDays.length, badSleepDays: badSleepDays.length }
      });
    }
  }

  // Pattern 4: Habit cascade keystone detection
  const HABITS_IDS = ["fajr","exercise","cold","reading","journal","meditation"];
  const habitCompletionByHabit = {};
  days.forEach(date => {
    const h = habits[date]||{};
    HABITS_IDS.forEach(id => {
      if(!habitCompletionByHabit[id]) habitCompletionByHabit[id] = {total:0, withOthers:0};
      if(h[id]) {
        habitCompletionByHabit[id].total++;
        const othersCount = HABITS_IDS.filter(oid=>oid!==id&&h[oid]).length;
        if(othersCount>=3) habitCompletionByHabit[id].withOthers++;
      }
    });
  });
  let keystoneHabit = null, bestRatio = 0;
  Object.entries(habitCompletionByHabit).forEach(([id,d])=>{
    if(d.total>3) {
      const ratio = d.withOthers/d.total;
      if(ratio>bestRatio) { bestRatio=ratio; keystoneHabit=id; }
    }
  });
  if(keystoneHabit && bestRatio>0.6) {
    patterns.push({
      id:"keystone", type:"keystone",
      title:`Keystone Habit: ${keystoneHabit.charAt(0).toUpperCase()+keystoneHabit.slice(1)}`,
      insight:`When you complete ${keystoneHabit}, you complete 3+ other habits ${Math.round(bestRatio*100)}% of the time`,
      confidence:Math.round(bestRatio*100),
      actionable:`${keystoneHabit.charAt(0).toUpperCase()+keystoneHabit.slice(1)} is your chain-reaction habit. Start here first every day.`,
      data:{ keystoneHabit, ratio: Math.round(bestRatio*100) }
    });
  }

  // Pattern 5: Warning signal (pre-failure signature)
  const recentDays = days.slice(-3);
  let warningScore = 0;
  const warningReasons = [];
  if(streak<profile.bestStreak && profile.bestStreak>7) { warningScore+=20; warningReasons.push("Below personal best streak"); }
  if(recentDays.filter(d=>habits[d]).length < 2) { warningScore+=25; warningReasons.push("Skipped habits 2+ of last 3 days"); }
  if(recentMoods.slice(-3).every(m=>m<5)) { warningScore+=20; warningReasons.push("Mood below 5 for 3 consecutive days"); }
  if(sleep.slice(-2).every(s=>s.hours<6)) { warningScore+=15; warningReasons.push("Sleep deficit 2 nights running"); }
  if(warningScore>=30) {
    patterns.push({
      id:"warning", type:"trigger",
      title:"Pre-Failure Signature Detected",
      insight:`${warningReasons.join(" · ")}. Pattern matches ${warningScore}% of your historical pre-streak-break signatures.`,
      confidence: warningScore,
      actionable:"This is a recognized pattern. The next 48h will determine if the downward spiral starts or breaks. Act now.",
      data:{ warningScore, reasons: warningReasons }
    });
  }

  return patterns;
}

function computeIdentityWaveform(profile) {
  if(!profile) return {};
  const stats = profile.stats||{};
  const prayers = profile.prayerLogs||{};
  const habits = profile.habits||{};
  const today = new Date().toISOString().slice(0,10);
  const last7 = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10);
  });

  const prayerDays = last7.filter(d=>prayers[d]&&Object.values(prayers[d]).filter(Boolean).length>=4).length;
  const habitDays = last7.filter(d=>habits[d]&&Object.keys(habits[d]).length>=4).length;
  const physScore = (stats.strength?.value||0)*0.3 + (stats.endurance?.value||0)*0.3 + (stats.vitality?.value||0)*0.4;

  return {
    warrior: Math.round(((stats.discipline?.value||0)*0.4 + physScore*0.4 + habitDays*6)*0.8),
    scholar: Math.round(((stats.intelligence?.value||0)*0.5 + (stats.wisdom?.value||0)*0.5) * 0.9),
    creator: Math.round(((stats.creativity?.value||0)*0.6 + (profile.journal?.length||0)*0.5) * 0.7),
    servant: Math.round(((profile.sadaqahLog||[]).length*8 + (profile.contacts||[]).length*3) * 0.9),
    sovereign: Math.round(((stats.leadership?.value||0)*0.5 + (profile.level||0)*0.8) * 0.85),
    mystic: Math.round(prayerDays*12 + (stats.focus?.value||0)*0.4 + (profile.stoicLogs?.length||0)*2),
  };
}

function computeEnergyMap(profile) {
  const logs = profile?.energyLogs||[];
  const map = {};
  logs.forEach(l=>{
    const h = new Date(l.ts).getHours();
    const bucket = Math.floor(h/2);
    if(!map[bucket]) map[bucket] = {total:0, count:0};
    map[bucket].total += l.level;
    map[bucket].count++;
  });
  return Object.entries(map).map(([b,d])=>({
    hour: parseInt(b)*2,
    label: `${parseInt(b)*2}:00`,
    avg: Math.round((d.total/d.count)*10)/10
  }));
}

function getHijriDate() {
  const now = new Date();
  const jd = Math.floor((now.getTime()/86400000) + 2440587.5);
  let l = jd - 1948440 + 10632;
  const n = Math.floor((l-1)/10631);
  l = l - 10631*n + 354;
  const j = Math.floor((10985-l)/5965) + Math.floor((l-5138)/5965);
  l = l - Math.floor((29.5001*j)+0.5) + 30;
  const i = Math.floor((l-1)/354);
  l = l - 354*i;
  const month = Math.min(12, Math.floor((l+5)/30));
  const day = l - 29*(month-1) - Math.floor((month/2));
  return {day, month, year: n*30+i, monthName: HIJRI_MONTHS[month-1]||"Unknown"};
}

// ENERGY MAPPER — log energy every 2hrs, find peak performance windows
// ════════════════════════════════════════════════════════════════════════════
function EnergyMapper({ profile, dispatch }) {
  const [level, setLevel] = useState(3);
  const [note, setNote] = useState("");
  const energyLogs = profile?.energyLogs || [];
  const energyMap = computeEnergyMap(profile);

  function logEnergy() {
    const entry = {id:Date.now(), ts:Date.now(), level, note, hour:new Date().getHours()};
    const updated = [...energyLogs, entry];
    dispatch({type:"SET_PROFILE", payload:{...profile, energyLogs:updated}});
    setNote("");
  }

  const peak = energyMap.reduce((best,h)=>h.avg>best.avg?h:best, {avg:0,label:"N/A"});

  return(
    <Card>
      <Lbl icon="⚡" mb={12}>ENERGY MAP — PEAK PERFORMANCE</Lbl>
      {peak.avg>0&&(
        <div style={{padding:"10px 14px",background:PA.dim,borderRadius:10,marginBottom:12,border:`1px solid ${PA.p}33`}}>
          <div style={{fontSize:10,color:PA.p,fontFamily:ORB,fontWeight:700}}>YOUR PEAK ENERGY WINDOW</div>
          <div style={{fontSize:16,fontWeight:900,color:M.text,fontFamily:ORB}}>{peak.label} — {peak.avg}/5</div>
          <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ}}>Schedule deep work, training and critical decisions here</div>
        </div>
      )}
      {/* Bar chart */}
      {energyMap.length>0&&(
        <div style={{display:"flex",gap:3,alignItems:"flex-end",height:60,marginBottom:12}}>
          {energyMap.map((h,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{
                width:"100%",borderRadius:"4px 4px 0 0",
                height:Math.round((h.avg/5)*52),
                background:h.avg>=4?"#22C55E":h.avg>=3?PA.p:"#EF4444",
                transition:"height 0.4s ease",
              }}/>
              <div style={{fontSize:6,color:M.textLow,fontFamily:ORB,whiteSpace:"nowrap"}}>{h.label}</div>
            </div>
          ))}
        </div>
      )}
      {/* Log energy now */}
      <div style={{marginTop:8}}>
        <div style={{fontSize:10,color:M.textLow,fontFamily:ORB,marginBottom:6}}>LOG ENERGY NOW</div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {ENERGY_LEVELS.map(e=>(
            <button key={e.v} onClick={()=>setLevel(e.v)} style={{
              flex:1,padding:"8px 4px",borderRadius:8,border:`2px solid ${level===e.v?e.color:M.border}`,
              background:level===e.v?`${e.color}22`:"transparent",color:level===e.v?e.color:M.textLow,
              fontSize:8,fontFamily:ORB,fontWeight:700,cursor:"pointer",transition:"all 0.15s",
            }}>{e.label.toUpperCase()}</button>
          ))}

        <Btn onClick={logEnergy} variant="primary" full style={{fontFamily:ORB}}>LOG ENERGY</Btn>

    </Card>
  );
}

// SUPPLEMENT TRACKER
// ════════════════════════════════════════════════════════════════════════════
function SupplementTracker({ profile, dispatch }) {
  const today = new Date().toISOString().slice(0,10);
  const suppLogs = profile?.suppLogs || {};
  const todaySupp = suppLogs[today] || {};
  const [custom, setCustom] = useState([...(profile?.customSupps||[])]);
  const [adding, setAdding] = useState(false);
  const [newSupp, setNewSupp] = useState("");

  function toggleSupp(id) {
    const updated = {...suppLogs, [today]: {...todaySupp, [id]: !todaySupp[id]}};
    dispatch({type:"SET_PROFILE", payload:{...profile, suppLogs:updated}});
  }

  const allSupps = [...SUPPLEMENT_LIST, ...custom];
  const done = allSupps.filter(s=>todaySupp[s.id]).length;

  return(
    <Card>
      <Lbl icon="💊" mb={12}>SUPPLEMENT STACK</Lbl>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}>
        <span style={{fontSize:10,color:M.textLow,fontFamily:ORB}}>{done}/{allSupps.length} TAKEN TODAY</span>
        <button onClick={()=>setAdding(!adding)} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${PA.p}44`,
          background:PA.dim,color:PA.p,fontSize:9,fontFamily:ORB,fontWeight:700,cursor:"pointer"}}>+ ADD</button>
      </div>
      {adding&&(
        <div style={{marginBottom:12,display:"flex",gap:6}}>
          <input value={newSupp} onChange={e=>setNewSupp(e.target.value)} placeholder="Supplement name"
            style={{flex:1,background:M.input,border:`1px solid ${M.border}`,borderRadius:8,padding:"8px 10px",
              color:M.text,fontSize:11,fontFamily:RAJ,outline:"none"}}/>
          <Btn onClick={()=>{
            if(!newSupp.trim()) return;
            const c={id:`custom_${Date.now()}`,n:newSupp,e:"💊",timing:"Daily"};
            const upd=[...custom,c];
            setCustom(upd);
            dispatch({type:"SET_PROFILE",payload:{...profile,customSupps:upd}});
            setNewSupp(""); setAdding(false);
          }} variant="primary" style={{fontFamily:ORB,fontSize:10}}>ADD</Btn>
        </div>
      )}
      {allSupps.map(s=>{
        const taken=!!todaySupp[s.id];
        return(
          <div key={s.id} onClick={()=>toggleSupp(s.id)} style={{
            display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
            background:taken?"#22C55E12":M.surface,borderRadius:10,
            border:`1px solid ${taken?"#22C55E33":M.border}`,marginBottom:6,cursor:"pointer",transition:"all 0.2s",
          }}>
            <span style={{fontSize:20}}>{s.e}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:taken?"#22C55E":M.text,fontFamily:RAJ}}>{s.n}</div>
              <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ}}>{s.timing}</div>
            </div>
            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${taken?"#22C55E":"#3A3550"}`,
              background:taken?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {taken&&<span style={{color:"#000",fontSize:11,fontWeight:900}}>✓</span>}
            </div>
          </div>
        );
      })}
    </Card>
  );
}

// TIME BLOCKER — plan vs actual hours per category
// ════════════════════════════════════════════════════════════════════════════
function TimeBlocker({ profile, dispatch }) {
  const today = new Date().toISOString().slice(0,10);
  const timeLogs = profile?.timeLogs||{};
  const todayLog = timeLogs[today]||{};
  const [editing, setEditing] = useState({});

  function setHours(catId, hours) {
    const h = Math.max(0, Math.min(24, parseFloat(hours)||0));
    const updated = {...timeLogs, [today]: {...todayLog, [catId]: h}};
    dispatch({type:"SET_PROFILE", payload:{...profile, timeLogs:updated}});
  }

  const totalLogged = Object.values(todayLog).reduce((a,b)=>a+b,0);
  const remaining = Math.max(0, 24-totalLogged);

  return(
    <Card>
      <Lbl icon="⏰" mb={4}>TIME BLOCKER — 168H/WEEK</Lbl>
      <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ,marginBottom:12}}>
        {Math.round(totalLogged*10)/10}h logged · {Math.round(remaining*10)/10}h remaining today
      </div>
      <div style={{height:8,background:M.surface,borderRadius:99,overflow:"hidden",marginBottom:14}}>
        <div style={{display:"flex",height:"100%"}}>
          {TIME_CATEGORIES.filter(c=>todayLog[c.id]>0).map(c=>(
            <div key={c.id} style={{
              width:`${(todayLog[c.id]/24)*100}%`,background:c.color,
              transition:"width 0.4s ease",
            }}/>
          ))}
        </div>
      </div>
      {TIME_CATEGORIES.map(c=>{
        const actual=todayLog[c.id]||0;
        const target=c.target;
        const over=actual>target;
        return(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:16,width:24,textAlign:"center",flexShrink:0}}>{c.e}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:11,color:M.text,fontFamily:RAJ,fontWeight:600}}>{c.n}</span>
                <span style={{fontSize:9,color:over?"#22C55E":"#F59E0B",fontFamily:ORB}}>
                  {actual}h / {target}h target
                </span>
              </div>
              <div style={{height:4,background:M.surface,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(100,(actual/target)*100)}%`,
                  background:c.color,borderRadius:99,transition:"width 0.4s ease"}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}}>
              {[0.5,1,2].map(n=>(
                <button key={n} onClick={()=>setHours(c.id,(actual+n))} style={{
                  width:28,height:28,borderRadius:6,border:`1px solid ${c.color}44`,
                  background:"transparent",color:c.color,fontSize:9,fontFamily:ORB,cursor:"pointer",
                }}>+{n}</button>
              ))}
            </div>
          </div>
        );
      })}
    </Card>
  );
}

// COGNITIVE DISTORTION DETECTOR — scans journal for patterns
// ════════════════════════════════════════════════════════════════════════════
function DistortionDetector({ profile, dispatch }) {
  const [scanning, setScanning] = useState(false);
  const [results, setResults] = useState(null);
  const [selectedText, setSelectedText] = useState("");
  const recentEntries = (profile?.journal||[]).slice(-5);

  async function scanForDistortions() {
    if(!selectedText.trim()) return;
    setScanning(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:600,
          system:`You are a cognitive behavioral therapist. Analyze the journal text for cognitive distortions.
Return JSON only: {"distortions":[{"type":"id_from_list","quote":"exact quote","reframe":"healthier thought"}],"score":1-10,"summary":"brief assessment"}
Distortion IDs: allornoth,overgen,mental,disqual,mindreed,fortune,magnify,emotional,should,labeling,personal`,
          messages:[{role:"user",content:`Analyze this journal entry:\n\n${selectedText}`}]

          padding:"10px 12px",color:M.text,fontSize:12,resize:"vertical",boxSizing:"border-box",
          fontFamily:RAJ,outline:"none",lineHeight:1.65,marginBottom:10}}/>
      <Btn onClick={scanForDistortions} variant="primary" full disabled={scanning||!selectedText.trim()} style={{fontFamily:ORB}}>
        {scanning?"SCANNING...":"SCAN FOR DISTORTIONS"}
      </Btn>
      {results&&(
        <div style={{marginTop:14,animation:"fadeUp 0.3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,padding:"10px 12px",
            background:results.distortions.length===0?"#22C55E18":"#F59E0B18",borderRadius:10,
            border:`1px solid ${results.distortions.length===0?"#22C55E44":"#F59E0B44"}`}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:results.distortions.length===0?"#22C55E":"#F59E0B",fontFamily:ORB}}>
                {results.distortions.length} DISTORTION{results.distortions.length!==1?"S":""} FOUND
              </div>
              <div style={{fontSize:11,color:M.textMid,fontFamily:RAJ,marginTop:2}}>{results.summary}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:900,color:PA.p,fontFamily:ORB}}>{results.score}/10</div>
              <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>CLARITY</div>
            </div>
          </div>
          {results.distortions.map((d,i)=>{
            const def=DISTORTIONS.find(x=>x.id===d.type)||{e:"🧠",n:d.type};
            return(
              <div key={i} style={{padding:"12px 14px",background:M.surface,borderRadius:10,
                border:`1px solid ${M.border}`,marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>

                  padding:"6px 8px",background:"#EF444412",borderRadius:6}}>"{d.quote}"</div>
                <div style={{fontSize:11,color:"#22C55E",fontFamily:RAJ,
                  padding:"6px 8px",background:"#22C55E12",borderRadius:6}}>↳ {d.reframe}</div>

// PROJECT TRACKER with milestone XP
// ════════════════════════════════════════════════════════════════════════════
function ProjectTracker({ profile, dispatch }) {
  const projects = profile?.projects||[];
  const [adding, setAdding] = useState(false);
  const [newProj, setNewProj] = useState({name:"",goal:"",deadline:"",milestones:[]});
  const [newMilestone, setNewMilestone] = useState("");

  function addProject() {
    if(!newProj.name.trim()) return;
    const proj = {...newProj, id:Date.now(), created:new Date().toISOString().slice(0,10), milestones:(newProj.milestones||[])};
    dispatch({type:"SET_PROFILE",payload:{...profile,projects:[...projects,proj]}});
    setNewProj({name:"",goal:"",deadline:"",milestones:[]});
    setAdding(false);
  }

  function completeMilestone(projId, mIdx) {
    const updated = projects.map(p=>{
      if(p.id!==projId) return p;
      const ms = [...p.milestones];
      if(ms[mIdx].done) return p;
      ms[mIdx] = {...ms[mIdx], done:true, completedAt:new Date().toISOString().slice(0,10)};
      return {...p, milestones:ms};
    });
    dispatch({type:"SET_PROFILE",payload:{
      ...profile,projects:updated,
      xpCurrent:(profile?.xpCurrent||0)+50,
      totalAura:(profile?.totalAura||0)+20,
    }});
  }

  return(
    <Card>
      <Lbl icon="🏗️" mb={12}>PROJECT TRACKER</Lbl>
      <Btn onClick={()=>setAdding(!adding)} variant="accent" full style={{fontFamily:ORB,marginBottom:12}}>
        + NEW PROJECT
      </Btn>
      {adding&&(
        <div style={{background:M.surface,borderRadius:12,padding:"14px",marginBottom:12,border:`1px solid ${M.border}`,animation:"fadeUp 0.3s ease"}}>
          <input value={newProj.name} onChange={e=>setNewProj({...newProj,name:e.target.value})}
            placeholder="Project name" style={{width:"100%",background:M.input,border:`1px solid ${M.border}`,
              borderRadius:8,padding:"8px 10px",color:M.text,fontSize:12,fontFamily:RAJ,outline:"none",
              boxSizing:"border-box",marginBottom:8}}/>
          <input value={newProj.goal} onChange={e=>setNewProj({...newProj,goal:e.target.value})}
            placeholder="End goal / definition of done" style={{width:"100%",background:M.input,border:`1px solid ${M.border}`,
              borderRadius:8,padding:"8px 10px",color:M.text,fontSize:12,fontFamily:RAJ,outline:"none",
              boxSizing:"border-box",marginBottom:8}}/>
          <input type="date" value={newProj.deadline} onChange={e=>setNewProj({...newProj,deadline:e.target.value})}
            style={{width:"100%",background:M.input,border:`1px solid ${M.border}`,borderRadius:8,
              padding:"8px 10px",color:M.text,fontSize:12,fontFamily:RAJ,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <input value={newMilestone} onChange={e=>setNewMilestone(e.target.value)}
              placeholder="Add milestone" style={{flex:1,background:M.input,border:`1px solid ${M.border}`,
                borderRadius:8,padding:"8px 10px",color:M.text,fontSize:12,fontFamily:RAJ,outline:"none"}}/>
            <Btn onClick={()=>{if(newMilestone.trim()){setNewProj({...newProj,milestones:[...newProj.milestones,{n:newMilestone,done:false}]});setNewMilestone("");}}} variant="primary" style={{fontFamily:ORB,fontSize:10}}>+</Btn>
          </div>
          {newProj.milestones.map((m,i)=>(
            <div key={i} style={{fontSize:11,color:M.textMid,fontFamily:RAJ,padding:"4px 8px"}}>◆ {m.n}</div>
          ))}
          <Btn onClick={addProject} variant="primary" full style={{fontFamily:ORB,marginTop:8}}>CREATE PROJECT</Btn>
        </div>
      )}
      {projects.length===0&&!adding&&(
        <div style={{textAlign:"center",padding:"20px 0",color:M.textLow,fontSize:12,fontFamily:RAJ}}>No active projects. Create one to start earning milestone XP.</div>
      )}
      {projects.map(p=>{
        const doneMs = p.milestones.filter(m=>m.done).length;
        const total = p.milestones.length;
        const pct = total>0?Math.round((doneMs/total)*100):0;
        const daysLeft = p.deadline ? Math.max(0,Math.round((new Date(p.deadline)-new Date())/86400000)) : null;
        return(
          <div key={p.id} style={{padding:"14px",background:M.surface,borderRadius:12,border:`1px solid ${M.border}`,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:800,color:M.text,fontFamily:ORB}}>{p.name}</div>
              {daysLeft!==null&&<div style={{fontSize:9,color:daysLeft<7?"#EF4444":"#F59E0B",fontFamily:ORB,fontWeight:700}}>{daysLeft}d left</div>}
            </div>
            {p.goal&&<div style={{fontSize:10,color:M.textLow,fontFamily:RAJ,marginBottom:8}}>{p.goal}</div>}
            <div style={{height:4,background:M.card,borderRadius:99,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:`${pct}%`,background:PA.p,borderRadius:99,transition:"width 0.4s ease"}}/>
            </div>
            <div style={{fontSize:9,color:M.textLow,fontFamily:ORB,marginBottom:8}}>{doneMs}/{total} MILESTONES · {pct}%</div>
            {p.milestones.map((m,i)=>(
              <div key={i} onClick={()=>!m.done&&completeMilestone(p.id,i)} style={{
                display:"flex",gap:8,alignItems:"center",padding:"6px 8px",borderRadius:8,
                background:m.done?"#22C55E12":M.card,border:`1px solid ${m.done?"#22C55E33":M.border}`,
                marginBottom:4,cursor:m.done?"default":"pointer",transition:"all 0.2s",
              }}>
                <div style={{width:14,height:14,borderRadius:4,border:`2px solid ${m.done?"#22C55E":"#3A3550"}`,
                  background:m.done?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {m.done&&<span style={{color:"#000",fontSize:9,fontWeight:900}}>✓</span>}
                </div>
                <span style={{fontSize:11,color:m.done?"#22C55E":M.textMid,fontFamily:RAJ,textDecoration:m.done?"line-through":"none"}}>{m.n}</span>
                {!m.done&&<span style={{fontSize:9,color:PA.p,fontFamily:ORB,marginLeft:"auto"}}>+50XP</span>}
              </div>
            ))}
          </div>
        );
      })}
    </Card>
  );
}

// ANNUAL REVIEW GENERATOR
// ════════════════════════════════════════════════════════════════════════════
function AnnualReviewGen({ profile }) {
  const [generating, setGenerating] = useState(false);
  const [review, setReview] = useState(null);

  async function generateReview() {
    setGenerating(true);
    const stats = profile?.stats||{};
    const topStat = Object.entries(stats).sort((a,b)=>(b[1]?.value||0)-(a[1]?.value||0))[0];
    const summary = {
      level: profile?.level||0, rank: profile?.rank||"E",
      streak: profile?.streak||0, bestStreak: profile?.bestStreak||0,
      totalXP: profile?.totalXP||0, totalAura: profile?.totalAura||0,
      topStat: topStat?`${topStat[0]}: ${topStat[1]?.value}`:"-",
      journalCount: profile?.journal?.length||0,
      achievements: profile?.achievements?.length||0,
      class: profile?.class||"Unknown",
    };
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:800,
          system:"You are THE SYSTEM. Write a powerful, personal, narrative annual review for this user. Use second person. Be direct, inspiring, and brutally honest. 3 sections: What You Built, What You Didn't Face, and The Year Ahead. Make it feel like reading a letter from your best self.",
          messages:[{role:"user",content:`My data: ${JSON.stringify(summary)}`}]
        })
      });
      const d = await r.json();
      setReview(d.content?.map(c=>c.text||"").join(""));
    } catch { setReview("Could not generate review. Check your connection."); }
    setGenerating(false);
  }

  return(
    <Card>
      <Lbl icon="📜" mb={10}>ANNUAL REVIEW GENERATOR</Lbl>
      <p style={{fontSize:11,color:M.textLow,lineHeight:1.7,fontFamily:RAJ,marginBottom:12}}>
        AI reads your full year of data and writes a personalized narrative review — achievements, blind spots, and the path forward.
      </p>
      <Btn onClick={generateReview} variant="primary" full disabled={generating} style={{fontFamily:ORB}}>
        {generating?"WRITING YOUR YEAR...":"GENERATE ANNUAL REVIEW"}
      </Btn>
      {generating&&<div style={{height:4,background:M.surface,borderRadius:99,overflow:"hidden",marginTop:8}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${PA.d},${PA.p})`,borderRadius:99,animation:"ritualFill 2s ease forwards"}}/>
      </div>}
      {review&&(
        <div style={{marginTop:14,padding:"16px",background:PA.dim,borderRadius:12,border:`1px solid ${PA.p}33`,
          animation:"fadeUp 0.4s ease",fontSize:12,color:M.text,lineHeight:1.85,fontFamily:RAJ,whiteSpace:"pre-wrap"}}>
          {review}
        </div>
      )}
    </Card>
  );
}

// QUICK PROFILE EDITOR — Edit individual fields without full re-scan

function QuickProfileEditor({ profile, dispatch, onClose }) {
  const [tab, setTab] = useState("identity");
  const [form, setForm] = useState({
    name:       profile?.name       || "",
    age:        profile?.age        || "",
    origin:     profile?.origin     || "",
    class:      profile?.class      || "",
    battleCry:  profile?.battleCry  || "",
    lifeVision: profile?.lifeVision || "",
    height:     profile?.height     || "",
    weight:     profile?.startWeight|| "",
    sleepTarget:profile?.sleepTarget|| "8",
    wakeTime:   profile?.wakeTime   || "05:30",
    sleepTime:  profile?.sleepTime  || "22:30",
  });
  const [statEdits, setStatEdits] = useState(
    Object.fromEntries(Object.entries(profile?.stats||{}).map(([k,v])=>[k,v?.value||0]))
  );
  const [saved, setSaved] = useState(false);

  function save() {
    const updatedStats = {};
    Object.entries(profile?.stats||{}).forEach(([k,v])=>{
      updatedStats[k] = {...v, value: parseInt(statEdits[k])||v?.value||0};
    });
    dispatch({type:"SET_PROFILE", payload:{
      ...profile,
      name:       form.name       || profile.name,
      age:        form.age        || profile.age,
      origin:     form.origin     || profile.origin,
      class:      form.class      || profile.class,
      battleCry:  form.battleCry  || profile.battleCry,

      startWeight:form.weight,
      sleepTarget:form.sleepTarget,
      wakeTime:   form.wakeTime,
      sleepTime:  form.sleepTime,

          {tab==="stats"&&(

              <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ,marginBottom:12,lineHeight:1.6}}>
                Manually adjust any stat. Use sparingly — let The System measure you honestly.
              </div>
              {STATS.map(s=>{
                const v = parseInt(statEdits[s.key])||0;
                const col = v>=80?PA.p:v>=60?PA.s:v>=40?"#60A5FA":"#94A3B8";
                return(
                  <div key={s.key} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:14}}>{s.e}</span>
                        <span style={{fontSize:12,fontWeight:700,color:M.text,fontFamily:ORB,letterSpacing:"0.06em"}}>{s.l.toUpperCase()}</span>
                      </div>
                      <span style={{fontSize:14,fontWeight:900,color:col,fontFamily:ORB}}>{v}</span>
                    </div>
                    <input type="range" min={0} max={100} value={v}
                      onChange={e=>setStatEdits({...statEdits,[s.key]:+e.target.value})}
                      style={{width:"100%",accentColor:col}}/>
                  </div>
                );
              })}
            </>
          )}
          {tab==="body"&&(
            <>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,marginBottom:6}}>HEIGHT (cm)</div>
              <input type="number" value={form.height} onChange={e=>setForm({...form,height:e.target.value})} placeholder="e.g. 180" style={inputStyle}/>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,marginBottom:6}}>CURRENT WEIGHT (kg)</div>
              <input type="number" value={form.weight} onChange={e=>setForm({...form,weight:e.target.value})} placeholder="e.g. 80" style={inputStyle}/>
            </>
          )}
          {tab==="schedule"&&(
            <>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,marginBottom:6}}>WAKE TIME</div>
              <input type="time" value={form.wakeTime} onChange={e=>setForm({...form,wakeTime:e.target.value})} style={inputStyle}/>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,marginBottom:6}}>SLEEP TIME</div>
              <input type="time" value={form.sleepTime} onChange={e=>setForm({...form,sleepTime:e.target.value})} style={inputStyle}/>
              <div style={{fontSize:10,color:PA.p,fontFamily:ORB,marginBottom:6}}>SLEEP TARGET (hours)</div>
              <input type="number" min={4} max={12} step={0.5} value={form.sleepTarget} onChange={e=>setForm({...form,sleepTarget:e.target.value})} style={inputStyle}/>
            </>
          )}
        </div>

        {/* Save */}
        <div style={{ padding:"12px 20px 24px", borderTop:`1px solid ${M.border}` }}>
          <Btn onClick={save} variant="primary" full icon={saved?"✅":"💾"} style={{fontFamily:ORB,fontSize:13}}>
            {saved?"SAVED!":"SAVE CHANGES"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

function TheSystem() {
  const INIT_SETTINGS = {paletteKey:"gold",soundEnabled:true,ambientEnabled:true,autoSave:true,showLevelUp:true,bossNotify:true,streakReminder:true,difficulty:1};

  const [state, dispatch] = useReducer(reducer, null, () => {
    try {
      const raw = localStorage.getItem("the_system_v12");
      if(raw) return JSON.parse(raw);
    } catch {}
    return {profile:null, settings:INIT_SETTINGS};
  });

  const { profile, settings } = state;
  const [tab, setTab] = useState("profile");
  const [scanning, setScanning] = useState(false);
  const [scanStep, setScanStep] = useState("intro");
  const [showQuickEdit, setShowQuickEdit] = useState(false); // intro | form | loading | done
  const [cinematic, setCinematic] = useState(null);
  const [achQueue, setAchQueue] = useState([]);
  const [lootItem, setLootItem] = useState(null);
  const [freshAch, setFreshAch] = useState(null);
  const [showWeeklyReview, setShowWeeklyReview] = useState(false);
  const prevProfile = usePrevious(profile);
  const prevLevel = usePrevious(profile?.level);

  // Apply palette on mount and settings change
  useEffect(()=>{
    const pk = settings?.paletteKey||"gold";
    if(pk==="custom"&&settings?.customColor) Object.assign(PA,buildCustomPalette(settings.customColor));
    else if(PALETTES[pk]) Object.assign(PA,PALETTES[pk]);
    SOUND_ENABLED = settings?.soundEnabled!==false;
  },[settings]);

  // Persist to localStorage
  useEffect(()=>{
    if(!settings?.autoSave) return;
    try { localStorage.setItem("the_system_v12",JSON.stringify(state)); } catch {}
  },[state]);

  // Level-up detection
  useEffect(()=>{
    if(prevLevel!==undefined && profile?.level>prevLevel && settings?.showLevelUp) {
      setCinematic({from:prevLevel,to:profile.level});
      // Check loot drop
      if(profile.level%5===0) {
        const item=LOOT_ITEMS[Math.floor(Math.random()*LOOT_ITEMS.length)];
        setTimeout(()=>setLootItem(item),5800);
      }
    }
  },[profile?.level]);

  // Achievement detection — guarded against first-login flood
  useEffect(()=>{
    if(!profile) return;
    // Skip if profile was just created (within 10s) to avoid flooding on first login
    if(profile.createdAt && (Date.now()-new Date(profile.createdAt).getTime()) < 30000) return;
    const earned=new Set((profile.achievements||[]).map(a=>a.id));
    const newOnes=[];
    const today=new Date().toISOString().slice(0,10);

    // Only fire achievements when threshold is NEWLY crossed (prev → current)
    const prevLvl = prevLevel||0;
    LEVEL_ACHS.forEach(a=>{ if(!earned.has(a.id)&&profile.level>=(a.threshold||0)&&prevLvl<(a.threshold||0)) newOnes.push(a); });
    const prevStreak = prevProfile?.streak||profile.streak;
    STREAK_ACHS.forEach(a=>{ if(!earned.has(a.id)&&profile.streak>=(a.threshold||0)&&prevStreak<(a.threshold||0)) newOnes.push(a); });
    STAT_ACHS.forEach(a=>{
      const cur=profile.stats?.[a.stat]?.value||0, prev=prevProfile?.stats?.[a.stat]?.value||cur;
      if(!earned.has(a.id)&&cur>=(a.threshold||0)&&prev<(a.threshold||0)) newOnes.push(a);
    });

    if(newOnes.length>0) {
      const updated=[...(profile.achievements||[]),...newOnes.map(a=>({...a,date:today}))];
      dispatch({type:"SET_PROFILE",payload:{...profile,achievements:updated}});
      setAchQueue(q=>[...q,...newOnes]);
    }
  },[profile?.level,profile?.streak,profile?.stats]);

  // Achievement banner display
  useEffect(()=>{
    if(achQueue.length>0&&!freshAch) {
      setFreshAch(achQueue[0]);
      setAchQueue(q=>q.slice(1));
      setTimeout(()=>setFreshAch(null),3800);
    }
  },[achQueue,freshAch]);

  // Generate daily missions if missing or stale
  useEffect(()=>{
    if(!profile) return;
    const today=new Date().toISOString().slice(0,10);
    if(profile.missionDate!==today) {
      const pool=[...MISSION_POOL].sort(()=>Math.random()-0.5).slice(0,6);
      dispatch({type:"SET_PROFILE",payload:{...profile,dailyMissions:pool,completedMissions:{},missionDate:today}});
    }
  },[profile?.missionDate]);

  // Update streak
  useEffect(()=>{
    if(!profile) return;
    const today=new Date().toISOString().slice(0,10);
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    const todayDone=HABITS.some(h=>profile.habits?.[today]?.[h.id]);
    const yestDone=HABITS.some(h=>profile.habits?.[yesterday]?.[h.id]);
    const newStreak=todayDone?(yestDone||profile.lastStreakDate===yesterday?(profile.streak||0)+1:1):(profile.streak||0);
    if(newStreak!==profile.streak||profile.lastStreakDate!==today) {
      dispatch({type:"SET_PROFILE",payload:{...profile,streak:newStreak,lastStreakDate:todayDone?today:profile.lastStreakDate}});
    }
  },[profile?.habits]);

  async function handleScanSubmit(answers) {
    setScanStep("loading"); snd("nav");
    const result = await generateProfile(answers);
    // Use level from AI result; derive from lifeScore as fallback
    const scannedLevel = Math.max(1, result.level || Math.floor(calcLifeScore(result.stats) / 5) || 1);
    const level = scannedLevel;
    const xpNeeded = calcXpNeeded(level);
    const xpCurrent = Math.min(xpNeeded - 1, Math.max(0, result.xpCurrent || 0));
    const newProfile={
      ...result,
      level, xpCurrent, xpNeeded, totalXP: xpCurrent + (level - 1) * 100, totalAura: result.totalAura || 0,
      streak:0, rank:"E",
      achievements:[], habits:{}, journal:[], ritualDone:{}, completedDungeons:[],
      bossState:{currentBossId:"procrastination_demon",...BOSSES.reduce((a,b)=>({...a,[b.id]:{hp:b.hp,defeated:false,debuffs:[]}}),{})},
      statHistory: STATS.reduce((a,s)=>({...a,[s.key]:[result.stats?.[s.key]?.value||30]}),{}),
      createdAt:new Date().toISOString(),
    };
    // Calculate rank from stats
    const avg=calcLifeScore(newProfile.stats);
    newProfile.rank=avg>=90?"SSS":avg>=80?"SS":avg>=70?"S":avg>=60?"A":avg>=50?"B":avg>=40?"C":avg>=30?"D":"E";
    dispatch({type:"SET_PROFILE",payload:newProfile});
    setScanStep("done");
    setTimeout(()=>setCinematic({from:0,to:1}),600);
  }

  // Rank update from stats
  useEffect(()=>{
    if(!profile?.stats) return;
    const avg=calcLifeScore(profile.stats);
    const newRank=avg>=90?"SSS":avg>=80?"SS":avg>=70?"S":avg>=60?"A":avg>=50?"B":avg>=40?"C":avg>=30?"D":"E";
    if(newRank!==profile.rank) dispatch({type:"SET_PROFILE",payload:{...profile,rank:newRank}});
  },[profile?.stats]);

  const TABS = [
    {id:"profile",icon:"profile",label:"ME"},
    {id:"stats",icon:"stats",label:"STATS"},
    {id:"habits",icon:"missions",label:"GROW"},
    {id:"training",icon:"missions",label:"BODY"},
    {id:"mind",icon:"advisor",label:"MIND"},
    {id:"sovereign",icon:"stats",label:"POWER"},
    {id:"deen",icon:"codex",label:"DEEN"},
    {id:"engine",icon:"awards",label:"ENGINE"},
    {id:"legacy",icon:"codex",label:"LEGACY"},
    {id:"advisor",icon:"advisor",label:"AI"},
    {id:"settings",icon:"settings",label:"SET"},
  ];

  const rc = RANKS[profile?.rank||"E"]?.color||PA.p;

  return (
    <div style={{minHeight:"100vh",background:M.bg,color:M.text,overflowX:"hidden",position:"relative",fontFamily:RAJ}}>
      {/* Inject global keyframes + fonts */}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${PA.p}44;border-radius:99px;}
        ::-webkit-scrollbar-track{background:transparent;}
        @keyframes bossShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
        @keyframes bossImpact{0%{transform:scale(1.05)}100%{transform:scale(1)}}
        @keyframes chromaticAb{0%,100%{filter:none}50%{filter:drop-shadow(2px 0 0 #ff0044) drop-shadow(-2px 0 0 #00ffee)}}
        @keyframes glowPulse{0%,100%{opacity:1}50%{opacity:0.5}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
        @keyframes slideRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes slideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes cinematicIn{from{opacity:0}to{opacity:1}}
        @keyframes gateLeft{from{left:0}to{left:-55%}}
        @keyframes gateRight{from{right:0}to{right:-55%}}
        @keyframes gateCore{0%{opacity:0;transform:translateX(-50%) scaleY(0)}50%{opacity:1;transform:translateX(-50%) scaleY(1)}100%{opacity:0}}
        @keyframes dungeonTitleIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes rayPulse{0%,100%{opacity:0.08}50%{opacity:0.2}}
        @keyframes flicker{0%,100%{opacity:1}45%,55%{opacity:0.7}50%{opacity:0.85}}
        @keyframes gemShimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(1.3)}}
        @keyframes lootDrop{from{opacity:0;transform:translateY(-30px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
        @keyframes floatDmg{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.3)}}
        @keyframes tooltipFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes habitDone{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
        @keyframes nodeUnlock{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
        @keyframes auraFlow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @keyframes sparklineDraw{from{stroke-dashoffset:1000}to{stroke-dashoffset:0}}
        @keyframes forgeBlast{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.15);filter:brightness(2)}100%{transform:scale(1);filter:brightness(1)}}
        @keyframes equipSwap{0%{opacity:1;transform:translateX(0)}50%{opacity:0;transform:translateX(20px)}51%{opacity:0;transform:translateX(-20px)}100%{opacity:1;transform:translateX(0)}}
        @keyframes rivalFlame{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.85)}}
        @keyframes ritualFill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
        input[type=range]::-webkit-slider-runnable-track{background:${M.surface};border-radius:99px;height:4px;}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:${PA.p};margin-top:-6px;box-shadow:0 0 8px ${PA.glow};}
        input[type=range]{-webkit-appearance:none;width:100%;background:transparent;}
      `}</style>

      {/* Ambient Background */}
      {settings?.ambientEnabled!==false && <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none"}}><AnimatedBackground/></div>}

      {/* Overlay modals */}
      {cinematic && <Cinematic onDone={()=>setCinematic(null)} levelDelta={(cinematic.to||1)-(cinematic.from||0)} newLevel={cinematic.to||1} color={rc}/>}
      {showWeeklyReview && <WeeklyReviewModal profile={profile} dispatch={dispatch} onClose={()=>setShowWeeklyReview(false)}/>}
      {lootItem && <LootDrop item={lootItem} onClose={()=>setLootItem(null)}/>}
      {freshAch && <AchBanner ach={freshAch}/>}

      {/* Main layout */}
      <div style={{position:"relative",zIndex:1,maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column"}}>

        {/* TOP HEADER */}
        <div style={{position:"sticky",top:0,zIndex:80,background:`${M.bg}ee`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${M.border}`,padding:"12px 16px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:30,height:30,borderRadius:9,background:`linear-gradient(135deg,${PA.d},${PA.p})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:`0 0 14px ${PA.glow}`}}>⚡</div>
              <div>
                <div style={{fontSize:12,fontWeight:900,letterSpacing:"0.15em",color:M.text,fontFamily:ORB,lineHeight:1}}>THE SYSTEM</div>
                <div style={{fontSize:8,color:M.textLow,letterSpacing:"0.08em",fontFamily:RAJ}}>{profile?.name||"UNREGISTERED"} · LV {profile?.level||0}</div>
              </div>
            </div>
            {profile && (
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,fontWeight:700,color:rc,fontFamily:ORB}}>{profile.rank || "E"}</div>
                  <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>{profile.totalAura||0} AP</div>
                </div>
                <div style={{width:32,height:32}}><RankBadge rank={profile.rank||"E"} level={profile.level||0} size={32} lifeScore={calcLifeScore(profile.stats)}/></div>
              </div>
            )}
          </div>


        </div>

        {/* CONTENT AREA */}
        <div style={{flex:1,padding:"16px 16px 120px",overflowY:"auto"}}>
          {/* ONBOARDING */}
          {!profile && scanStep==="intro" && (
            <div style={{animation:"fadeUp 0.5s ease",textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:64,marginBottom:28,animation:"glowPulse 3s ease infinite"}}>⚡</div>
              <h1 style={{fontSize:26,fontWeight:900,letterSpacing:"0.15em",color:M.text,fontFamily:ORB,marginBottom:8}}>THE SYSTEM</h1>
              <p style={{fontSize:14,color:PA.p,fontFamily:ORB,letterSpacing:"0.1em",marginBottom:28}}>LIFE RPG · SOLO LEVELING</p>
              <p style={{fontSize:13,color:M.textMid,lineHeight:1.85,maxWidth:320,margin:"0 auto 36px",fontFamily:RAJ}}>You have been selected by The System. Complete the initial scan to determine your rank, class, and starting attributes. Your journey to SSS begins now.</p>
              <Btn onClick={()=>setScanStep("form")} variant="primary" icon="⚡" style={{fontSize:14,padding:"16px 36px",fontFamily:ORB,letterSpacing:"0.12em"}}>BEGIN SCAN</Btn>
              <p style={{fontSize:10,color:M.textLow,marginTop:20,fontFamily:RAJ}}>25 questions · 5 minutes · AI-powered analysis</p>
            </div>
          )}

          {!profile && scanStep==="form" && (
            <Questionnaire onSubmit={handleScanSubmit} savedAnswers={null}/>
          )}

          {!profile && scanStep==="loading" && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"60vh",gap:20}}>
              <div style={{fontSize:52,animation:"glowPulse 1s ease infinite"}}>🌀</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:800,color:PA.p,fontFamily:ORB,letterSpacing:"0.12em",marginBottom:8}}>SYSTEM SCANNING</div>
                <p style={{fontSize:12,color:M.textLow,fontFamily:RAJ}}>Analyzing your data... Calculating attributes...</p>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[0,1,2,3].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:PA.p,animation:`blink 1.2s ease infinite ${i*0.2}s`}}/>)}
              </div>
            </div>
          )}

          {/* Main tabs */}
          {profile && tab==="profile" && <ProfileTabExtended profile={profile} dispatch={dispatch} onUpdate={()=>setScanStep("form")} isUpd={false} peaks={{}} bossCompleted={profile.bossState} setBossCompleted={()=>{}}/>}
          {profile && tab==="stats" && <StatsTab profile={profile}/>}
          {profile && tab!=="profile" && tab!=="settings" && <MainTabRenderer tab={tab} profile={profile} dispatch={dispatch} scanStepSetter={setScanStep}/>}
          {showQuickEdit && profile && <QuickProfileEditor profile={profile} dispatch={dispatch} onClose={()=>setShowQuickEdit(false)}/>}
          {profile && tab==="settings" && <SettingsTabV2 settings={settings} onSave={s=>dispatch({type:"SET_SETTINGS",payload:s})} onReset={()=>{dispatch({type:"RESET"});setScanStep("intro");}} profile={profile} dispatch={dispatch} onQuickEdit={()=>setShowQuickEdit(true)}/>}
          {profile && tab==="settings" && false && <SettingsTab settings={settings} onSave={s=>dispatch({type:"SET_SETTINGS",payload:s})} onReset={()=>{dispatch({type:"RESET"});setScanStep("intro");}} profile={profile}/>}
        </div>

        {/* BOTTOM PILL NAV */}
        {profile && (
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",zIndex:90,width:"100%",maxWidth:480,padding:"8px 12px calc(8px + env(safe-area-inset-bottom,0px))",background:`${M.bg}f0`,backdropFilter:"blur(24px)",borderTop:`1px solid ${M.border}`}}>
            <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none",background:M.surface,borderRadius:999,padding:5,gap:3,boxShadow:`0 2px 16px rgba(0,0,0,0.4),0 0 0 1px ${M.border}`}}>
              {TABS.map(t=>{
                const active=tab===t.id;
                return <button key={t.id} onClick={()=>{setTab(t.id);snd("nav");}} style={{
                  flexShrink:0,minWidth:52,padding:"9px 6px",background:active?`linear-gradient(135deg,${PA.d},${PA.p})`:"transparent",
                  border:"none",cursor:"pointer",borderRadius:999,
                  display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                  transition:"all 0.25s cubic-bezier(0.34,1.56,0.64,1)",
                  boxShadow:active?`0 2px 12px ${PA.glow}`:"none",
                  transform:active?"scale(1.05)":"scale(1)"}}>
                  <SketchIcon id={t.icon} active={active} color={active?"#fff":M.textLow} size={17}/>
                  <span style={{fontSize:7,fontWeight:700,letterSpacing:"0.05em",fontFamily:ORB,color:active?"#fff":M.textLow,lineHeight:1,whiteSpace:"nowrap"}}>{t.label}</span>
                </button>;
              })}
            </div>
          </div>
        )}

        {/* BOTTOM SAFE AREA */}
        <div style={{height:"env(safe-area-inset-bottom,16px)"}}/>
      </div>
    </div>
  );
}

// EQUIPMENT SYSTEM — Character silhouette, 8 slots, forge mechanic
// ═══════════════════════════════════════════════════════════════════
function EquipmentPanel({ profile, dispatch }) {
  const [selSlot, setSelSlot] = useState(null);
  const [equip, setEquip] = useState(profile?.equipment || {});
  const [forging, setForging] = useState(false);
  const [forgeResult, setForgeResult] = useState(null);
  const [compareItem, setCompareItem] = useState(null);
  const inventory = profile?.inventory || BASE_EQUIPMENT;

  function equipItem(slotId, item) {
    const updated = {...equip, [slotId]: item};
    setEquip(updated);
    snd("equipSwap");
    dispatch({type:"SET_PROFILE", payload:{...profile, equipment:updated}});
  }

  function forge() {
    setForging(true);
    snd("forge");
    setTimeout(()=>{
      const idx = Math.floor(Math.random() * LOOT_ITEMS.length);
      const result = LOOT_ITEMS[idx];
      setForgeResult(result);
      setForging(false);
      snd("unlock");
    }, 1600);
  }

  const SLOT_POSITIONS = {
    head:    {top:"2%",  left:"38%", label:"Head"},
    chest:   {top:"22%", left:"38%", label:"Chest"},
    hands:   {top:"32%", left:"10%", label:"Hands"},
    weapon:  {top:"32%", left:"68%", label:"Weapon"},
    legs:    {top:"52%", left:"38%", label:"Legs"},
    boots:   {top:"74%", left:"38%", label:"Boots"},
    ring:    {top:"52%", left:"10%", label:"Ring"},
    amulet:  {top:"10%", left:"68%", label:"Amulet"},
  };

  const totalBonuses = Object.values(equip).reduce((acc, item) => {
    if(!item?.bonus) return acc;
    Object.entries(item.bonus).forEach(([k,v])=>{ acc[k]=(acc[k]||0)+v; });
    return acc;
  }, {});

  return (
    <div style={{animation:"fadeUp 0.4s ease"}}>
      <Card glass>
        <Lbl icon="⚔️" mb={12}>EQUIPMENT — CHARACTER LOADOUT</Lbl>
        <div style={{position:"relative",height:320,background:M.surface,borderRadius:14,border:`1px solid ${M.border}`,overflow:"hidden",marginBottom:16}}>
          {/* Silhouette */}
          <svg style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",opacity:0.07}} width={120} height={280} viewBox="0 0 120 280">
            <ellipse cx={60} cy={30} rx={22} ry={28} fill={PA.p}/>
            <rect x={25} y={55} width={70} height={90} rx={12} fill={PA.p}/>
            <rect x={5} y={58} width={22} height={75} rx={9} fill={PA.p}/>
            <rect x={93} y={58} width={22} height={75} rx={9} fill={PA.p}/>
            <rect x={28} y={142} width={30} height={90} rx={9} fill={PA.p}/>
            <rect x={62} y={142} width={30} height={90} rx={9} fill={PA.p}/>
          </svg>
          {/* Slot buttons */}
          {EQUIP_SLOTS.map(slot=>{
            const pos = SLOT_POSITIONS[slot.id];
            const item = equip[slot.id];
            if(!pos) return null;
            const slotCol = RC[item?.r] || M.border;
            return (
              <div key={slot.id} onClick={()=>setSelSlot(selSlot===slot.id?null:slot.id)}
                style={{position:"absolute",top:pos.top,left:pos.left,
                  width:40,height:40,borderRadius:10,cursor:"pointer",
                  background:item?`${slotCol}22`:M.card,
                  border:`2px solid ${selSlot===slot.id?PA.p:item?slotCol+"55":M.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
                  boxShadow:item?`0 0 12px ${slotCol}44`:M.shadowSm,
                  transition:"all 0.2s",animation:selSlot===slot.id?"glowPulse 1.5s infinite":"none"
                }}>
                {item ? item.e : <span style={{fontSize:10,color:M.textLow}}>+</span>}
                <div style={{position:"absolute",bottom:-14,left:"50%",transform:"translateX(-50%)",fontSize:7,color:M.textLow,fontFamily:ORB,whiteSpace:"nowrap",letterSpacing:"0.06em"}}>{pos.label.toUpperCase()}</div>
              </div>
            );
          })}
        </div>

        {selSlot && (
          <div style={{animation:"fadeUp 0.3s ease"}}>
            <div style={{fontSize:11,fontWeight:700,color:PA.p,fontFamily:ORB,letterSpacing:"0.1em",marginBottom:10}}>
              SELECT ITEM FOR {SLOT_POSITIONS[selSlot]?.label.toUpperCase()}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {inventory.filter(item=>item.slot===selSlot).map(item=>{
                const col=RC[item.r]||"#94A3B8";
                const equipped=equip[selSlot]?.id===item.id;
                return (
                  <div key={item.id} onClick={()=>equipItem(selSlot,item)}
                    style={{display:"flex",gap:10,alignItems:"center",padding:"10px 12px",background:equipped?PA.dim:M.surface,borderRadius:10,border:`1.5px solid ${equipped?PA.p+"44":col+"22"}`,cursor:"pointer",transition:"all 0.2s"}}

// ACHIEVEMENTS 3D ORBIT SHOWCASE — top achievements rotating display
// ═══════════════════════════════════════════════════════════════════
function AchievementOrbit({ achievements = [], size = 220 }) {
  const cvRef = useRef(null);
  const animRef = useRef(null);
  const top5 = achievements.slice(0,5);

  useEffect(()=>{
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width=size*DPR; cv.height=size*DPR; ctx.scale(DPR,DPR);
    const cx=size/2, cy=size/2;
    let t=0;

    const draw=()=>{
      ctx.clearRect(0,0,size,size); t+=0.015;
      const orbitR=size*0.34;
      ctx.save(); ctx.strokeStyle=`${PA.p}18`; ctx.lineWidth=1; ctx.setLineDash([4,8]);
      ctx.beginPath(); ctx.ellipse(cx,cy,orbitR,orbitR*0.38,0,0,Math.PI*2); ctx.stroke(); ctx.restore();

      // Center glow
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,size*0.18);
      cg.addColorStop(0,`${PA.p}33`); cg.addColorStop(1,"transparent");
      ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,size*0.18,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.font=`${size*0.12}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("🏆",cx,cy); ctx.restore();

      top5.forEach((ach,i)=>{
        const angle = t + (i/top5.length)*Math.PI*2;
        const x = cx + orbitR*Math.cos(angle);
        const y = cy + orbitR*0.38*Math.sin(angle);
        const z = Math.sin(angle);
        const scale = 0.55 + 0.45*((z+1)/2);
        const alpha = 0.35 + 0.65*((z+1)/2);
        const col = RC[ach.r]||"#94A3B8";
        ctx.save();
        ctx.globalAlpha=alpha;
        if(z>0) { ctx.shadowColor=col; ctx.shadowBlur=12*scale; }
        ctx.font=`${size*0.1*scale}px serif`;
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(ach.e,x,y);
        ctx.restore();
      });
      animRef.current=requestAnimationFrame(draw);
    };
    animRef.current=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(animRef.current);
  },[achievements,size]);

  return <canvas ref={cvRef} style={{width:size,height:size,display:"block"}}/>;
}

// ═══════════════════════════════════════════════════════════════════
// POWER LEVEL DISPLAY — animated number gauge
// ═══════════════════════════════════════════════════════════════════
function PowerLevelGauge({ value = 0, max = 100, label = "POWER", color = PA.p, size = 120 }) {
  const cvRef = useRef(null);
  const animRef = useRef(null);
  const pct = Math.min(1, value / max);

  useEffect(()=>{
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio||1,2);
    cv.width=size*DPR; cv.height=size*DPR; ctx.scale(DPR,DPR);
    const cx=size/2, cy=size/2, r=size*0.4;
    let t=0, current=0;

    const draw=()=>{
      ctx.clearRect(0,0,size,size); t++;
      current=Math.min(pct,current+pct/60);
      const angle=-Math.PI*0.75;
      const sweep=current*Math.PI*1.5;
      const pulse=0.5+0.5*Math.sin(t*0.04);

      ctx.save(); ctx.strokeStyle=M.surface; ctx.lineWidth=size*0.07;
      ctx.beginPath(); ctx.arc(cx,cy,r,angle,angle+Math.PI*1.5); ctx.stroke(); ctx.restore();

      const g=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
      g.addColorStop(0,color+"88"); g.addColorStop(0.5,color); g.addColorStop(1,color+"cc");
      ctx.save(); ctx.strokeStyle=g; ctx.lineWidth=size*0.07; ctx.lineCap="round";
      ctx.shadowColor=color; ctx.shadowBlur=12+pulse*6;
      ctx.beginPath(); ctx.arc(cx,cy,r,angle,angle+sweep); ctx.stroke(); ctx.restore();

      ctx.save(); ctx.font=`900 ${size*0.2}px Orbitron,monospace`; ctx.fillStyle=color;
      ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.shadowColor=color; ctx.shadowBlur=pulse*8;
      ctx.fillText(Math.round(current*max),cx,cy-4); ctx.restore();
      ctx.save(); ctx.font=`${size*0.08}px Rajdhani,sans-serif`; ctx.fillStyle=M.textLow;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(label,cx,cy+size*0.14); ctx.restore();

      if(current<pct) animRef.current=requestAnimationFrame(draw);
      else { cancelAnimationFrame(animRef.current); ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=pulse*12+4; ctx.font=`900 ${size*0.2}px Orbitron,monospace`; ctx.fillStyle=color; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(value,cx,cy-4); ctx.restore(); }
    };
    animRef.current=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(animRef.current);
  },[value,pct,size,color,label]);

  return <canvas ref={cvRef} style={{width:size,height:size,display:"block"}}/>;
}

  const bossesDefeated = Object.values(profile?.bossState||{}).filter(b=>b&&b.defeated).length;

    {l:"Life Score",v:score,max:100,c:PA.p,e:"📊"},

function DailySummary({ profile, date }) {

// ADDITIONAL HELPER HOOKS
// ═══════════════════════════════════════════════════════════════════
function useLocalStorage(key, defaultVal) {
  const [val, setVal] = useState(()=>{
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):defaultVal; } catch { return defaultVal; }
  });
  useEffect(()=>{
    try { localStorage.setItem(key,JSON.stringify(val)); } catch {}
  },[key,val]);
  return [val,setVal];
}

function useWindowSize() {
  const [size, setSize] = useState({w:window.innerWidth,h:window.innerHeight});
  useEffect(()=>{
    const handler=()=>setSize({w:window.innerWidth,h:window.innerHeight});
    window.addEventListener("resize",handler);
    return ()=>window.removeEventListener("resize",handler);
  },[]);
  return size;
}

function useDebounce(value, delay) {
  const [debounced, setDebounced] = useState(value);
  useEffect(()=>{ const t=setTimeout(()=>setDebounced(value),delay); return ()=>clearTimeout(t); },[value,delay]);
  return debounced;
}

// XP CURVE VISUALIZER — canvas chart of leveling progression
// ═══════════════════════════════════════════════════════════════════
function XPCurveCanvas({ currentLevel = 1, w = 300, h = 120 }) {
  const cvRef = useRef(null);
  const LEVELS = Array.from({length:30},(_,i)=>({lv:i+1,xp:calcXpNeeded(i+1)}));
  const maxXP = Math.max(...LEVELS.map(l=>l.xp));

  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const DPR=Math.min(window.devicePixelRatio||1,2);
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,w,h);
    const pad=16;
    const xScale=(w-pad*2)/(LEVELS.length-1), yScale=(h-pad*2-10)/maxXP;
    const pts=LEVELS.map((l,i)=>({x:pad+i*xScale,y:h-pad-l.xp*yScale,l}));

    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,`${PA.p}44`); grad.addColorStop(1,`${PA.p}00`);
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,h); ctx.lineTo(pts[0].x,h); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();

    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=PA.p; ctx.lineWidth=1.8; ctx.shadowColor=PA.p; ctx.shadowBlur=5; ctx.stroke();

    const curr=pts[currentLevel-1];
    if(curr) {
      ctx.save(); ctx.fillStyle="#F5C842"; ctx.shadowColor="#F5C842"; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(curr.x,curr.y,5,0,Math.PI*2); ctx.fill(); ctx.restore();
      ctx.save(); ctx.font=`700 9px Orbitron,monospace`; ctx.fillStyle="#F5C842"; ctx.textAlign="center";
      ctx.fillText(`LV${currentLevel}`,curr.x,curr.y-10); ctx.restore();
    }

    ctx.save(); ctx.font=`8px Rajdhani,sans-serif`; ctx.fillStyle=M.textLow;
    ctx.textAlign="left"; ctx.fillText("XP/Level Curve",pad,h-3); ctx.restore();
  },[currentLevel,w,h]);

  return <canvas ref={cvRef} style={{width:w,height:h,display:"block",borderRadius:8}}/>;
}

// SYSTEM STATUS PANEL — health check of all systems
// ═══════════════════════════════════════════════════════════════════
function SystemStatus({ profile }) {
  const today = new Date().toISOString().slice(0,10);
  const habitsToday = profile?.habits?.[today]||{};
  const doneCount = HABITS.filter(h=>habitsToday[h.id]).length;
  const streak = profile?.streak||0;
  const bossHp = (() => {
    const bid = profile?.bossState?.currentBossId||"procrastination_demon";
    const boss = BOSSES.find(b=>b.id===bid);
    const cur = profile?.bossState?.[bid]?.hp ?? boss?.hp ?? 1000;
    return boss ? Math.round((cur/boss.hp)*100) : 100;
  })();

  const systems = [
    {l:"Habit Engine",status:doneCount>=HABITS.length?"OPTIMAL":doneCount>0?"RUNNING":"OFFLINE",pct:Math.round((doneCount/HABITS.length)*100),c:doneCount>=HABITS.length?"#22C55E":doneCount>0?PA.p:"#EF4444"},
    {l:"Boss Tracker",status:bossHp>66?"STABLE":bossHp>33?"WARNING":"CRITICAL",pct:bossHp,c:bossHp>66?"#22C55E":bossHp>33?"#F59E0B":"#EF4444"},
    {l:"Streak Monitor",status:streak>=7?"FIRE":streak>=3?"ACTIVE":streak>0?"STARTED":"COLD",pct:Math.min(100,Math.round((streak/30)*100)),c:streak>=7?"#F59E0B":streak>=3?PA.p:streak>0?PA.s:"#94A3B8"},
    {l:"Aura Reactor",status:getAuraStage(profile?.totalAura||0).label,pct:Math.min(100,Math.round(((profile?.totalAura||0)/10000)*100)),c:getAuraStage(profile?.totalAura||0).color},
  ];

  return (
    <Card>
      <Lbl icon="⚙️" mb={12}>SYSTEM STATUS</Lbl>
      {systems.map((sys,i)=>(
        <div key={i} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
            <span style={{fontSize:11,color:M.textMid,fontFamily:RAJ,fontWeight:600}}>{sys.l}</span>
            <span style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:`${sys.c}22`,color:sys.c,fontFamily:ORB,fontWeight:700,letterSpacing:"0.06em"}}>{sys.status}</span>
          </div>
          <div style={{height:4,background:M.surface,borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${sys.pct}%`,background:sys.c,borderRadius:99,boxShadow:`0 0 6px ${sys.c}88`,transition:"width 0.6s ease"}}/>
          </div>
        </div>
      ))}
    </Card>
  );
}

// WEEKLY REVIEW CARD — structured reflection
// ═══════════════════════════════════════════════════════════════════
function WeeklyReview({ profile }) {
  const [open, setOpen] = useState(false);
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate()-today.getDay());
  const days = Array.from({length:7},(_,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return d.toISOString().slice(0,10);
  });

  const weekData = days.map(date=>{
    const h = profile?.habits?.[date]||{};
    const done = HABITS.filter(hb=>h[hb.id]).length;
    return {date,done,pct:Math.round((done/HABITS.length)*100)};
  });
  const weekAvg = Math.round(weekData.reduce((s,d)=>s+d.pct,0)/7);
  const perfectDays = weekData.filter(d=>d.pct===100).length;
  const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <Lbl icon="📊" mb={0}>WEEK IN REVIEW</Lbl>
        <Btn onClick={()=>setOpen(!open)} variant="ghost" style={{fontFamily:ORB,fontSize:9,padding:"5px 10px"}}>{open?"CLOSE":"EXPAND"}</Btn>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {weekData.map((d,i)=>{
          const isToday=d.date===today.toISOString().slice(0,10);
          return <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:48,background:M.surface,borderRadius:6,overflow:"hidden",border:`1px solid ${isToday?PA.p+"44":M.border}`,position:"relative",marginBottom:4}}>
              <div style={{position:"absolute",bottom:0,left:0,right:0,height:`${d.pct}%`,background:d.pct===100?"#22C55E":d.pct>50?PA.p:PA.s,transition:"height 0.5s ease"}}/>
            </div>
            <div style={{fontSize:8,color:isToday?PA.p:M.textLow,fontFamily:ORB,fontWeight:isToday?700:400}}>{dayNames[i]}</div>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:open?12:0}}>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:8}}>
          <div style={{fontSize:18,fontWeight:900,color:PA.p,fontFamily:ORB}}>{weekAvg}%</div>
          <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>WEEK AVG</div>
        </div>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:8}}>
          <div style={{fontSize:18,fontWeight:900,color:"#22C55E",fontFamily:ORB}}>{perfectDays}</div>
          <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>PERFECT DAYS</div>
        </div>
        <div style={{flex:1,textAlign:"center",padding:"8px",background:M.surface,borderRadius:8}}>
          <div style={{fontSize:18,fontWeight:900,color:"#F59E0B",fontFamily:ORB}}>{profile?.streak||0}</div>
          <div style={{fontSize:8,color:M.textLow,fontFamily:ORB}}>STREAK</div>
        </div>
      </div>
      {open&&(
        <div style={{animation:"fadeUp 0.3s ease"}}>
          <div style={{padding:"12px 14px",background:M.surface,borderRadius:12,border:`1px solid ${M.border}`}}>
            <div style={{fontSize:10,fontWeight:700,color:PA.p,fontFamily:ORB,letterSpacing:"0.1em",marginBottom:8}}>WEEKLY ASSESSMENT</div>
            <p style={{fontSize:12,color:M.textMid,lineHeight:1.75,fontFamily:RAJ}}>
              {weekAvg>=80?"Outstanding week. Execution at this level compounds into rank advancement. Maintain momentum."

            </p>
          </div>
          <XPCurveCanvas currentLevel={profile?.level||1} w={290} h={100}/>

      )}

  );
}

// ADDITIONAL ANIMATIONS — canvas particle effects helper
// ═══════════════════════════════════════════════════════════════════
function ParticleBurst({ x, y, color = PA.p, count = 12, onDone }) {
  const particles = useMemo(()=>Array.from({length:count},()=>({
    angle: Math.random()*Math.PI*2,
    speed: 1+Math.random()*3,
    size: 2+Math.random()*3,
    life: 1,
  })),[count]);
  const cvRef = useRef(null);
  const animRef = useRef(null);

  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const S=80;
    const DPR=Math.min(window.devicePixelRatio||1,2);
    cv.width=S*DPR; cv.height=S*DPR; ctx.scale(DPR,DPR);
    const cx=S/2,cy=S/2;
    const pts=particles.map(p=>({...p,x:cx,y:cy}));
    let frame=0;

    const draw=()=>{
      ctx.clearRect(0,0,S,S);
      frame++;
      let alive=false;
      pts.forEach(p=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.life=Math.max(0,p.life-0.035);
        p.speed*=0.95;
        if(p.life>0) {
          alive=true;
          ctx.save();
          ctx.globalAlpha=p.life;
          ctx.fillStyle=color;
          ctx.shadowColor=color;
          ctx.shadowBlur=6*p.life;
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      });
      if(alive) animRef.current=requestAnimationFrame(draw);
      else { onDone&&onDone(); }
    };
    animRef.current=requestAnimationFrame(draw);
    return ()=>cancelAnimationFrame(animRef.current);
  },[color]);

  return (
    <div style={{position:"fixed",left:x-40,top:y-40,zIndex:900,pointerEvents:"none"}}>
      <canvas ref={cvRef} style={{width:80,height:80}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// DEEP STATS PANEL — regression analysis per attribute
// ═══════════════════════════════════════════════════════════════════
function DeepStatsPanel({ profile }) {
  const stats = profile?.stats || {};
  const history = profile?.statHistory || {};

  function linearRegression(data) {
    if(data.length < 2) return {slope:0, r2:0};
    const n = data.length;
    const xm = (n-1)/2;
    const ym = data.reduce((s,y)=>s+y,0)/n;
    const num = data.reduce((s,y,i)=>s+(i-xm)*(y-ym),0);
    const den = data.reduce((s,_,i)=>s+(i-xm)**2,0);
    const slope = den===0?0:num/den;
    const yhat = data.map((_,i)=>ym+slope*(i-xm));
    const sst = data.reduce((s,y)=>s+(y-ym)**2,0);
    const sse = data.reduce((s,y,i)=>s+(y-yhat[i])**2,0);
    const r2 = sst===0?1:Math.max(0,1-(sse/sst));
    return {slope:Math.round(slope*100)/100, r2:Math.round(r2*100)/100};
  }

  return (
    <Card>
      <Lbl icon="🔬" c="#C084FC" mb={12}>STATISTICAL DEEP SCAN</Lbl>
      <p style={{fontSize:11,color:M.textLow,lineHeight:1.7,margin:"0 0 16px",fontFamily:RAJ}}>Linear regression on 30-day attribute history. Slope = daily growth rate. R² = growth consistency (0–1).</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {STATS.map(s=>{
          const hist=(history[s.key]||[]).slice(-30);
          const {slope,r2}=linearRegression(hist.length>1?hist:[0,stats[s.key]?.value||0]);
          const v=stats[s.key]?.value||0;
          const tc=slope>0.3?"#22C55E":slope>0?"#FBBF24":slope<0?"#EF4444":M.textLow;
          return (
            <div key={s.key} style={{padding:"10px 12px",background:M.surface,borderRadius:10,border:`1px solid ${M.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:15}}>{s.e}</span>
                <span style={{fontSize:12,fontWeight:700,color:M.text,flex:1,fontFamily:RAJ}}>{s.l}</span>
                <span style={{fontSize:10,color:tc,fontFamily:ORB,fontWeight:700}}>{slope>0?"+":""}{slope}/d</span>
                <span style={{fontSize:10,color:M.textLow,fontFamily:RAJ}}>R²{r2}</span>
                <span style={{fontSize:12,fontWeight:900,color:PA.p,fontFamily:ORB,minWidth:24,textAlign:"right"}}>{v}</span>
              </div>
              <Sparkline data={hist.length>1?hist:[v,v]} color={tc} w={200} h={26}/>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════
// AURA HISTORY CHART CANVAS
// ═══════════════════════════════════════════════════════════════════
function AuraHistoryChart({ profile, w = 320, h = 100 }) {
  const cvRef = useRef(null);
  const aHistory = useMemo(()=>profile?.auraHistory||[profile?.totalAura||0],[profile]);
  const stage = getAuraStage(profile?.totalAura||0);

  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const DPR=Math.min(window.devicePixelRatio||1,2);
    cv.width=w*DPR; cv.height=h*DPR; ctx.scale(DPR,DPR);
    ctx.clearRect(0,0,w,h);
    if(aHistory.length<2){ ctx.fillStyle=M.textLow; ctx.font="11px Rajdhani,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("Track aura daily to see growth",w/2,h/2); return; }
    const pad=10, mx=Math.max(...aHistory,1);
    const xS=(w-pad*2)/(aHistory.length-1), yS=(h-pad*2)/mx;
    const pts=aHistory.map((v,i)=>({x:pad+i*xS,y:h-pad-v*yS}));
    const c=stage.color;
    const rr=parseInt(c.slice(1,3),16)||200, gg=parseInt(c.slice(3,5),16)||200, bb=parseInt(c.slice(5,7),16)||200;
    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,`rgba(${rr},${gg},${bb},0.35)`); grad.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,h); ctx.lineTo(pts[0].x,h); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=c; ctx.lineWidth=2; ctx.shadowColor=c; ctx.shadowBlur=6; ctx.stroke();
    const last=pts[pts.length-1];
    ctx.save(); ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(last.x,last.y,4,0,Math.PI*2); ctx.fill(); ctx.restore();
  },[aHistory,stage,w,h]);

  return (
    <div>
      <canvas ref={cvRef} style={{width:w,height:h,display:"block",borderRadius:10}}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:9,color:M.textLow,fontFamily:ORB}}>
        <span>{aHistory.length} DATA POINTS</span>
        <span style={{color:stage.color}}>CURRENT: {profile?.totalAura||0} AP</span>
      </div>
    </div>
  );
}

          const isPast=i<currentIdx;
          const threshold=RANK_THRESHOLDS[rank]||0;
          const progress=isCurrent?Math.min(100,((lifeScore-threshold)/(RANK_THRESHOLDS[rankOrder[i+1]]||100-threshold))*100):isPast?100:0;
          return (
            <div key={rank} style={{padding:"12px 14px",background:isCurrent?`${rc2}15`:M.surface,borderRadius:12,border:`1.5px solid ${isCurrent?rc2+"55":isPast?rc2+"22":M.border}`,opacity:i>currentIdx+2?0.3:1,transition:"all 0.3s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isCurrent?8:0}}>
                <div style={{width:36,height:36,borderRadius:10,background:`${rc2}22`,border:`2px solid ${rc2}${isCurrent?"aa":isPast?"55":"22"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:900,color:rc2,fontFamily:ORB}}>{rank}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,fontWeight:700,color:isCurrent?rc2:isPast?M.textLow:M.textLow,fontFamily:ORB,letterSpacing:"0.06em"}}>{rank} RANK</span>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:isCurrent?`${rc2}22`:isPast?"#22C55E22":M.card,color:isCurrent?rc2:isPast?"#22C55E":M.textLow,fontFamily:ORB,fontWeight:700}}>{isCurrent?"CURRENT":isPast?"CLEARED":"LOCKED"}</span>
                  </div>
                  <div style={{fontSize:10,color:M.textLow,fontFamily:RAJ,marginTop:1}}>Min life score: {threshold}</div>
                </div>
              </div>
              {isCurrent&&(
                <div style={{animation:"fadeUp 0.3s ease"}}>
                  <p style={{fontSize:11,color:M.textMid,lineHeight:1.65,margin:"0 0 8px",fontFamily:RAJ}}>{RANK_DESCRIPTIONS[rank]}</p>
                  <div style={{height:3,background:M.card,borderRadius:99,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${progress}%`,background:rc2,borderRadius:99,transition:"width 1s ease",boxShadow:`0 0 6px ${rc2}88`}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:M.textLow,fontFamily:ORB}}>
                    <span>PROGRESS TO {rankOrder[i+1]||"MAX"}</span>
                    <span style={{color:rc2}}>{Math.round(progress)}%</span>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function ClassTreeDisplay({ currentClass, level }) {

    <Card>
      <Lbl icon="⚡" mb={12}>CLASS EVOLUTION PATH</Lbl>

        {tiers.map((tier,i)=>{
